@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Replication Task Wizard' | translate"
    [loading]="isLoading"
  ></ix-modal-header>
}

<!-- TEMP (NAS-141021): the stepper stays on mat-vertical-stepper for now; its tn-stepper/tn-step
  migration (incl. the step-nav buttons in the step children) is a deliberate later step of the Epic. -->
<mat-vertical-stepper [linear]="true">
  <ix-use-ix-icons-in-stepper></ix-use-ix-icons-in-stepper>

  <mat-step [stepControl]="whatAndWhere().form">
    <ng-template matStepLabel>{{ 'What and Where' | translate }}</ng-template>
    <ix-replication-what-and-where
      (customRetentionVisibleChange)="isCustomRetentionVisible = $event"
      (sourceLocalChange)="isSourceLocal = $event"
    ></ix-replication-what-and-where>
  </mat-step>

  <mat-step [stepControl]="when().form">
    <ng-template matStepLabel>{{ 'When' | translate }}</ng-template>
    <ix-replication-when
      [isCustomRetentionVisible]="isCustomRetentionVisible"
      [isSourceLocal]="isSourceLocal"
      [isLoading]="isLoading"
      (save)="onSubmit()"
    ></ix-replication-when>
  </mat-step>
</mat-vertical-stepper>
