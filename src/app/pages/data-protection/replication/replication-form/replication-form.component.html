<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="isNew ? ('Add Replication Task' | translate) : ('Edit Replication Task' | translate)"
  [loading]="isLoading() || targetSection().validatingTarget()"
></ix-modal-header>
<mat-card>
  <mat-card-content>
    <form class="ix-form-container" (submit)="onSubmit()">
      <div class="fieldsets">
        <ix-replication-general-section
          [replication]="existingReplication"
        ></ix-replication-general-section>

        <ix-replication-transport-section
          [replication]="existingReplication"
          [transport]="generalSection().form.value.transport"
        ></ix-replication-transport-section>

        <ix-replication-source-section
          [replication]="existingReplication"
          [direction]="generalSection().form.value.direction"
          [nodeProvider]="sourceNodeProvider"
        ></ix-replication-source-section>

        <ix-replication-target-section
          [replication]="existingReplication"
          [nodeProvider]="targetNodeProvider"
          [allowsCustomRetentionPolicy]="!usesNameRegex"
          [sourcePreservesProperties]="sourceEncryptedWithPreservedProperties"
          [isLocalTarget]="isLocalTarget"
        ></ix-replication-target-section>

        <ix-replication-schedule-section
          [replication]="existingReplication"
        ></ix-replication-schedule-section>
      </div>

      @if (eligibleSnapshotsMessage) {
        <tn-banner
          [type]="isEligibleSnapshotsMessageRed ? 'warning' : 'info'"
          [heading]="eligibleSnapshotsMessage | translate"
        ></tn-banner>
      }

      @if (sourceEncryptedWithPreservedProperties) {
        <tn-banner
          type="info"
          [heading]="'Source dataset is encrypted and properties are preserved. Source encryption will be replicated to the destination. Destination encryption options are disabled.' | translate"
        ></tn-banner>
      }

      @if (pushMissingSnapshotConfig) {
        <tn-banner
          type="error"
          [heading]="'Push replication requires at least a periodic snapshot task, naming schema, or name regex.' | translate"
        ></tn-banner>
      }

      @if (pushAutoMissingScheduleOrTasks && !pushMissingSnapshotConfig) {
        <tn-banner
          type="error"
          [heading]="'Scheduled push replication requires either a periodic snapshot task or a replication schedule.' | translate"
        ></tn-banner>
      }

      @if (pullMissingNamingConfig) {
        <tn-banner
          type="error"
          [heading]="'Pull replication requires a naming schema or name regex.' | translate"
        ></tn-banner>
      }

      @if (pullAutoMissingSchedule) {
        <tn-banner
          type="error"
          [heading]="'Pull replication that runs automatically must have a schedule.' | translate"
        ></tn-banner>
      }

      <div class="form-actions">
        <button
          *ixRequiresRoles="requiredRoles"
          mat-button
          type="submit"
          color="primary"
          ixTest="save"
          [disabled]="!isFormValid"
          (click)="onSubmit(); $event.preventDefault();"
        >{{ 'Save' | translate }}</button>
        @if (isNew) {
          <button
            mat-button
            type="button"
            ixTest="switch-to-wizard"
            (click)="onSwitchToWizard()"
          >{{ 'Switch To Wizard' | translate }}</button>
        }
      </div>
    </form>
  </mat-card-content>
</mat-card>
