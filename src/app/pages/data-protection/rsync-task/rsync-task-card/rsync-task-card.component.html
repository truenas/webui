<tn-card padding="small">
  <h3 tnCardHeader class="card-title">
    <a
      tnTestIdType="link"
      [tnTestId]="['rsync-task', 'open-in-new']"
      [routerLink]="['/data-protection', 'rsync']"
      [tnTooltip]="'Open Rsync Tasks list in full page' | translate"
    >
      {{ 'Rsync Tasks' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open Rsync Tasks list in full page' | translate"
      ></tn-icon>
    </a>
    <ix-card-alert-badge [menuPath]="cardMenuPath" />
  </h3>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="desktop-classic"
      iconLibrary="mdi"
      iconSize="56px"
      [title]="'Best if you\'re syncing with a generic system that lacks ZFS capabilities.' | translate"
    ></tn-empty>
  } @else {
    <tn-table
      class="table"
      [dataSource]="(dataProvider.currentPage$ | async) ?? []"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackByTaskId"
      [loading]="!!(dataProvider.isLoading$ | async)"
      (sortChange)="onSortChange($event)"
    >
      <ng-container [tnColumnDef]="'path'" [sortable]="true">
        <ng-template tnHeaderCellDef>{{ 'Path' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <span
            tnTestIdType="text"
            [tnTestId]="[('Path' | translate), uniqueRowTag(row), 'row-text']"
            [tnTooltip]="row.path || ''"
          >{{ row.path }}</span>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'state'" [width]="'120px'">
        <ng-template tnHeaderCellDef>{{ 'State' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <ix-task-state-cell
            [state]="row.state.state"
            [job]="row.job"
            [testId]="[('State' | translate), uniqueRowTag(row), 'row-state']"
            [ariaLabel]="ariaLabel(row)"
          ></ix-task-state-cell>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'enabled'" [width]="'70px'">
        <ng-template tnHeaderCellDef>{{ 'Enabled' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-toggle-cell
            [title]="'Enabled' | translate"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
            [checked]="!!row.enabled"
            [requiredRoles]="requiredRoles"
            (toggled)="onChangeEnabledState(row)"
          ></ix-table-toggle-cell>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>

    <ix-table-pager-show-more
      [pageSize]="4"
      [dataProvider]="dataProvider"
      [ixTestOverride]="['rsync-task']"
      [routerLink]="['/data-protection', 'rsync']"
    ></ix-table-pager-show-more>
  }

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      variant="filled"
      [testId]="addTestId"
      [label]="'Add' | translate"
      (onClick)="onAdd()"
    ></tn-button>
  </ng-template>
</tn-card>
