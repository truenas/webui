@if (state(); as currentState) {
  <button
    type="button"
    tnTooltipPosition="above"
    tnTestIdType="button"
    [class]="'state-button ' + stateClass()"
    [tnTestId]="testId()"
    [tnTooltip]="tooltip()"
    [attr.aria-label]="ariaLabel()"
    (click)="$event.stopPropagation(); onButtonClick()"
  >
    {{ currentState | jobStateDisplay }}
    @if (warnings().length > 0) {
      <span class="label-warning-icon">
        <tn-icon name="alert" library="mdi" customSize="14px"></tn-icon>
      </span>
    }
  </button>
} @else {
  {{ 'N/A' | translate }}
}
