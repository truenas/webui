@if (state(); as currentState) {
  <button
    type="button"
    tnTooltipPosition="above"
    tnTestIdType="button"
    [class]="'state-button ' + stateClass()"
    [tnTestId]="testId()"
    [tnTooltip]="tooltip()"
    [attr.aria-label]="ariaLabel()"
    (click)="$event.stopPropagation(); onButtonClick()"
  >
    {{ currentState | jobStateDisplay }}
  </button>
} @else {
  {{ 'N/A' | translate }}
}
