<tn-dialog-shell [title]="'Custom Transfers' | translate">
<form class="ix-form-container">
  <ix-input
    type="number"
    [formControl]="transfers"
    [label]="helptext.transfersLabel | translate"
    [tooltip]="helptext.transfersTooltip | translate"
    [required]="true"
  ></ix-input>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    color="primary"
    ixTest="save"
    [label]="'Save' | translate"
    [disabled]="transfers.invalid"
    (onClick)="onSave()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
