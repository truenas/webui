<tn-dialog-shell [title]="'Restore Cloud Sync Task' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-input
    formControlName="description"
    [label]="'Description' | translate"
    [required]="true"
  ></ix-input>

  <ix-select
    formControlName="transfer_mode"
    [label]="'Transfer Mode' | translate"
    [required]="true"
    [options]="transferModes$"
  ></ix-select>

  <ix-transfer-mode-explanation
    [mode]="form.controls.transfer_mode.value"
  ></ix-transfer-mode-explanation>

  <ix-explorer
    formControlName="path"
    [label]="'Directory/Files' | translate"
    [required]="true"
    [tooltip]="helptext.pathTooltip | translate"
    [nodeProvider]="treeNodeProvider"
  ></ix-explorer>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="restore"
    [label]="'Restore' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
