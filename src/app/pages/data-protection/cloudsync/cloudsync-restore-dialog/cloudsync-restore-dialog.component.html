<tn-dialog-shell testId="cloudsync-restore" [title]="'Restore Cloud Sync Task' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-field [label]="'Description' | translate">
    <tn-input
      testId="description"
      formControlName="description"
      [required]="true"
    ></tn-input>
  </tn-form-field>

  <tn-form-field [label]="'Transfer Mode' | translate">
    <tn-select
      testId="transfer-mode"
      formControlName="transfer_mode"
      [options]="(transferModes$ | async) ?? []"
    ></tn-select>
  </tn-form-field>

  <ix-transfer-mode-explanation
    [mode]="form.controls.transfer_mode.value"
  ></ix-transfer-mode-explanation>

  <ix-explorer
    formControlName="path"
    [label]="'Directory/Files' | translate"
    [required]="true"
    [tooltip]="helptext.pathTooltip | translate"
    [nodeProvider]="treeNodeProvider"
  ></ix-explorer>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="restore"
    [label]="'Restore' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
