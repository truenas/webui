<tn-card
  padding="small"
  [primaryAction]="addAction()"
>
  <h3 tnCardHeader class="card-title">
    <a
      tnTestIdType="link"
      [tnTestId]="['cloudsync-task', 'open-in-new']"
      [routerLink]="['/data-protection', 'cloudsync']"
      [tnTooltip]="'Open Cloud Sync Tasks list in full page' | translate"
    >
      {{ 'Cloud Sync Tasks' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open Cloud Sync Tasks list in full page' | translate"
      ></tn-icon>
    </a>
    <ix-card-alert-badge [menuPath]="cardMenuPath" />
  </h3>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="cloud-outline"
      iconLibrary="mdi"
      iconSize="56px"
      [title]="'Sync data to a popular cloud storage provider, such as: Google Drive and Photos, Dropbox, Amazon S3 and many others.' | translate"
    ></tn-empty>
  } @else {
    <tn-table
      class="table"
      [dataSource]="(dataProvider.currentPage$ | async) ?? []"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackByTaskId"
      [loading]="!!(dataProvider.isLoading$ | async)"
      (sortChange)="onSortChange($event)"
    >
      <ng-container [tnColumnDef]="'description'" [sortable]="true">
        <ng-template tnHeaderCellDef>{{ 'Description' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <span
            tnTestIdType="text"
            [tnTestId]="[('Description' | translate), uniqueRowTag(row), 'row-text']"
            [tnTooltip]="row.description ? (row.description | translate) : ''"
          >{{ row.description }}</span>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'state'" [width]="'120px'">
        <ng-template tnHeaderCellDef>{{ 'State' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <ix-task-state-cell
            [state]="row.state.state"
            [job]="row.job"
            [testId]="[('State' | translate), uniqueRowTag(row), 'row-state']"
            [ariaLabel]="ariaLabel(row)"
          ></ix-task-state-cell>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'enabled'" [width]="'70px'">
        <ng-template tnHeaderCellDef>{{ 'Enabled' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <ix-share-toggle-cell
            [title]="'Enabled' | translate"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
            [checked]="!!row.enabled"
            [requiredRoles]="requiredRoles"
            (toggled)="onChangeEnabledState(row)"
          ></ix-share-toggle-cell>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-share-actions-cell
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-share-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>

    <ix-table-pager-show-more
      [pageSize]="4"
      [dataProvider]="dataProvider"
      [ixTestOverride]="['cloudsync-task']"
      [routerLink]="['/data-protection', 'cloudsync']"
    ></ix-table-pager-show-more>
  }
</tn-card>
