<tn-dialog-shell [title]="'Add bucket' | translate">
<form [formGroup]="form" (submit)="onSubmit()">
  <div>
    <p>{{ 'Add a new bucket to your Storj account.' | translate }}</p>
    <ix-input
      formControlName="bucket"
      [required]="true"
      [label]="'Bucket Name' | translate"
    ></ix-input>
  </div>
</form>

<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" ixTest="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="primary" ixTest="save" [label]="'Save' | translate" [disabled]="form.invalid" (onClick)="onSubmit()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
