<tn-dialog-shell [title]="'Add bucket' | translate">
<form [formGroup]="form" (submit)="onSubmit()">
  <div>
    <p>{{ 'Add a new bucket to your Storj account.' | translate }}</p>
    <ix-input
      formControlName="bucket"
      [required]="true"
      [label]="'Bucket Name' | translate"
    ></ix-input>
  </div>
  <ix-form-actions tnDialogAction class="form-actions">
    <button
      mat-button
      type="button"
      ixTest="cancel"
     
    >{{ 'Cancel' | translate }}</button>
    <button
      *ixRequiresRoles="requiredRoles"
      mat-button
      type="submit"
      color="primary"
      ixTest="save"
      [disabled]="form.invalid"
    >{{ 'Save' | translate }}</button>
  </ix-form-actions>
</form>
</tn-dialog-shell>
