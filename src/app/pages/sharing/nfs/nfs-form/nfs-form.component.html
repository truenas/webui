@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'Path' | translate">
    <ix-explorer
      formControlName="path"
      [required]="true"
      [label]="'Path' | translate"
      [tooltip]="helptext.pathTooltip | translate"
      [nodeProvider]="treeNodeProvider"
    >
      @if (isNew) {
        <ix-explorer-create-dataset [datasetProperties]="createDatasetProps"></ix-explorer-create-dataset>
      }
    </ix-explorer>
  </tn-form-section>

  <tn-form-section [heading]="'General Options' | translate">
    <tn-form-field [label]="'Description' | translate">
      <!-- TODO: [ariaLabel] duplicates the tn-form-field label — remove once the
        library associates its label with the projected control (for/aria-labelledby). -->
      <tn-input
        testId="comment"
        name="comment"
        formControlName="comment"
        [ariaLabel]="'Description' | translate"
      ></tn-input>
    </tn-form-field>

    <tn-checkbox testId="enabled" formControlName="enabled" [label]="'Enabled' | translate"></tn-checkbox>

    @if (isEnterprise()) {
      <tn-form-field [tooltip]="helptext.exposeTooltip | translate">
        <tn-checkbox
          testId="expose-snapshots"
          formControlName="expose_snapshots"
          [label]="'Expose Snapshots' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }
  </tn-form-section>

  @if (isAdvancedMode()) {
    <tn-form-section [heading]="'Access' | translate">
      <tn-checkbox testId="ro" formControlName="ro" [label]="'Read Only' | translate"></tn-checkbox>

      <tn-form-field
        [label]="'Maproot User' | translate"
        [tooltip]="helptext.maprootUserTooltip | translate"
      >
        <tn-autocomplete
          formControlName="maproot_user"
          [testId]="'maproot-user'"
          [options]="(userOptions$ | async) ?? []"
          [allowCustomValue]="true"
          [loading]="usersLoading()"
          [loadingText]="'Loading...' | translate"
          [noResultsText]="'No results found' | translate"
          (searchChange)="userSearch$.next($event)"
        ></tn-autocomplete>
      </tn-form-field>

      <tn-form-field
        [label]="'Maproot Group' | translate"
        [tooltip]="helptext.maprootGroupTooltip | translate"
      >
        <tn-autocomplete
          formControlName="maproot_group"
          [testId]="'maproot-group'"
          [options]="(groupOptions$ | async) ?? []"
          [allowCustomValue]="true"
          [loading]="groupsLoading()"
          [loadingText]="'Loading...' | translate"
          [noResultsText]="'No results found' | translate"
          (searchChange)="groupSearch$.next($event)"
        ></tn-autocomplete>
      </tn-form-field>

      <tn-form-field
        [label]="'Mapall User' | translate"
        [tooltip]="helptext.mapallUserTooltip | translate"
      >
        <tn-autocomplete
          formControlName="mapall_user"
          [testId]="'mapall-user'"
          [options]="(userOptions$ | async) ?? []"
          [allowCustomValue]="true"
          [loading]="usersLoading()"
          [loadingText]="'Loading...' | translate"
          [noResultsText]="'No results found' | translate"
          (searchChange)="userSearch$.next($event)"
        ></tn-autocomplete>
      </tn-form-field>

      <tn-form-field
        [label]="'Mapall Group' | translate"
        [tooltip]="helptext.mapallGroupTooltip | translate"
      >
        <tn-autocomplete
          formControlName="mapall_group"
          [testId]="'mapall-group'"
          [options]="(groupOptions$ | async) ?? []"
          [allowCustomValue]="true"
          [loading]="groupsLoading()"
          [loadingText]="'Loading...' | translate"
          [noResultsText]="'No results found' | translate"
          (searchChange)="groupSearch$.next($event)"
        ></tn-autocomplete>
      </tn-form-field>

      <tn-form-field
        [label]="'Security' | translate"
        [tooltip]="helptext.securityTooltip | translate"
      >
        <tn-select
          testId="security"
          formControlName="security"
          [multiple]="true"
          [options]="securityOptions"
          [ariaLabel]="'Security' | translate"
        ></tn-select>
      </tn-form-field>
    </tn-form-section>
  }

  <tn-form-section>
    <ix-list
      formArrayName="networks"
      [empty]="form.controls.networks.controls.length === 0"
      [label]="'Networks' | translate"
      [formArray]="form.get('networks')"
      [tooltip]="helptext.addNetworkTooltip | translate"
      (add)="addNetworkControl()"
    >
      @for (network of form.controls.networks.controls; track network; let i = $index) {
        <ix-list-item
          [label]="'Networks' | translate"
          (delete)="removeNetworkControl(i)"
        >
          <ix-ip-input-with-netmask
            [required]="true"
            [formControlName]="i"
            [label]="'Network' | translate"
          ></ix-ip-input-with-netmask>
        </ix-list-item>
      }
    </ix-list>

    <ix-list
      formArrayName="hosts"
      [empty]="form.controls.hosts.controls.length === 0"
      [label]="'Hosts' | translate"
      [formArray]="form.get('hosts')"
      [tooltip]="helptext.addHostsTooltip | translate"
      (add)="addHostControl()"
    >
      @for (network of form.controls.hosts.controls; track network; let i = $index) {
        <ix-list-item
          [label]="'Hosts' | translate"
          (delete)="removeHostControl(i)"
        >
          <ix-input
            [required]="true"
            [formControlName]="i"
            [label]="'Authorized Hosts and IP addresses' | translate"
            [tooltip]="helptext.hostsTooltip | translate"
          ></ix-input>
        </ix-list-item>
      }
    </ix-list>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isLoading()"
      ></tn-button>
    }

    <tn-button
      type="button"
      [testId]="'toggle-advanced-options'"
      [label]="isAdvancedMode() ? ('Basic Options' | translate) : ('Advanced Options' | translate)"
      (onClick)="toggleAdvancedMode()"
    ></tn-button>
  </ix-form-actions>
</form>
