<tn-card class="card" padding="small" [title]="'Ports' | translate">
  <ng-template tnCardFooterActions>
    <ix-add-port-menu
      [subsystemPorts]="subsystem().ports"
      [ixUiSearch]="searchableElements.elements.addPort"
      (portSelected)="onPortAdded($event)"
    ></ix-add-port-menu>
  </ng-template>

  @if (!subsystem().ports?.length) {
    <div class="no-ports-warning">
      <tn-icon
        name="alert"
        library="mdi"
        class="icon"
      ></tn-icon>

      <div>
        {{ helptext.noPortsWarning | translate }}
      </div>
    </div>
  } @else {
    <ul class="port-list">
      @for (port of subsystem().ports; track port.id) {
        <li>
          <span class="port">
            <ix-port-description [port]="port"></ix-port-description>

            <span class="port-actions">
              <tn-icon-button
                *ixRequiresRoles="requiredRoles"
                name="link-variant-off"
                library="mdi"
                iconClass="icon"
                [ariaLabel]="'Remove port from the subsystem' | translate"
                [tooltip]="'Remove port from the subsystem' | translate"
                [testId]="['remove-port-association', port.addr_trtype, port.addr_traddr, port.addr_trsvcid]"
                (onClick)="onRemoveAssociation(port)"
              ></tn-icon-button>
            </span>
          </span>
        </li>
      }
    </ul>
  }
</tn-card>
