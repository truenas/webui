<tn-dialog-shell [title]="'Delete Namespace' | translate">
<div class="message">
  <p>
    {{ 'Are you sure you want to delete this namespace?' | translate }}
  </p>

  @if (isFile) {
    <ix-checkbox
      [formControl]="removeFileControl"
      [label]="('Also delete the underlying file – {name}' | translate: { name: namespace.device_path })"
    ></ix-checkbox>
  } @else {
    <p>
      {{ 'Underlying Zvol will not be deleted.' | translate }}
    </p>
  }
</div>

<ix-form-actions tnDialogAction>
  <button
    mat-button
    ixTest="cancel"
   
  >{{ 'Cancel' | translate }}</button>
  <button
    mat-button
    color="warn"
    ixTest="delete"
    (click)="onDelete()"
  >{{ 'Delete' | translate }}</button>
</ix-form-actions>
</tn-dialog-shell>
