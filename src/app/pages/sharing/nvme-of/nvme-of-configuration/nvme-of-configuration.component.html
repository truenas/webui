@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'NVMe-oF Global Configuration' | translate"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Base NQN' | translate"
      [tooltip]="helptext.baseNqnTooltip | translate"
    >
      <tn-input formControlName="basenqn"></tn-input>
    </tn-form-field>

    @if (isEnterprise()) {
      <tn-form-field
        [label]="'Implementation (Experimental)' | translate"
        [tooltip]="helptext.implementationTooltip | translate"
        [tnTooltip]="form.controls.kernel.disabled ? (helptext.implementationDisabledTooltip | translate) : ''"
      >
        @for (option of implementationOptions; track option.value) {
          <tn-radio
            name="kernel"
            formControlName="kernel"
            [value]="option.value"
            [label]="option.label"
          ></tn-radio>
        }
      </tn-form-field>
    }

    <tn-form-field
      [tnTooltip]="form.controls.ana.disabled ? (helptext.anaDisabledTooltip | translate) : ''"
    >
      <tn-checkbox
        formControlName="ana"
        [label]="'Enable Asymmetric Namespace Access (ANA)' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [tooltip]="helptext.rdmaTooltip"
      [tnTooltip]="form.controls.rdma.disabled ? (helptext.rdmaDisabledTooltip | translate) : ''"
    >
      <tn-checkbox
        formControlName="rdma"
        [label]="'Enable Remote Direct Memory Access (RDMA)' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isLoading()"
        (onClick)="onSubmit()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
