@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'NVMe-oF Global Configuration' | translate"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <ix-input
      formControlName="basenqn"
      [label]="'Base NQN' | translate"
      [tooltip]="helptext.baseNqnTooltip | translate"
    ></ix-input>

    @if (isEnterprise()) {
      <div [matTooltip]="form.controls.kernel.disabled ? (helptext.implementationDisabledTooltip | translate) : ''">
        <ix-radio-group
          formControlName="kernel"
          [label]="'Implementation (Experimental)' | translate"
          [options]="implementationOptions$"
          [tooltip]="helptext.implementationTooltip | translate"
        ></ix-radio-group>
      </div>
    }

    <ix-checkbox
      formControlName="ana"
      [label]="'Enable Asymmetric Namespace Access (ANA)' | translate"
      [matTooltip]="form.controls.ana.disabled ? (helptext.anaDisabledTooltip | translate) : ''"
    ></ix-checkbox>

    <ix-checkbox
      formControlName="rdma"
      [label]="'Enable Remote Direct Memory Access (RDMA)' | translate"
      [tooltip]="helptext.rdmaTooltip"
      [matTooltip]="form.controls.rdma.disabled ? (helptext.rdmaDisabledTooltip | translate) : ''"
    ></ix-checkbox>
  </ix-fieldset>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [ixTest]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isLoading()"
        (onClick)="onSubmit()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
