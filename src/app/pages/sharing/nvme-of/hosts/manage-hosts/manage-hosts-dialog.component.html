<tn-dialog-shell [title]="'Hosts' | translate">


  <ix-table
    class="table"
    [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
    [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
  >
    <thead
      ix-table-head
      [columns]="columns"
      [dataProvider]="dataProvider"
    ></thead>
    <tbody
      ix-table-body
      [columns]="columns"
      [dataProvider]="dataProvider"
      [isLoading]="!!(dataProvider.isLoading$ | async)"
    ></tbody>
  </ix-table>

  <div class="controls">
    <button
      mat-button
      [ixTest]="['add-new']"
      (click)="onAdd()"
    >
      <tn-icon name="plus" library="mdi"></tn-icon>
      {{ 'Add New' | translate }}
    </button>
  </div>
</tn-dialog-shell>
