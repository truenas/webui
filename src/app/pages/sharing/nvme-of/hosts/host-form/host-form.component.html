@if (slideInRef) {
  <ix-modal-header
    [title]="isNew() ? ('Add Host' | translate) : ('Edit Host' | translate)"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <tn-form-field
      class="host-nqn"
      [label]="'Host NQN' | translate"
      [tooltip]="helptext.hostNqnTooltip | translate"
      [required]="true"
    >
      <tn-input testId="hostnqn" formControlName="hostnqn"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Description' | translate"
      [tooltip]="helptext.hostDescriptionTooltip | translate"
    >
      <tn-input testId="description" formControlName="description"></tn-input>
    </tn-form-field>
  </ix-fieldset>

  <ix-fieldset [title]="'Authentication' | translate">
    <tn-checkbox
      testId="require-host-authentication"
      formControlName="requireHostAuthentication"
      [label]="'Require Host Authentication' | translate"
    ></tn-checkbox>

    @if (form.value.requireHostAuthentication) {
      <ix-details-table class="authentication-details">
        <ix-details-item [label]="'Hash' | translate">
          <ix-editable>
            <div view>
              {{ form.value.dhchap_hash }}
            </div>

            <div edit>
              <tn-select
                testId="dhchap-hash"
                formControlName="dhchap_hash"
                [options]="(hashOptions$ | async) ?? []"
              ></tn-select>
            </div>
          </ix-editable>
        </ix-details-item>
      </ix-details-table>

      <tn-form-field
        [label]="'Key For Host To Present' | translate"
        [tooltip]="helptext.dhchapKeyTooltip | translate"
      >
        <tn-input
          testId="dhchap-key"
          formControlName="dhchap_key"
          [multiline]="true"
        ></tn-input>
      </tn-form-field>

      <div class="generate-key-row">
        <tn-button
          [testId]="'generate-key'"
          [label]="'Generate Key' | translate"
          [disabled]="!hasNqn || isGeneratingHostKey()"
          [tnTooltip]="!hasNqn ? (helptext.generateHostKeyDisabled | translate) : ''"
          (onClick)="generateHostKey()"
        ></tn-button>
      </div>

      <tn-form-field
        [label]="'Key For TrueNAS To Present (Optional)' | translate"
        [tooltip]="helptext.dhchapCtrlKey | translate"
      >
        <tn-input
          testId="dhchap-ctrl-key"
          formControlName="dhchap_ctrl_key"
          [multiline]="true"
        ></tn-input>
      </tn-form-field>

      <div class="generate-key-row">
        <tn-button
          [testId]="'generate-key'"
          [label]="'Generate Key' | translate"
          [disabled]="isGeneratingTrueNasKey()"
          (onClick)="generateTrueNasKey()"
        ></tn-button>
      </div>

      <tn-form-field
        class="dh-checkbox"
        [tooltip]="helptext.dhKeyExchangeTooltip | translate"
      >
        <tn-checkbox
          testId="add-dh-key-exchange"
          formControlName="addDhKeyExchange"
          [label]="'Also use Diffie–Hellman key exchange for additional security' | translate"
        ></tn-checkbox>
      </tn-form-field>

      @if (form.value.addDhKeyExchange) {
        <ix-details-table class="authentication-details">
          <ix-details-item [label]="'DH Group' | translate">
            <ix-editable>
              <div view>
                {{ form.value.dhchap_dhgroup || (helptext.noDhText | translate) }}
              </div>

              <div edit>
                <tn-select
                  class="dh-group-select"
                  testId="dhchap-dhgroup"
                  formControlName="dhchap_dhgroup"
                  [allowEmpty]="true"
                  [options]="(dhGroupOptions$ | async) ?? []"
                ></tn-select>
              </div>
            </ix-editable>
          </ix-details-item>
        </ix-details-table>
      }
    }
  </ix-fieldset>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isLoading()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
