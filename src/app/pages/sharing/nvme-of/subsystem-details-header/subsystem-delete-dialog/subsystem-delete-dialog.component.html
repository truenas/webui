<tn-dialog-shell testId="subsystem-delete" [title]="'Delete Subsystem' | translate">
<div>
  <p class="message">{{ 'Are you sure you want to delete subsystem {subsys}?' | translate: { subsys: subsystem.name } }}</p>
  <tn-checkbox
    testId="force"
    [label]="'Force' | translate"
    [formControl]="force"
  ></tn-checkbox>
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close({ confirmed: false })"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="warn" testId="delete" [label]="'Delete' | translate" (onClick)="delete()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
