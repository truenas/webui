<tn-dialog-shell testId="manage-ports" [title]="'Ports' | translate">


  <ix-table
    class="table"
    [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
    [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
  >
    <thead
      ix-table-head
      [columns]="columns"
      [dataProvider]="dataProvider"
    ></thead>
    <tbody
      ix-table-body
      [columns]="columns"
      [dataProvider]="dataProvider"
      [isLoading]="!!(dataProvider.isLoading$ | async)"
    ></tbody>
  </ix-table>

  <div class="controls">
    <tn-button
      variant="outline"
      [testId]="['add-new']"
      [label]="'Add New' | translate"
      (onClick)="onAdd()"
    ></tn-button>
  </div>
</tn-dialog-shell>
