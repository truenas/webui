@if (noPortsExist()) {
  <tn-button
    *ixRequiresRoles="requiredRoles"
    [testId]="'add-port'"
    [label]="'Add' | translate"
    (onClick)="openPortForm()"
  ></tn-button>
}
@else {
  <tn-button
    *ixRequiresRoles="requiredRoles"
    iconPosition="right"
    [icon]="menuDownIcon"
    [testId]="'add-port'"
    [label]="'Add' | translate"
    [tnMenuTriggerFor]="addMenu"
  ></tn-button>

  <tn-menu #addMenu>
    @for (port of unusedPorts(); track port.id) {
      <tn-menu-item
        [testId]="addPortTestId(port)"
        (itemClick)="selectPort(port)"
      >
        <ix-port-description [port]="port"></ix-port-description>
      </tn-menu-item>
    }

    <tn-divider></tn-divider>

    <tn-menu-item
      [testId]="'create-new-port'"
      [label]="'Create New' | translate"
      (itemClick)="openPortForm()"
    ></tn-menu-item>

    <tn-menu-item
      [testId]="'manage-ports'"
      [label]="'Manage Ports' | translate"
      (itemClick)="onManagePorts()"
    ></tn-menu-item>
  </tn-menu>
}
