@if (noPortsExist()) {
  <tn-button
    *ixRequiresRoles="requiredRoles"
    [testId]="'add-port'"
    [label]="'Add' | translate"
    (onClick)="openPortForm()"
  ></tn-button>
}
@else {
  <tn-button
    *ixRequiresRoles="requiredRoles"
    iconPosition="right"
    [icon]="menuDownIcon"
    [testId]="'add-port'"
    [label]="'Add' | translate"
    [tnMenuTriggerFor]="addMenu"
  ></tn-button>

  <tn-menu #addMenu>
    @for (port of unusedPorts(); track port.id) {
      <tn-menu-item
        [testId]="['add-port', port.addr_trtype, port.addr_traddr, port.addr_trsvcid]"
        (itemClick)="selectPort(port)"
      >
        <ix-port-description [port]="port"></ix-port-description>
      </tn-menu-item>
    }

    <tn-divider></tn-divider>

    <tn-menu-item
      [testId]="'create-new-port'"
      [label]="'Create New' | translate"
      (itemClick)="openPortForm()"
    ></tn-menu-item>

    <tn-menu-item
      [testId]="'manage-ports'"
      [label]="'Manage Ports' | translate"
      (itemClick)="onManagePorts()"
    ></tn-menu-item>
  </tn-menu>
}

<tn-side-panel
  [title]="portPanelTitle()"
  [closeGuard]="portCloseGuard"
  [(open)]="portPanelOpen"
>
  @if (portPanelOpen()) {
    <ix-port-form
      [data]="portToEdit()"
      (saved)="onPortSaved($event)"
    ></ix-port-form>
  }
  @if (portForm(); as form) {
    <tn-button
      *ixRequiresRoles="requiredRoles"
      tnSidePanelAction
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
