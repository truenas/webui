<ix-modal-header
  [title]="isNew() ? ('Add Namespace' | translate) : ('Edit Namespace' | translate)"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <tn-button-toggle-group
      formControlName="device_type"
      [ariaLabel]="'Type' | translate"
    >
      @for (option of (typeOptions$ | async) ?? []; track option.value) {
        <tn-button-toggle
          [value]="option.value"
          [testId]="['device-type', option.value]"
        >{{ option.label }}</tn-button-toggle>
      }
    </tn-button-toggle-group>

    @switch (form.value.device_type) {
      @case (FormNamespaceType.Zvol) {
        <ix-explorer
          formControlName="device_path"
          [label]="'Path To Zvol' | translate"
          [rootNodes]="zvolsRootNode"
          [nodeProvider]="zvolProvider"
        >
          <ix-explorer-create-zvol></ix-explorer-create-zvol>
        </ix-explorer>
      }

      @case (FormNamespaceType.ExistingFile) {
        <ix-explorer
          formControlName="device_path"
          [label]="'Path To File' | translate"
          [rootNodes]="datasetsRootNode"
          [nodeProvider]="fileProvider"
        ></ix-explorer>
      }

      @case (FormNamespaceType.NewFile) {
        <ix-explorer
          formControlName="device_path"
          [label]="'Parent Directory' | translate"
          [rootNodes]="datasetsRootNode"
          [nodeProvider]="directoryProvider"
        >
          <ix-explorer-create-dataset></ix-explorer-create-dataset>
        </ix-explorer>

        <tn-form-field [label]="'Filename' | translate" [required]="true">
          <tn-input testId="filename" formControlName="filename"></tn-input>
        </tn-form-field>

        <tn-form-field [label]="'File Size' | translate" [required]="true">
          <tn-input
            testId="filesize"
            formControlName="filesize"
            sizeStandard="iec"
            sizeDefaultUnit="MiB"
            [inputType]="InputType.Size"
          ></tn-input>
        </tn-form-field>
      }
    }
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      type="submit"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
