<ix-page-header [pageTitle]="hasFibreChannel() ? ('iSCSI / Fibre Channel' | translate) : ('iSCSI' | translate)">
  <tn-button
    color="default"
    [testId]="'global-target-configuration'"
    [ixUiSearch]="searchableElements.elements.config"
    [label]="'Global Target Configuration' | translate"
    (onClick)="openGlobalTargetConfiguration()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    [testId]="'wizard'"
    [label]="'Wizard' | translate"
    (onClick)="openWizard()"
  ></tn-button>
</ix-page-header>

<!-- HELD on mat-tab-nav-bar: link-based tab-nav has no tn-* equivalent yet (tn-tabs is
  content-panel based, no routerLink support — anchors preserve middle-click/new-tab and
  the legacy link-* test ids). Same hold as smb-status. Surface to NAS-141021 lead. -->
<nav mat-tab-nav-bar [tabPanel]="tabPanel">
  @for (link of navLinks(); track link.label) {
    <a
      #rla="routerLinkActive"
      mat-tab-link
      routerLinkActive
      [ixTest]="link.label"
      [routerLink]="link.path"
      [active]="rla.isActive"
    >
      {{ link.label | translate }}
    </a>
  }
</nav>
<mat-tab-nav-panel #tabPanel>
  <router-outlet></router-outlet>
</mat-tab-nav-panel>
