<ix-page-header [pageTitle]="hasFibreChannel() ? ('iSCSI / Fibre Channel' | translate) : ('iSCSI' | translate)">
  <tn-button
    color="default"
    [testId]="'global-target-configuration'"
    [ixUiSearch]="searchableElements.elements.config"
    [label]="'Global Target Configuration' | translate"
    (onClick)="openGlobalTargetConfiguration()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    [testId]="'wizard'"
    [label]="'Wizard' | translate"
    (onClick)="openWizard()"
  ></tn-button>
</ix-page-header>

<!-- tn-tabs is content/index-based, so routing is wired manually: the URL drives
  [selectedIndex] and a user tab switch navigates (see onTabChange). Tabs render as
  buttons — legacy `link-*` test ids become `tab-*` (e2e callout). -->
<tn-tabs [selectedIndex]="activeTabIndex()" (tabChange)="onTabChange($event)">
  @for (link of navLinks(); track link.path) {
    <tn-tab [label]="link.label" [testId]="link.slug" />
  }
</tn-tabs>
<router-outlet></router-outlet>
