<tn-dialog-shell [title]="'Delete iSCSI extent {name}?' | translate: { name: extent.name }">
<div>
  <form [formGroup]="form">
    @if (isFile) {
      <ix-checkbox
        formControlName="remove"
        [label]="'Remove file?' | translate"
      ></ix-checkbox>
    }
    <ix-checkbox
      formControlName="force"
      [label]="'Force' | translate"
    ></ix-checkbox>
  </form>
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" ixTest="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="warn" ixTest="delete" [label]="'Delete' | translate" (onClick)="onDelete()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
