<tn-dialog-shell testId="delete-extent" [title]="'Delete iSCSI extent {name}?' | translate: { name: extent.name }">
<div>
  <form [formGroup]="form">
    @if (isFile) {
      <tn-checkbox
        formControlName="remove"
        testId="remove"
        [label]="'Remove file?' | translate"
      ></tn-checkbox>
    }
    <tn-checkbox
      formControlName="force"
      testId="force"
      [label]="'Force' | translate"
    ></tn-checkbox>
  </form>
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="warn" testId="delete" [label]="'Delete' | translate" (onClick)="onDelete()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
