<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="'iSCSI Wizard' | translate"
  [loading]="isLoading()"
></ix-modal-header>

<mat-card class="card">
  <form [formGroup]="form" (keydown.enter)="$event.preventDefault()" (submit)="onSubmit()">
    <mat-vertical-stepper #stepper>
      <ix-use-ix-icons-in-stepper></ix-use-ix-icons-in-stepper>

      <mat-step #matStepInstance>
        <ng-template matStepLabel>{{ 'Target' | translate }}</ng-template>
        <ix-target-wizard-step [form]="form.controls.target"></ix-target-wizard-step>
        <div class="step-buttons">
          <tn-button
            color="primary"
            type="button"
            [testId]="'next'"
            [label]="'Next' | translate"
            [disabled]="form.controls.target.invalid"
            (onClick)="nextStep()"
          ></tn-button>
        </div>
      </mat-step>

      <mat-step #matStepInstance>
        <ng-template matStepLabel>{{ 'Extent' | translate }}</ng-template>
        <ix-extent-wizard-step [form]="form.controls.extent"></ix-extent-wizard-step>
        <div class="step-buttons">
          <tn-button
            color="secondary"
            type="button"
            [testId]="'back'"
            [label]="'Back' | translate"
            (onClick)="previousStep()"
          ></tn-button>
          @if (isNewTarget) {
            <tn-button
              color="primary"
              type="button"
              [testId]="'next'"
              [label]="'Next' | translate"
              [disabled]="form.controls.extent.invalid"
              (onClick)="nextStep()"
            ></tn-button>
          } @else {
            <tn-button
              color="primary"
              type="submit"
              [testId]="'save'"
              [label]="'Save' | translate"
              [disabled]="form.invalid || isLoading()"
            ></tn-button>
          }
        </div>
      </mat-step>

      @if (isNewTarget) {
        <mat-step #matStepInstance>
          <ng-template matStepLabel>{{ 'Protocol Options' | translate }}</ng-template>
          <ix-protocol-options-wizard-step
            [form]="form.controls.options"
            [isFibreChannelMode]="isFibreChannelMode"
            [addFcPort]="addFcPort.bind(this)"
            [deleteFcPort]="deleteFcPort.bind(this)"
            [getUsedPhysicalPorts]="getUsedPhysicalPortsFn()"
            [availablePorts]="availableFcPorts()"
          ></ix-protocol-options-wizard-step>

          @if (isFibreChannelMode && validateFcPorts().length > 0) {
            <div class="fc-port-error" role="alert">
              {{ validateFcPorts().join(', ') }}
            </div>
          }

          <div class="step-buttons">
            <tn-button
              color="secondary"
              type="button"
              [testId]="'back'"
              [label]="'Back' | translate"
              (onClick)="previousStep()"
            ></tn-button>
            <tn-button
              *ixRequiresRoles="requiredRoles"
              color="primary"
              type="submit"
              [testId]="'save'"
              [label]="'Save' | translate"
              [disabled]="form.invalid || (isFibreChannelMode && !areFcPortsValid()) || isLoading()"
            ></tn-button>
          </div>
        </mat-step>
      }
    </mat-vertical-stepper>
  </form>
</mat-card>
