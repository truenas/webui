<ng-container [formGroup]="form()">
  @if(isFibreChannelMode()) {
    <ix-list
      formArrayName="fcPorts"
      [empty]="form().controls.fcPorts.controls.length === 0"
      [label]="'Fibre Channel Ports' | translate"
      [formArray]="form().get('fcPorts')"
      (add)="addFcPort()()"
    >
      @if (form().controls.fcPorts.controls.length >= 2) {
        <ix-fc-mpio-info-banner></ix-fc-mpio-info-banner>
      }

      @for (entry of form().controls.fcPorts.controls; track entry; let i = $index) {
        <ix-list-item [label]="'Port' | translate" (delete)="deleteFcPort()(i)">
          <ix-fc-port-item-controls
            [form]="form().controls.fcPorts.at(i)"
            [isEdit]="false"
            [currentPort]="null"
            [usedPhysicalPorts]="getUsedPhysicalPorts()(i)"
            [availablePorts]="availablePorts()"
          ></ix-fc-port-item-controls>
        </ix-list-item>
      }
    </ix-list>
  } @else {
    <tn-form-field
      [label]="helptextSharingIscsi.portalLabel | translate"
      [tooltip]="helptextSharingIscsi.portalTooltip | translate"
    >
      <tn-select
        formControlName="portal"
        [options]="(portalOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>
    @if (isNewPortal) {
      <ix-list
        formArrayName="listen"
        [empty]="form().controls.listen.controls.length === 0"
        [label]="helptextSharingIscsi.portal.ipLabel | translate"
        [tooltip]="helptextSharingIscsi.portal.ipTooltip | translate"
        [required]="true"
        [formArray]="form().get('listen')"
        (add)="addAddress()"
        >
        @for (network of form().controls.listen.controls; track network; let i = $index) {
          <ix-list-item
            [label]="helptextSharingIscsi.portal.ipLabel | translate"
            (delete)="removeAddress(i)"
            >
            <tn-form-field
              [label]="helptextSharingIscsi.portal.ipLabel | translate"
              [required]="true"
            >
              <tn-select
                [formControlName]="i"
                [options]="(addressOptions$ | async) ?? []"
              ></tn-select>
            </tn-form-field>
          </ix-list-item>
        }
      </ix-list>
    }
    <tn-form-field
      [label]="helptextSharingIscsi.initiatorsLabel | translate"
      [tooltip]="helptextSharingIscsi.initiatorsTooltip | translate"
    >
      <tn-chip-input
        formControlName="initiators"
        [allowCustomValue]="true"
      ></tn-chip-input>
    </tn-form-field>
  }
</ng-container>
