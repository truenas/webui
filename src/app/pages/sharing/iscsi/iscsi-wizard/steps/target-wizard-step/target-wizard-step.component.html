<ng-container [formGroup]="form()">
  @if (hasFibreChannel() && isNewTarget) {
    <ix-radio-group
      formControlName="mode"
      [label]="'Mode' | translate"
      [options]="modeOptions$"
    ></ix-radio-group>
  }
  <tn-form-field
    [label]="helptextSharingIscsi.targetLabel | translate"
    [tooltip]="helptextSharingIscsi.targetTooltip | translate"
    [required]="true"
  >
    <tn-select
      formControlName="target"
      [options]="(targetOptions$ | async) ?? []"
    ></tn-select>
  </tn-form-field>
</ng-container>
