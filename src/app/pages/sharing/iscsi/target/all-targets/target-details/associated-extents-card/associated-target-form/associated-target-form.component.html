<tn-dialog-shell [title]="''">
<h1>
  {{ 'Associate' | translate }}
  {{ data.target.name }}
</h1>


  <form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
    <ix-fieldset>
      <ix-input
        formControlName="lunid"
        type="number"
        [label]="'LUN ID' | translate"
        [tooltip]="tooltips.lunid | translate"
      ></ix-input>

      <ix-select
        formControlName="extent"
        [label]="'Extent' | translate"
        [tooltip]="tooltips.extent | translate"
        [options]="extents$"
        [required]="true"
      ></ix-select>
    </ix-fieldset>

    <ix-form-actions tnDialogAction class="form-actions">
      <button
        mat-button
        type="button"
        ixTest="cancel-associate-target"
       
      >
        {{ 'Cancel' | translate }}
      </button>

      <button
        *ixRequiresRoles="requiredRoles"
        mat-button
        type="submit"
        color="primary"
        ixTest="associate-target"
        [disabled]="form.invalid || isLoading()"
      >
        {{ 'Associate' | translate }}
      </button>
    </ix-form-actions>
  </form>
</tn-dialog-shell>
