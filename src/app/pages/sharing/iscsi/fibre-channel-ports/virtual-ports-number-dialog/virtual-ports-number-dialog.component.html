<tn-dialog-shell [title]="'Change Number Of Virtual Ports' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="submit()">
  <ix-input
    formControlName="virtualPorts"
    type="number"
    [required]="true"
    [label]="'Virtual Ports' | translate"
  ></ix-input>
</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    color="primary"
    ixTest="delete"
    [label]="'Change' | translate"
    [disabled]="form.invalid"
    (onClick)="submit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
