<tn-card
  [title]="'Authorized Access' | translate"
  [ixUiSearch]="searchableElements.elements.list"
>
  <ng-template tnCardHeaderActions>
    <div class="actions">
      <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>

      <ix-table-column-picker
        [columns]="columns()"
        [columnPreferencesKey]="'authorizedAccessList'"
        (columnsChange)="onColumnsChange($event)"
      ></ix-table-column-picker>

      <!-- testId preserves the legacy ixTest value (`button-add-target-extent`), which e2e selects on. -->
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [testId]="'add-target-extent'"
        [ixUiSearch]="searchableElements.elements.add"
        [label]="'Add' | translate"
        (onClick)="doAdd()"
      ></tn-button>
    </div>
  </ng-template>

  @let emptyConf = emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async);
  <tn-table
    class="table"
    [testId]="'table-table'"
    [dataSource]="(dataProvider.currentPage$ | async) ?? []"
    [displayedColumns]="displayedColumns()"
    [trackBy]="trackByAuthId"
    [loading]="!!(dataProvider.isLoading$ | async)"
    [emptyMessage]="emptyConf?.title ? (emptyConf.title | translate) : ''"
    [emptyIcon]="emptyConf?.icon ?? ''"
    (sortChange)="onSortChange($event)"
  >
    <ng-container [tnColumnDef]="'tag'" [sortable]="true">
      <ng-template tnHeaderCellDef>{{ 'Group ID' | translate }}</ng-template>
      <ng-template let-row tnCellDef>
        <span
          tnTestIdType="text"
          [tnTestId]="[('Group ID' | translate), uniqueRowTag(row), 'row-text']"
        >{{ row.tag }}</span>
      </ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'user'" [sortable]="true">
      <ng-template tnHeaderCellDef>{{ 'User' | translate }}</ng-template>
      <ng-template let-row tnCellDef>
        <span
          tnTestIdType="text"
          [tnTestId]="[('User' | translate), uniqueRowTag(row), 'row-text']"
        >{{ row.user }}</span>
      </ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'peeruser'" [sortable]="true">
      <ng-template tnHeaderCellDef>{{ 'Peer User' | translate }}</ng-template>
      <ng-template let-row tnCellDef>
        <span
          tnTestIdType="text"
          [tnTestId]="[('Peer User' | translate), uniqueRowTag(row), 'row-text']"
        >{{ row.peeruser }}</span>
      </ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
      <ng-template tnHeaderCellDef></ng-template>
      <ng-template let-row tnCellDef>
        <ix-table-actions-cell
          [actions]="actions"
          [row]="row"
          [uniqueRowTag]="uniqueRowTag(row)"
          [ariaLabel]="ariaLabel(row)"
        ></ix-table-actions-cell>
      </ng-template>
    </ng-container>
  </tn-table>

  <tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
</tn-card>
