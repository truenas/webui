<tn-icon name="information" library="mdi" class="warning-icon"></tn-icon>

<div class="warning-content">
  <span class="warning-text">
    {{ 'This parameter requires Apple SMB2/3 protocol extension support to be enabled in SMB service.' | translate }}
  </span>
  <tn-button
    class="enable-button"
    [testId]="'enable-apple-extensions'"
    [label]="'Enable Now' | translate"
    (onClick)="enableExtensions()"
  ></tn-button>
</div>
