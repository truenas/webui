<span class="tier-label">{{ tierLabel() }}</span>

@if (tierJob(); as job) {
  @if (jobIcon(); as icon) {
    <tn-icon
      class="job-status-icon"
      size="sm"
      role="button"
      tabindex="0"
      [class.spinning]="icon.spinning"
      [name]="icon.name"
      [library]="icon.library"
      [color]="icon.color"
      [tnTooltip]="'Migration: {status}' | translate: { status: jobStatusLabel() }"
      [attr.aria-label]="'Migration: {status}' | translate: { status: jobStatusLabel() }"
      (click)="onActivate($event)"
      (keydown.enter)="onActivate($event)"
      (keydown.space)="onActivate($event)"
    />
  } @else {
    <span
      class="job-status-text"
      role="button"
      tabindex="0"
      [ngClass]="jobStatusClass()"
      [attr.aria-label]="'Migration: {status}' | translate: { status: jobStatusLabel() }"
      (click)="onActivate($event)"
      (keydown.enter)="onActivate($event)"
      (keydown.space)="onActivate($event)"
    >
      {{ 'Migration: {status}' | translate: { status: jobStatusLabel() } }}
    </span>
  }
}
