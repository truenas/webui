<span class="tier-label">{{ tierLabel() }}</span>

@if (tierJob(); as job) {
  @if (jobIcon(); as icon) {
    <tn-icon
      class="job-status-icon"
      size="sm"
      [class.spinning]="icon.spinning"
      [name]="icon.name"
      [library]="icon.library"
      [color]="icon.color"
      [matTooltip]="'Migration: ' + jobStatusLabel()"
      (click)="openMigrationDialog($event)"
    />
  } @else {
    <span
      class="job-status-text"
      [ngClass]="jobStatusClass()"
      (click)="openMigrationDialog($event)"
    >
      {{ 'Migration:' | translate }} {{ jobStatusLabel() }}
    </span>
  }
}
