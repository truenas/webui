<tn-card
  padding="small"
  [bordered]="true"
  [headerStatus]="serviceStatus()"
  [headerMenu]="serviceMenu()"
  [headerMenuTriggerTestId]="headerMenuTriggerTestId()"
  [primaryAction]="addAction()"
  [secondaryAction]="openAction()"
>
  <a
    tnCardHeader
    class="card-title-link"
    [ixTest]="['webshare', 'open-in-new']"
    [routerLink]="['/sharing', 'webshare']"
    [tnTooltip]="'Open WebShare list in full page' | translate"
  >
    <h3 class="card-title">
      {{ 'WebShare' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open WebShare list in full page' | translate"
      ></tn-icon>
      <ix-card-alert-badge [menuPath]="cardMenuPath" />
    </h3>
  </a>

  @if (!(hasTruenasConnect$ | async)) {
    <tn-banner
      class="clickable"
      role="button"
      tabindex="0"
      [heading]="'WebShares unavailable' | translate"
      [message]="'WebShare service requires TrueNAS Connect to be configured and active.' | translate"
      (click)="openTruenasConnectDialog()"
      (keydown.enter)="openTruenasConnectDialog()"
      (keydown.space)="openTruenasConnectDialog(); $event.preventDefault()"
    ></tn-banner>
  }

  @if (showNoWebshareUsersNotice$ | async) {
    <tn-banner
      class="clickable"
      role="button"
      tabindex="0"
      [heading]="'No WebShare users' | translate"
      [message]="'It appears you have no users configured to access WebShare.' | translate"
      (click)="navigateToUsers()"
      (keydown.enter)="navigateToUsers()"
      (keydown.space)="navigateToUsers(); $event.preventDefault()"
    ></tn-banner>
  }

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="webshare"
      iconLibrary="custom"
      [title]="'WebShare service provides web-based file access. Users can access these shares if they have the WebShare Enabled option set on their account.' | translate"
    ></tn-empty>
  } @else {
    <ix-table
      class="table"
      [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
      [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
    >
      <thead
        ix-table-head
        [columns]="columns"
        [dataProvider]="dataProvider"
      ></thead>
      <tbody
        ix-table-body
        [columns]="columns"
        [dataProvider]="dataProvider"
        [isLoading]="!!(dataProvider.isLoading$ | async)"
      ></tbody>
    </ix-table>
  }

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['webshare']"
    [routerLink]="['/sharing', 'webshare']"
  ></ix-table-pager-show-more>
</tn-card>

<tn-side-panel
  [title]="'WebShare' | translate"
  [(open)]="configOpen"
  [closeGuard]="closeConfigGuard"
>
  @if (configOpen()) {
    <ix-service-webshare (closed)="onConfigClosed()"></ix-service-webshare>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      [ixTest]="'save'"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
