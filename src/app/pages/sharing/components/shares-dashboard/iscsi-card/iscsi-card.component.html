<tn-card
  padding="small"
  [bordered]="true"
  [headerStatus]="serviceStatus()"
  [headerMenu]="serviceMenu()"
  [primaryAction]="wizardAction()"
>
  <a
    tnCardHeader
    class="card-title-link"
    [ixTest]="['iscsi-share', 'open-in-new']"
    [ixUiSearch]="searchableElements.elements.wizard"
    [routerLink]="['/sharing', 'iscsi', 'targets']"
    [tnTooltip]="'Open iSCSI list in full page' | translate"
  >
    <h3 class="card-title">
      @if (hasFibreChannel()) {
        {{ 'Block (iSCSI/FC) Shares Targets' | translate }}
      } @else {
        {{ 'Block (iSCSI) Shares Targets' | translate }}
      }
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open iSCSI list in full page' | translate"
      ></tn-icon>
      <ix-card-alert-badge [menuPath]="cardMenuPath" />
    </h3>
  </a>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <ix-empty [conf]="emptyConfig"></ix-empty>
  } @else {
    <ix-table
      class="table"
      [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
      [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
    >
      <thead
        ix-table-head
        [columns]="columns"
        [dataProvider]="dataProvider"
      ></thead>
      <tbody
        ix-table-body
        [columns]="columns"
        [dataProvider]="dataProvider"
        [isLoading]="!!(dataProvider.isLoading$ | async)"
      ></tbody>
    </ix-table>
  }

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['iscsi']"
    [routerLink]="['/sharing', 'iscsi', 'targets']"
  ></ix-table-pager-show-more>
</tn-card>

<tn-side-panel
  [title]="'iSCSI Global Configuration' | translate"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-global-target-configuration (closed)="onConfigClosed()"></ix-global-target-configuration>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      [ixTest]="['iscsi-config', 'save']"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
