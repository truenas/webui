<tn-card
  padding="small"
  [bordered]="true"
  [headerStatus]="serviceStatus()"
  [headerMenu]="serviceMenu()"
  [headerMenuTriggerTestId]="headerMenuTriggerTestId()"
  [primaryAction]="addAction()"
>
  <a
    tnCardHeader
    class="card-title-link"
    [ixTest]="['smb-share', 'open-in-new']"
    [routerLink]="['/sharing', 'smb']"
    [tnTooltip]="'Open SMB list in full page' | translate"
  >
    <h3 class="card-title">
      {{ 'Windows (SMB) Shares' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open SMB list in full page' | translate"
      ></tn-icon>
      <ix-card-alert-badge [menuPath]="cardMenuPath" />
    </h3>
  </a>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="smb-share"
      iconLibrary="custom"
      [title]="'Well supported by all major operating systems, allows for easy authentication and authorization. Choose SMB for easy file sharing across mixed operating systems, especially in home or office networks.' | translate"
    ></tn-empty>
  } @else {
    <ix-table
      class="table"
      [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
      [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
    >
      <thead
        ix-table-head
        [columns]="columns"
        [dataProvider]="dataProvider"
      ></thead>
      <tbody
        ix-table-body
        [columns]="columns"
        [dataProvider]="dataProvider"
        [isLoading]="!!(dataProvider.isLoading$ | async)"
      ></tbody>
    </ix-table>
  }

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['smb']"
    [routerLink]="['/sharing', 'smb']"
  ></ix-table-pager-show-more>
</tn-card>

<tn-side-panel
  [title]="'SMB' | translate"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-service-smb (closed)="onConfigClosed()"></ix-service-smb>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      [ixTest]="'save'"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
