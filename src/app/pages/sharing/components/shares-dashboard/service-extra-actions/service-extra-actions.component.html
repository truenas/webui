@if (service(); as svc) {
  <tn-icon-button
    name="dots-vertical"
    library="mdi"
    size="md"
    [ariaLabel]="'Actions for {name}' | translate: { name: serviceNames.get(svc.service) }"
    [tooltip]="'Actions for {name}' | translate: { name: serviceNames.get(svc.service) }"
    [ixTest]="[svc.id, 'actions-menu']"
    [tnMenuTriggerFor]="actionsMenu"
  />
  <tn-menu #actionsMenu [items]="menuItems()" />
}
