<tn-card
  padding="small"
  [bordered]="true"
  [headerStatus]="serviceStatus()"
  [headerMenu]="serviceMenu()"
  [headerMenuTriggerTestId]="headerMenuTriggerTestId()"
  [primaryAction]="addAction()"
>
  <a
    tnCardHeader
    class="card-title-link"
    [ixTest]="['nfs-share', 'open-in-new']"
    [routerLink]="['/sharing', 'nfs']"
    [tnTooltip]="'Open NFS list in full page' | translate"
  >
    <h3 class="card-title">
      {{ 'UNIX (NFS) Shares' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open NFS list in full page' | translate"
      ></tn-icon>
      <ix-card-alert-badge [menuPath]="cardMenuPath" />
    </h3>
  </a>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="nfs-share"
      iconLibrary="custom"
      [title]="'Optimized for Linux and Unix systems, offering deeper integration in those environments. Choose NFS if you\'re working primarily with Linux servers or need efficient file access in Unix-based workflows.' | translate"
    ></tn-empty>
  } @else {
    <ix-table
      class="table"
      [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
      [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
    >
      <thead
        ix-table-head
        [columns]="columns"
        [dataProvider]="dataProvider"
      ></thead>
      <tbody
        ix-table-body
        [columns]="columns"
        [dataProvider]="dataProvider"
        [isLoading]="!!(dataProvider.isLoading$ | async)"
      ></tbody>
    </ix-table>
  }

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['nfs']"
    [routerLink]="['/sharing', 'nfs']"
  ></ix-table-pager-show-more>
</tn-card>

<tn-side-panel
  [title]="'NFS' | translate"
  [(open)]="configOpen"
  [closeGuard]="closeConfigGuard"
>
  @if (configOpen()) {
    <ix-service-nfs (closed)="onConfigClosed()"></ix-service-nfs>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      [ixTest]="'save'"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
