<tn-card
  padding="small"
  [headerStatus]="serviceStatus()"
  [headerMenu]="serviceMenu()"
  [headerMenuTriggerTestId]="headerMenuTriggerTestId()"
  [primaryAction]="addAction()"
>
  <a
    tnCardHeader
    class="card-title-link"
    [ixTest]="['nvme-of', 'open-in-new']"
    [routerLink]="['/sharing', 'nvme-of']"
    [tnTooltip]="'Open NVMe-oF list in full page' | translate"
  >
    <h3 class="card-title">
      {{ 'NVMe-oF Subsystems' | translate }}
      <tn-icon
        name="open-in-new"
        library="mdi"
        class="title-icon"
        [attr.aria-label]="'Open NVMe-oF list in full page' | translate"
      ></tn-icon>
      <ix-card-alert-badge [menuPath]="cardMenuPath" />
    </h3>
  </a>

  @if (!(dataProvider().currentPageCount$ | async) && !(dataProvider().isLoading$ | async)) {
    <tn-empty
      icon="nvme-share"
      iconLibrary="custom"
      [title]="'Raw block storage using NVMe over Fabrics (e.g. NVMe/TCP), appearing as a local disk on the client. Compared to iSCSI, NVMe-oF offers significantly lower latency and higher throughput.' | translate"
    ></tn-empty>
  } @else {
    <ix-table
      class="table"
      [ix-table-empty]="!(dataProvider().currentPageCount$ | async)"
      [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider().emptyType$ | async)"
    >
      <thead
        ix-table-head
        [columns]="columns"
        [dataProvider]="dataProvider()"
      ></thead>
      <tbody
        ix-table-body
        [columns]="columns"
        [dataProvider]="dataProvider()"
        [isLoading]="!!(dataProvider().isLoading$ | async)"
      >
        <ng-template
          let-subsystem
          ix-table-cell
          [columnIndex]="0"
          [dataProvider]="dataProvider()"
        >
          <ix-subsystem-name-cell [subsystem]="subsystem"></ix-subsystem-name-cell>
        </ng-template>
      </tbody>
    </ix-table>

    <ix-table-pager-show-more
      [pageSize]="4"
      [dataProvider]="dataProvider()"
      [ixTestOverride]="['nvme-of']"
      [routerLink]="['/sharing', 'nvme-of']"
    ></ix-table-pager-show-more>
  }
</tn-card>

<tn-side-panel
  [title]="'NVMe-oF Global Configuration' | translate"
  [closeGuard]="closeConfigGuard"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-nvme-of-configuration (closed)="onConfigClosed()"></ix-nvme-of-configuration>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      [ixTest]="'save'"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
