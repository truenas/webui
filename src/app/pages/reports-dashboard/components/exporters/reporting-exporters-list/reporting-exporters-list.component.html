<tn-card [padContent]="false">
  <h3 tnCardHeader class="tn-card__title">{{ 'Reporting Exporters' | translate }}</h3>

  <div class="actions action-icon">
    <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      testId="add-reporting-exporter"
      [label]="'Add' | translate"
      [ixUiSearch]="searchableElements.elements.add"
      (onClick)="doAdd()"
    ></tn-button>
  </div>

  <ix-fake-progress-bar [loading]="!!(isLoading$ | async)"></ix-fake-progress-bar>
  <ix-table
    [ixUiSearch]="searchableElements.elements.exporters"
    [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
    [emptyConfig]="emptyService.defaultEmptyConfig(emptyType$ | async)"
  >
    <thead
      ix-table-head
      [columns]="columns"
      [dataProvider]="dataProvider"
    ></thead>
    <tbody
      ix-table-body
      [columns]="columns"
      [dataProvider]="dataProvider"
      [isLoading]="!!(isLoading$ | async)"
    ></tbody>
  </ix-table>
  <tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
</tn-card>
