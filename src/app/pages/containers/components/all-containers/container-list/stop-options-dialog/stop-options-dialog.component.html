<tn-dialog-shell [title]="(isRestart() ? 'Restart Options' : 'Stop Options') | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-select
    formControlName="stopMethod"
    [label]="'Stop Method' | translate"
    [required]="true"
    [options]="stopMethodOptions$"
  ></ix-select>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    color="primary"
    ixTest="continue"
    [label]="(isRestart() ? 'Restart' : 'Stop') | translate"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
