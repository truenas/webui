@if (container(); as container) {
  <tn-card [title]="'Tools' | translate">
    <div [tnTooltip]="isContainerStopped() ? ('Container is not running' | translate) : ''">
      <tn-button
        variant="filled"
        color="default"
        class="tool"
        [testId]="'open-shell'"
        [label]="'Shell' | translate"
        [disabled]="isContainerStopped()"
        [routerLink]="['/containers', 'view', container.id, 'shell']"
      ></tn-button>
    </div>
  </tn-card>
}
