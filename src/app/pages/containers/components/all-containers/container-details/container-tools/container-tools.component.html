@if (container(); as container) {
  <mat-card class="card">
    <mat-card-header>
      <h3 mat-card-title>
        {{ 'Tools' | translate }}
      </h3>
    </mat-card-header>

    <mat-card-content>
      <div [matTooltip]="shellTooltip() | translate">
        <a
          mat-flat-button
          color="default"
          ixTest="open-shell"
          class="tool"
          [class.disabled]="!canOpenShell()"
          [disabled]="!canOpenShell()"
          [routerLink]="['/containers', 'view', container.id, 'shell']"
        >
          <span>{{ 'Shell' | translate }}</span>

          <tn-icon
            library="mdi"
            [name]="hasWebShellAccess() ? 'console-line' : 'lock'"
            [ariaLabel]="shellTooltip() | translate"
          ></tn-icon>
        </a>
      </div>
    </mat-card-content>
  </mat-card>
}
