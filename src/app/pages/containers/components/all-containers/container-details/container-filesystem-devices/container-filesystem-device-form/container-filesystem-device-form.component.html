@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title()"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'Filesystem Device' | translate">
    <ix-explorer
      formControlName="source"
      [label]="'Host Directory Source' | translate"
      [tooltip]="'Select the host directory to mount inside the container' | translate"
      [required]="true"
      [nodeProvider]="fileProvider"
    >
      <ix-explorer-create-dataset></ix-explorer-create-dataset>
    </ix-explorer>

    <tn-form-field
      [label]="'Container Mount Path' | translate"
      [tooltip]="'Path where the directory will be mounted inside the container (e.g., /data)' | translate"
      [required]="true"
    >
      <tn-input formControlName="target"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
