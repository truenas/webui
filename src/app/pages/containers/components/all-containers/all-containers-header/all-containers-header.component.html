<tn-button
  iconPosition="right"
  testId="configuration-menu"
  [icon]="menuDownIcon"
  [label]="'Configuration' | translate"
  [tnMenuTriggerFor]="configMenu"
></tn-button>

<tn-menu #configMenu>
  <tn-menu-item
    testId="global-configuration"
    [label]="'Settings' | translate"
    [ixUiSearch]="searchableElements.elements.settings"
    (itemClick)="onGlobalConfiguration()"
  ></tn-menu-item>

  <tn-menu-item
    *ixRequiresRoles="requiredRoles"
    testId="map-user-group-ids"
    [label]="'Map User/Group IDs' | translate"
    [ixUiSearch]="searchableElements.elements.mapUserGroupIds"
    (itemClick)="onMapUserGroupIds()"
  ></tn-menu-item>
</tn-menu>

@if (config()) {
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="create-new-container"
    [ixUiSearch]="searchableElements.elements.add"
    [label]="'Create New Container' | translate"
    (onClick)="onCreateContainer()"
  ></tn-button>
}

<tn-side-panel
  [title]="'Global Configuration' | translate"
  [closeGuard]="closeGuard"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-global-config-form (closed)="onConfigClosed($event)"></ix-global-config-form>
  }
  @if (configForm(); as form) {
    <tn-button
      tnSidePanelAction
      color="primary"
      testId="save"
      [label]="'Save' | translate"
      [disabled]="!form.canSubmit()"
      (onClick)="form.submit()"
    ></tn-button>
  }
</tn-side-panel>
