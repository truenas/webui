<form novalidate role="form" aria-label="Sign In Form" [formGroup]="form" (submit)="hasTwoFactor ? loginWithOtp() : login()">
  @if (!hasTwoFactor) {
    <ix-input
      formControlName="username"
      autocomplete="username"
      name="username"
      class="username-input"
      [prefixIcon]="tnIconMarker('account', 'mdi')"
      [label]="'Username' | translate"
    ></ix-input>

    <ix-input
      formControlName="password"
      type="password"
      name="password"
      autocomplete="current-password"
      [prefixIcon]="tnIconMarker('lock', 'mdi')"
      [label]="'Password' | translate"
    ></ix-input>

    @if (showSecurityWarning) {
      <ix-insecure-connection></ix-insecure-connection>
    }

    <tn-button
      class="submit-button"
      type="submit"
      color="primary"
      [testId]="'log-in'"
      [label]="'Log In' | translate"
      [disabled]="isFormDisabled()"
    ></tn-button>
    @if (isLastLoginAttemptFailed) {
      <div class="error">
        <p [innerHTML]="lastLoginError"></p>
      </div>
    }
  }
  @if (hasTwoFactor) {
    <p>
      {{ '2FA has been configured for this account. Enter the OTP to continue.' | translate }}
    </p>

    <ix-input
      formControlName="otp"
      autocomplete="one-time-code"
      [prefixIcon]="tnIconMarker('cellphone-link', 'mdi')"
      [label]="'Two-Factor Authentication Code' | translate"
      [required]="true"
    ></ix-input>

    @if (showSecurityWarning) {
      <ix-insecure-connection></ix-insecure-connection>
    }

    <div>
      <tn-button
        class="submit-button"
        type="submit"
        color="primary"
        [testId]="'log-in'"
        [label]="'Proceed' | translate"
        [disabled]="isFormDisabled()"
      ></tn-button>
      <tn-button
        class="submit-button"
        type="button"
        [testId]="'otp-log-in'"
        [label]="'Cancel' | translate"
        [disabled]="isFormDisabled()"
        (onClick)="cancelOtpLogin()"
      ></tn-button>
    </div>

    @if (isLastOtpAttemptFailed) {
      <div class="error">
        <p>{{ lastLoginError }}</p>
      </div>
    }
  }
</form>
