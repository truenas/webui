<tn-dialog-shell testId="select-pool-dialog" [title]="'Choose a pool for Apps' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-field [label]="'Pool' | translate" [required]="true">
    <tn-select
      testId="pool"
      formControlName="pool"
      [options]="(pools$ | async) ?? []"
    ></tn-select>
  </tn-form-field>

  @if (showMigrateCheckbox) {
    <tn-form-field>
      <tn-checkbox
        testId="migrate-applications"
        formControlName="migrateApplications"
        [label]="'Migrate existing applications' | translate"
      ></tn-checkbox>
    </tn-form-field>
  }

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="choose"
    [label]="'Choose' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
