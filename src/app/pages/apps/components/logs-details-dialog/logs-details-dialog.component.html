<tn-dialog-shell testId="logs-details" [title]="'Logs Details' | translate">
<form class="ix-form-container" [formGroup]="form">
  <tn-form-field [label]="'Tail Lines' | translate">
    <tn-input
      testId="tail-lines"
      formControlName="tail_lines"
      inputType="number"
      [required]="true"
    ></tn-input>
  </tn-form-field>
</form>

<div tnDialogAction align="end">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button color="primary" testId="choose" [label]="'Connect' | translate" [disabled]="form.invalid" (onClick)="dialogRef.close(this.form.value)"></tn-button>
</div>
</tn-dialog-shell>
