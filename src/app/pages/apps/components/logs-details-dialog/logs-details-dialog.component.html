<tn-dialog-shell [title]="'Logs Details' | translate">
<form class="ix-form-container" [formGroup]="form">
  <ix-input
    formControlName="tail_lines"
    type="number"
    [label]="'Tail Lines' | translate"
    [required]="true"
  ></ix-input>
</form>

<div tnDialogAction align="end">
  <tn-button variant="outline" ixTest="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button color="primary" ixTest="choose" [label]="'Connect' | translate" [disabled]="form.invalid" (onClick)="dialogRef.close(this.form.value)"></tn-button>
</div>
</tn-dialog-shell>
