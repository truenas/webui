<ix-page-header>
  <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="pull-image"
    [label]="'Pull Image' | translate"
    (onClick)="doAdd()"
  ></tn-button>
</ix-page-header>

@if (selectedImages.length) {
  <div class="batch-actions-toolbar">
    <div class="title">
      <strong>{{ 'Batch Operations' | translate }}</strong>
    </div>
    <div class="actions">
      <tn-button
        *ixRequiresRoles="requiredRoles"
        testId="delete"
        [label]="'Delete' | translate"
        (onClick)="doDelete(selectedImages)"
      ></tn-button>
    </div>
  </div>
}

<ix-table
  class="table"
  [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
  [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
>
  <thead
    ix-table-head
    [columns]="columns"
    [dataProvider]="dataProvider"
  ></thead>
  <tbody
    ix-table-body
    [columns]="columns"
    [dataProvider]="dataProvider"
    [isLoading]="!!(dataProvider.isLoading$ | async)"
  ></tbody>
</ix-table>
<tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
