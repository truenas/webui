<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="'Pull Image' | translate"
  [loading]="isFormLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Image Name' | translate"
      [required]="true"
      [tooltip]="tooltips.image | translate"
    >
      <tn-input
        name="image"
        testId="image"
        formControlName="image"
        [required]="true"
      ></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Image Tag' | translate">
      <tn-input
        name="tag"
        testId="tag"
        formControlName="tag"
      ></tn-input>
    </tn-form-field>
  </tn-form-section>
  <tn-form-section [heading]="'Docker Registry Authentication' | translate">
    <p class="hint">
      {{ 'Optional. Only needed for private images.' | translate }}
    </p>
    <tn-form-field [label]="'Username' | translate">
      <tn-input
        name="username"
        testId="username"
        formControlName="username"
      ></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Password' | translate">
      <tn-input
        name="password"
        testId="password"
        formControlName="password"
        [inputType]="InputType.Password"
        [showPasswordToggle]="true"
      ></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      testId="save"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading()"
    ></tn-button>
  </ix-form-actions>
</form>
