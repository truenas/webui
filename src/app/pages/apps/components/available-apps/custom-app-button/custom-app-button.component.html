  <div
    class="custom-app-wrapper"
    [tnTooltip]="'Setup Pool To Create Custom App' | translate"
    [tnTooltipDisabled]="!(customAppDisabled$ | async)"
  >
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      testId="custom-app"
      [disabled]="customAppDisabled$ | async"
      [ixUiSearch]="searchableElements.elements.customApp"
      [label]="'Custom App' | translate"
      (onClick)="openAppWizardCreation()"
    ></tn-button>

    <tn-icon-button
      name="dots-vertical"
      library="mdi"
      testId="custom-app-menu"
      [ariaLabel]="'More Options' | translate"
      [tooltip]="'More Options' | translate"
      [tnMenuTriggerFor]="customAppMenu"
    ></tn-icon-button>
    <tn-menu #customAppMenu>
      <tn-menu-item
        *ixRequiresRoles="requiredRoles"
        testId="custom-app-yaml"
        [label]="'Install via YAML' | translate"
        [disabled]="customAppDisabled$ | async"
        [ixUiSearch]="searchableElements.elements.customAppYaml"
        (itemClick)="openCustomAppYamlCreation()"
      ></tn-menu-item>
    </tn-menu>
  </div>

  <tn-side-panel
    width="800px"
    testId="custom-app"
    [title]="'Install via YAML' | translate"
    [closeGuard]="customAppCloseGuard"
    [(open)]="customAppOpen"
  >
    @if (customAppOpen()) {
      <ix-custom-app-form (closed)="onCustomAppClosed($event)"></ix-custom-app-form>
    }
    @if (customAppForm(); as form) {
      <div tnSidePanelAction>
        <tn-button
          *ixRequiresRoles="form.requiredRoles"
          color="primary"
          testId="save"
          [label]="'Save' | translate"
          [disabled]="!form.canSubmit()"
          (onClick)="form.submit()"
        ></tn-button>
      </div>
    }
  </tn-side-panel>
