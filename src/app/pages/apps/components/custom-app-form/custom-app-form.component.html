<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="isNew ? ('Install via YAML' | translate) : ('Edit App YAML' | translate)"
  [loading]="isLoading()"
></ix-modal-header>

<form
  class="ix-form-container"
  [formGroup]="form"
  (submit)="onSubmit()"
>
  <tn-form-section>
    <tn-form-field [label]="'Name' | translate" [required]="true">
      <tn-input
        name="release_name"
        testId="release-name"
        formControlName="release_name"
        [required]="true"
        [readonly]="!isNew"
      ></tn-input>
    </tn-form-field>
    <ix-code-editor
      formControlName="custom_compose_config_string"
      [language]="CodeEditorLanguage.Yaml"
      [label]="'Custom Config' | translate"
      [tooltip]="'Custom app config in YAML format.' | translate"
      [required]="true"
    ></ix-code-editor>
  </tn-form-section>
  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      testId="save"
      [label]="'Save' | translate"
      [disabled]="!form.valid || isLoading()"
    ></tn-button>
  </ix-form-actions>
</form>
