<tn-dialog-shell testId="dockerhub-rate-limit-info" [title]="'Docker Hub Rate Limit Warning' | translate">
  <div>
    <p>{{  warningText }}</p>

    <p>
      {{ 'You can alleviate rate limiting issues by signing in with Docker Hub.' | translate }}
    </p>
  </div>

<div tnDialogAction align="end">
  <tn-button variant="outline" testId="close" [label]="'Close' | translate" (onClick)="dialogRef.close(true)"></tn-button>
  <tn-button color="primary" testId="navigate-to-docker-registries" [label]="'Sign-in to Docker Hub' | translate" (onClick)="dialogRef.close(true)"></tn-button>
</div>
</tn-dialog-shell>
