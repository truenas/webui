<ix-page-header>
  <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>

  <ix-table-columns-selector
    [columnPreferencesKey]="'dockerRegistriesList'"
    [columns]="columns"
    (columnsChange)="columnsChange($event)"
  ></ix-table-columns-selector>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="add-docker-registry"
    [ixUiSearch]="searchableElements.elements.addRegistry"
    [label]="'Add Registry' | translate"
    (onClick)="onAdd()"
  ></tn-button>
</ix-page-header>

<ix-table
  class="table"
  [ixUiSearch]="searchableElements.elements.dockerRegistriesList"
  [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
  [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
>
  <thead
    ix-table-head
    [columns]="columns"
    [dataProvider]="dataProvider"
  ></thead>
  <tbody
    ix-table-body
    [columns]="columns"
    [dataProvider]="dataProvider"
    [isLoading]="!!(dataProvider.isLoading$ | async)"
  >
  </tbody>
</ix-table>
<tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
