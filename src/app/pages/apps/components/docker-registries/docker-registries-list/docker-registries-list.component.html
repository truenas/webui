<ix-page-header>
  <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>

  <ix-table-columns-selector
    [columnPreferencesKey]="'dockerRegistriesList'"
    [columns]="columns"
    (columnsChange)="columnsChange($event)"
  ></ix-table-columns-selector>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="add-docker-registry"
    [ixUiSearch]="searchableElements.elements.addRegistry"
    [label]="'Add Registry' | translate"
    (onClick)="onAdd()"
  ></tn-button>
</ix-page-header>

@let emptyConfig = emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async);

<tn-table
  class="table"
  [ixUiSearch]="searchableElements.elements.dockerRegistriesList"
  [dataSource]="(dataProvider.currentPage$ | async) ?? []"
  [displayedColumns]="displayedColumns()"
  [loading]="!!(dataProvider.isLoading$ | async)"
  [emptyMessage]="(emptyConfig.title || '') | translate"
  [emptyIcon]="emptyConfig.icon || ''"
  (sortChange)="onSortChange($event)"
>
  <ng-container [tnColumnDef]="'name'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'Name' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ row.name }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'username'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'Username' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ row.username }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'uri'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'URI' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ row.uri }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'actions'" [width]="'120px'">
    <ng-template tnHeaderCellDef></ng-template>
    <ng-template let-row tnCellDef>
      <tn-icon-button
        name="pencil"
        library="mdi"
        tooltipPosition="above"
        [dense]="true"
        [testId]="[row.name, 'edit']"
        [ariaLabel]="'Edit' | translate"
        [tooltip]="'Edit' | translate"
        (onClick)="onEdit(row)"
      ></tn-icon-button>
      <tn-icon-button
        *ixRequiresRoles="requiredRoles"
        name="delete"
        library="mdi"
        tooltipPosition="above"
        [dense]="true"
        [testId]="[row.name, 'delete']"
        [ariaLabel]="'Delete' | translate"
        [tooltip]="'Delete' | translate"
        (onClick)="onDelete(row)"
      ></tn-icon-button>
    </ng-template>
  </ng-container>
</tn-table>

<tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
