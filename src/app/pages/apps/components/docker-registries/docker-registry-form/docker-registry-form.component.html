<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title | translate"
  [loading]="isFormLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    @if (!isLoggedInToDockerHub && !existingDockerRegistry) {
      <ix-select
        formControlName="registry"
        [label]="'URI' | translate"
        [options]="registriesOptions$"
        [hideEmpty]="true"
      ></ix-select>
    }

    @if (existingDockerRegistry || isLoggedInToDockerHub || !form.controls.registry.value) {
      <ix-input
        formControlName="uri"
        [label]="'URI' | translate"
        [placeholder]="dockerHubRegistry"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="name"
        [label]="'Name' | translate"
        [required]="true"
      ></ix-input>
    }

    <ix-input
      formControlName="username"
      [label]="'Username' | translate"
      [required]="true"
    ></ix-input>

    <ix-input
      formControlName="password"
      type="password"
      [label]="'Password' | translate"
      [required]="true"
    ></ix-input>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      testId="save"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading()"
    ></tn-button>
  </ix-form-actions>
</form>
