@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    @if (!loggedInToDockerHub && !existingDockerRegistry) {
      <tn-form-field [label]="'URI' | translate">
        <tn-select
          testId="registry"
          formControlName="registry"
          [options]="(registriesOptions$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    }

    @if (existingDockerRegistry || loggedInToDockerHub || !form.controls.registry.value) {
      <tn-form-field [label]="'URI' | translate" [required]="true">
        <tn-input
          name="uri"
          testId="uri"
          formControlName="uri"
          [required]="true"
          [placeholder]="dockerHubRegistry"
        ></tn-input>
      </tn-form-field>

      <tn-form-field [label]="'Name' | translate">
        <tn-input
          name="name"
          testId="name"
          formControlName="name"
          [required]="true"
        ></tn-input>
      </tn-form-field>
    }

    <tn-form-field [label]="'Username' | translate">
      <tn-input
        name="username"
        testId="username"
        formControlName="username"
        [required]="true"
      ></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Password' | translate">
      <tn-input
        name="password"
        testId="password"
        formControlName="password"
        [inputType]="InputType.Password"
        [required]="true"
        [showPasswordToggle]="true"
      ></tn-input>
    </tn-form-field>
  </tn-form-section>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        testId="save"
        [label]="'Save' | translate"
        [disabled]="!canSubmit()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
