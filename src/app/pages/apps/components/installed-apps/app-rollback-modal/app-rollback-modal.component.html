<tn-dialog-shell testId="app-rollback" [title]="'Roll Back' | translate">
<div>
  <form [formGroup]="form">
    <ix-select
      formControlName="app_version"
      [label]="'Version' | translate"
      [required]="true"
      [options]="versionOptions$"
      [tooltip]="'Enter the version to roll back to.' | translate"
    ></ix-select>

    <tn-checkbox
      testId="rollback-snapshot"
      formControlName="rollback_snapshot"
      [label]="'Roll back snapshots' | translate"
      [tooltip]="'Roll back snapshots of ix_volumes' | translate"
    ></tn-checkbox>
  </form>
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close()"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="primary" testId="roll-back" [label]="'Roll Back' | translate" [disabled]="form.invalid" (onClick)="onRollback()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
