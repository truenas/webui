<ix-page-header>
  <ix-checkbox
    [formControl]="autoScrollControl"
    [label]="'Auto Scroll' | translate"
    [tooltip]="'Automatically scroll to the latest log entry' | translate"
  ></ix-checkbox>

  <ix-toolbar-slider
    [label]="'Set font size' | translate"
    [min]="10"
    [max]="20"
    [value]="fontSize()"
    (valueChange)="onFontSizeChanged($event)"
  ></ix-toolbar-slider>

  <tn-button
    testId="reconnect"
    [label]="'Reconnect' | translate"
    (onClick)="reconnect()"
  ></tn-button>
</ix-page-header>

<div class="logs-wrapper">
  <div class="meta-data">
    <label>{{ 'Application Name' | translate }}:</label>
    <span class="name">{{ appName }}</span>
    <label>{{ 'Container ID' | translate }}:</label>
    <span class="name">{{ containerId }}</span>
  </div>
  <div
    #logContainer
    class="logs"
    [style.font-size]="fontSize() + 'px'"
  >
    @if (isLoading()) {
      <tn-spinner class="spinner" [diameter]="40"></tn-spinner>
    } @else {
      @for (podLog of logs(); track podLog) {
        <div class="log-row">
          <span class="timestamp">{{ podLog.timestamp }}</span>
          <span class="log-data">{{ podLog.data }}</span>
        </div>
      } @empty {
        <div class="log-row">
          <span class="no-logs">{{ 'No logs yet' | translate }}</span>
        </div>
      }
    }
  </div>
</div>
