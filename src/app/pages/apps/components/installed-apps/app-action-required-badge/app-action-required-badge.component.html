@if (isVisible()) {
  <button
    type="button"
    class="action-required-badge"
    tnTooltipPosition="above"
    [ixTest]="[app().name, 'action-required']"
    [tnTooltip]="'Action Required. Click to see required actions in the Notes card.' | translate"
    [attr.aria-label]="'Action Required. Click to see required actions in the Notes card.' | translate"
    (click)="highlightNotes()"
  >
    <tn-icon name="alert" library="mdi"></tn-icon>
  </button>
}
