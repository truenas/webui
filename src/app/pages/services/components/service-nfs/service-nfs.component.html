<ix-form
  [formGroup]="form"
  [externalLoading]="dataLoading()"
  [initialFormSnapshot]="initialFormSnapshot()"
  [requiredRoles]="requiredRoles"
  [submitHandler]="handleSubmit"
  (closed)="closed.emit($event)"
>
  <tn-form-section [heading]="'General Options' | translate">
    <tn-form-field
      [label]="'Bind IP Addresses' | translate"
      [tooltip]="tooltips.bindip | translate"
    >
      <tn-select
        formControlName="bindip"
        [options]="(ipChoices$ | async) ?? []"
        [multiple]="true"
      ></tn-select>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.servers_auto | translate">
      <tn-checkbox
        formControlName="servers_auto"
        [label]="'Calculate number of threads dynamically' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (!form.controls.servers_auto.value) {
      <tn-form-field
        [label]="'Specify number of threads manually' | translate"
        [required]="true"
        [tooltip]="tooltips.servers | translate"
      >
        <tn-input formControlName="servers" [inputType]="InputType.Number" [allowDecimals]="false"></tn-input>
      </tn-form-field>
    }
  </tn-form-section>

  <div class="two-columns">
    <tn-form-section [heading]="'NFSv4' | translate">
      <tn-form-field
        [label]="'Enabled Protocols' | translate"
        [tooltip]="tooltips.protocols | translate"
        [required]="true"
      >
        <tn-select
          formControlName="protocols"
          [options]="(protocolOptions$ | async) ?? []"
          [multiple]="true"
        ></tn-select>
      </tn-form-field>

      <tn-form-field
        [label]="'NFSv4 DNS Domain' | translate"
        [tooltip]="tooltips.v4_domain | translate"
      >
        <tn-input formControlName="v4_domain"></tn-input>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.v4_krb | translate">
        <tn-checkbox
          formControlName="v4_krb"
          [label]="'Require Kerberos for NFSv4' | translate"
        ></tn-checkbox>
      </tn-form-field>
    </tn-form-section>
    <tn-form-section [heading]="'Ports' | translate">
      <tn-form-field
        [label]="'mountd(8) bind port' | translate"
        [tooltip]="tooltips.mountd_port | translate"
      >
        <tn-input formControlName="mountd_port" [inputType]="InputType.Number" [allowDecimals]="false"></tn-input>
      </tn-form-field>

      <tn-form-field
        [label]="'rpc.statd(8) bind port' | translate"
        [tooltip]="tooltips.rpcstatd_port | translate"
      >
        <tn-input formControlName="rpcstatd_port" [inputType]="InputType.Number" [allowDecimals]="false"></tn-input>
      </tn-form-field>

      <tn-form-field
        [label]="'rpc.lockd(8) bind port' | translate"
        [tooltip]="tooltips.rpclockd_port | translate"
      >
        <tn-input formControlName="rpclockd_port" [inputType]="InputType.Number" [allowDecimals]="false"></tn-input>
      </tn-form-field>
    </tn-form-section>
  </div>

  <tn-form-section [heading]="'Other Options' | translate">
    <tn-form-field>
      <tn-checkbox
        formControlName="rdma"
        [label]="'Enable NFS over RDMA' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.allow_nonroot | translate">
      <tn-checkbox
        formControlName="allow_nonroot"
        [label]="'Allow non-root mount' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.userd_manage_gids | translate">
      <tn-checkbox
        formControlName="userd_manage_gids"
        [label]="'Manage Groups Server-side' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <div class="add-spn-container">
    @if (isAddSpnVisible && isAddSpnDisabled()) {
      <ix-tooltip
        [header]="'Add SPN' | translate"
        [message]="'Save the \'Require Kerberos for NFSv4\' value before adding SMP' | translate"
      ></ix-tooltip>
    }
    @if (isAddSpnVisible) {
      <ng-container *ixRequiresRoles="requiredRoles">
        <tn-button
          color="primary"
          [testId]="'add-spn'"
          [label]="'Add SPN' | translate"
          [disabled]="isAddSpnDisabled()"
          (onClick)="addSpn()"
        ></tn-button>
      </ng-container>
    }
  </div>
</ix-form>
