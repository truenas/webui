<tn-dialog-shell testId="add-spn" [title]="'Add Kerberos SPN Entry' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-field [label]="'Name' | translate">
    <tn-input
      testId="username"
      name="username"
      formControlName="username"
      [required]="true"
    ></tn-input>
  </tn-form-field>

  <tn-form-field [label]="'Password' | translate">
    <tn-input
      testId="password"
      name="password"
      formControlName="password"
      [inputType]="InputType.Password"
      [required]="true"
    ></tn-input>
  </tn-form-field>

</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="save"
    [label]="'Submit' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
