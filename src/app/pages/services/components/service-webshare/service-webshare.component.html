@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'WebShare' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [tooltip]="helptext.search_enabled_tooltip | translate">
      <tn-checkbox formControlName="search" [label]="'Enable TrueSearch' | translate"></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [label]="'Passkey' | translate"
      [tooltip]="helptext.passkey_tooltip | translate"
    >
      <tn-select formControlName="passkey" [options]="passkeyOptions"></tn-select>
    </tn-form-field>
  </tn-form-section>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        type="submit"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isFormLoading()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
