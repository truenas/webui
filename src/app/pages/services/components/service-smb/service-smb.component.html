@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'SMB' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'NetBIOS' | translate">
    <tn-form-field
      [label]="'NetBIOS Name' | translate"
      [tooltip]="tooltips.netbiosname | translate"
    >
      <tn-input formControlName="netbiosname"></tn-input>
    </tn-form-field>

    <ix-chips
      formControlName="netbiosalias"
      [label]="'NetBIOS Alias' | translate"
      [tooltip]="tooltips.netbiosalias | translate"
    ></ix-chips>

    <tn-form-field
      [label]="'Workgroup' | translate"
      [tooltip]="tooltips.workgroup | translate"
    >
      <tn-input formControlName="workgroup"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Description' | translate"
      [tooltip]="tooltips.description | translate"
    >
      <tn-input formControlName="description"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Minimum Protocol' | translate"
      [tooltip]="tooltips.minimum_protocol | translate"
    >
      <tn-select formControlName="minimum_protocol" [options]="minimumProtocolOptions"></tn-select>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.ntlmv1_auth | translate">
      <tn-checkbox formControlName="ntlmv1_auth" [label]="'NTLMv1 Auth' | translate"></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  @if (!isBasicMode) {
    <tn-form-section [heading]="'Other Options' | translate">
      <tn-form-field
        [label]="'UNIX Charset' | translate"
        [tooltip]="tooltips.unixcharset | translate"
      >
        <tn-select formControlName="unixcharset" [options]="(unixCharsetOptions$ | async) ?? []"></tn-select>
      </tn-form-field>

      <tn-form-field
        [label]="'Transport Encryption Behavior' | translate"
        [required]="true"
      >
        <tn-select formControlName="encryption" [options]="encryptionOptions"></tn-select>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.debug | translate">
        <tn-checkbox formControlName="debug" [label]="'Use Debug' | translate"></tn-checkbox>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.syslog | translate">
        <tn-checkbox formControlName="syslog" [label]="'Use Syslog Only' | translate"></tn-checkbox>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.localmaster | translate">
        <tn-checkbox formControlName="localmaster" [label]="'Local Master' | translate"></tn-checkbox>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.aapl_extensions | translate">
        <tn-checkbox formControlName="aapl_extensions" [label]="'Enable Apple SMB2/3 Protocol Extensions' | translate"></tn-checkbox>
      </tn-form-field>

      <tn-form-field [tooltip]="tooltips.multichannel | translate">
        <tn-checkbox formControlName="multichannel" [label]="'Multichannel' | translate"></tn-checkbox>
      </tn-form-field>

      @if (isHaLicensed()) {
        <tn-form-field [tooltip]="tooltips.stateful_failover | translate">
          <tn-checkbox formControlName="stateful_failover" [label]="'Stateful Failover' | translate"></tn-checkbox>
        </tn-form-field>
      }

      <tn-form-field [tooltip]="tooltips.spotlight_search | translate">
        <tn-checkbox
          formControlName="spotlight_search"
          [label]="'Enable Search (Spotlight)' | translate"
          [attr.aria-describedby]="shouldShowTruenasConnectNotice() ? 'truenas-connect-notice' : null"
        ></tn-checkbox>
      </tn-form-field>

      @if (shouldShowTruenasConnectNotice()) {
        <div id="truenas-connect-notice" class="truenas-connect-notice">
          <span
            class="truenas-connect-link"
            role="button"
            tabindex="0"
            [attr.aria-label]="'Configure TrueNAS Connect to enable Spotlight Search feature' | translate"
            (click)="openTruenasConnectModal()"
            (keydown)="onTruenasConnectLinkKeydown($event)"
          >
            {{ 'Configure TrueNAS Connect to enable this feature.' | translate }}
          </span>
        </div>
      }

      <ix-group-combobox
        formControlName="admin_group"
        [label]="'Administrators Group' | translate"
        [tooltip]="tooltips.admin_group | translate"
      ></ix-group-combobox>

      <ix-user-combobox
        formControlName="guest"
        [label]="'Guest Account' | translate"
        [tooltip]="tooltips.guest | translate"
      ></ix-user-combobox>

      <tn-form-field
        [label]="'File Mask' | translate"
        [tooltip]="tooltips.filemask | translate"
      >
        <tn-input formControlName="filemask"></tn-input>
      </tn-form-field>

      <tn-form-field
        [label]="'Directory Mask' | translate"
        [tooltip]="tooltips.dirmask | translate"
      >
        <tn-input formControlName="dirmask"></tn-input>
      </tn-form-field>

      <ix-list
        formArrayName="bindip"
        [empty]="form.controls.bindip.controls.length === 0"
        [label]="'Bind IP Addresses' | translate"
        [tooltip]="tooltips.bindip | translate"
        (add)="addBindIp()"
      >
        @for (address of form.controls.bindip.controls; track address; let i = $index) {
          <ix-list-item
            [formGroupName]="i"
            (delete)="removeBindIp(i)"
          >
            <tn-form-field [label]="'IP Address' | translate">
              <tn-select formControlName="bindIp" [options]="(bindIpAddressOptions$ | async) ?? []"></tn-select>
            </tn-form-field>
          </ix-list-item>
        }
      </ix-list>
    </tn-form-section>
  }

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        type="submit"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="form.invalid || isFormLoading()"
      ></tn-button>
    }

    <tn-button
      [testId]="'toggle-advanced-settings'"
      [label]="(isBasicMode ? 'Advanced Settings' : 'Basic Settings') | translate"
      (onClick)="onAdvancedSettingsToggled()"
    ></tn-button>
  </ix-form-actions>
</form>
