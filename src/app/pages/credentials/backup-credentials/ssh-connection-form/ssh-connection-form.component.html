<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'Name And Method' | translate">
    <tn-form-field
      [label]="'Connection Name' | translate"
      [required]="true"
    >
      <tn-input formControlName="connection_name" testId="connection-name"></tn-input>
    </tn-form-field>

    @if (isNew) {
      <tn-form-field
        [label]="'Setup Method' | translate"
        [required]="true"
        [tooltip]="helptext.setupMethodTooltip | translate"
      >
        <tn-select
          formControlName="setup_method"
          testId="setup-method"
          [options]="(setupMethods$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    }
  </tn-form-section>

  <tn-form-section [heading]="'Authentication' | translate">
    @if (isManualSetup) {
      <tn-form-field
        [label]="'Host' | translate"
        [required]="true"
        [tooltip]="helptext.hostTooltip | translate"
      >
        <tn-input formControlName="host" testId="host"></tn-input>
      </tn-form-field>
      <tn-form-field
        [label]="'Port' | translate"
        [required]="true"
      >
        <tn-input formControlName="port" testId="port" [inputType]="InputType.Number"></tn-input>
      </tn-form-field>
    }

    @if (!isManualSetup) {
      <tn-form-field
        [label]="'TrueNAS URL' | translate"
        [required]="true"
        [tooltip]="helptext.urlTooltip | translate"
      >
        <tn-input formControlName="url" testId="url"></tn-input>
      </tn-form-field>
    }

    @if (!isManualSetup) {
      <tn-form-field
        [label]="'Admin Username' | translate"
        [tooltip]="helptext.adminUsernameTooltip | translate"
      >
        <tn-input formControlName="admin_username" testId="admin-username"></tn-input>
      </tn-form-field>
    }

    @if (!isManualSetup) {
      <tn-form-field
        [label]="'Admin Password' | translate"
        [required]="true"
        [tooltip]="helptext.passwordTooltip | translate"
      >
        <tn-input formControlName="password" testId="password" [inputType]="InputType.Password"></tn-input>
      </tn-form-field>
    }

    @if (!isManualSetup) {
      <tn-form-field
        [label]="'One-Time Password (if necessary)' | translate"
        [tooltip]="helptext.otpTooltip | translate"
      >
        <tn-input formControlName="otp_token" testId="otp-token"></tn-input>
      </tn-form-field>
    }

    <tn-form-field
      [label]="'Username' | translate"
      [required]="true"
      [tooltip]="helptext.usernameTooltip | translate"
    >
      <tn-input formControlName="username" testId="username"></tn-input>
    </tn-form-field>

    @if (!isManualSetup && (isNotRootUsername$ | async)) {
      <tn-form-field [tooltip]="helptext.sudoTooltip | translate">
        <tn-checkbox
          formControlName="sudo"
          testId="sudo"
          [label]="'Enable passwordless sudo for zfs commands' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }

    <tn-form-field
      [label]="'Private Key' | translate"
      [required]="true"
      [tooltip]="helptext.privateKeyTooltip | translate"
    >
      <tn-select
        formControlName="private_key"
        testId="private-key"
        [options]="(privateKeys$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (isManualSetup) {
      <tn-form-field
        [label]="'Remote Host Key' | translate"
        [tooltip]="helptext.remoteHostKeyTooltip | translate"
      >
        <tn-input
          class="remote-host-key-textarea"
          formControlName="remote_host_key"
          testId="remote-host-key"
          [multiline]="true"
        ></tn-input>
      </tn-form-field>
    }

    <ng-container *ixRequiresRoles="requiredRoles">
      @if (isManualSetup) {
        <tn-button
          type="button"
          class="discover-key-button"
          [testId]="'discover-remote-host-key'"
          [label]="'Discover Remote Host Key' | translate"
          [disabled]="!isManualAuthFormValid"
          (onClick)="onDiscoverRemoteHostKeyPressed()"
        ></tn-button>
      }
    </ng-container>
  </tn-form-section>

  <tn-form-section [heading]="'More Options' | translate">
    <tn-form-field
      [label]="'Connect Timeout' | translate"
      [tooltip]="helptext.connectTimeoutTooltip | translate"
    >
      <tn-input formControlName="connect_timeout" testId="connect-timeout" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>
  </tn-form-section>
</form>
