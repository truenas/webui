<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <ix-oauth-button
      testId="log-in-to-provider"
      [oauthType]="oauthType.Provider"
      [oauthUrl]="oauthUrl() + '?origin='"
      [isLoggedIn]="hasOauthAuthorization"
      (loggedIn)="onLoggedIn($event)"
    ></ix-oauth-button>

    @if (!showManualConfig()) {
      <a
        class="configure-manually-link"
        ixTest="configure-manually"
        (click)="onShowManualConfig()"
      >
        {{ 'Configure manually' | translate }}
      </a>
    }

    @if (showManualConfig()) {
      <tn-form-field [label]="'OAuth Client ID' | translate">
        <tn-input formControlName="client_id"></tn-input>
      </tn-form-field>

      <tn-form-field [label]="'OAuth Client Secret' | translate">
        <tn-input formControlName="client_secret" [inputType]="InputType.Password"></tn-input>
      </tn-form-field>
    }
  </tn-form-section>
</ng-container>
