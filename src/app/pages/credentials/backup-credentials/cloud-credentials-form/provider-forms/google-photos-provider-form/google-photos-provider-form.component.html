<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'OAuth Client ID' | translate"
      [required]="true"
      [tooltip]="oauthTooltip | translate"
    >
      <tn-input formControlName="client_id" testId="client-id"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'OAuth Client Secret' | translate"
      [required]="true"
      [tooltip]="oauthTooltip | translate"
    >
      <tn-input formControlName="client_secret" testId="client-secret" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Token' | translate"
      [required]="true"
      [tooltip]="tokenTooltip | translate"
    >
      <tn-input formControlName="token" testId="token" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>
</ng-container>
