<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'Key ID' | translate"
      [required]="true"
      [tooltip]="helptext.b2.account.tooltip | translate"
    >
      <tn-input formControlName="account"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Application Key' | translate"
      [required]="true"
      [tooltip]="helptext.b2.key.tooltip | translate"
    >
      <tn-input formControlName="key" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>
</ng-container>
