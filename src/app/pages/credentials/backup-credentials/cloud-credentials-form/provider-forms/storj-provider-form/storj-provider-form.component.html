<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <a href="https://truenas.com/storjsignup" target="_blank" tnTestIdType="link" [tnTestId]="'signup-for-account'">
      {{ 'Sign up for account' | translate }}
    </a>

    <tn-form-field [label]="'Access Key ID' | translate" [required]="true">
      <tn-input formControlName="access_key_id" testId="access-key-id"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Secret Access Key' | translate" [required]="true">
      <tn-input formControlName="secret_access_key" testId="secret-access-key"></tn-input>
    </tn-form-field>

    <ix-details-table>
      <ix-details-item [label]="'Endpoint' | translate">
        <ix-editable>
          <div view>{{ form.value.endpoint }}</div>

          <div edit>
            <tn-input formControlName="endpoint" testId="endpoint" [ariaLabel]="'Endpoint' | translate"></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>
    </ix-details-table>
  </tn-form-section>
</ng-container>
