<ix-oauth-provider-authentication
  [oauthUrl]="provider.credentials_oauth"
  (authenticated)="onOauthAuthenticated($event)"
></ix-oauth-provider-authentication>

<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'Access Token' | translate"
      [required]="true"
      [tooltip]="helptext.pcloud.token.tooltip | translate"
    >
      <tn-input formControlName="token" testId="token" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Hostname' | translate"
      [tooltip]="helptext.pcloud.hostname.tooltip | translate"
    >
      <tn-input formControlName="hostname" testId="hostname"></tn-input>
    </tn-form-field>
  </tn-form-section>
</ng-container>
