<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'Access Key ID' | translate"
      [required]="true"
      [tooltip]="helptext.s3.accessKey.tooltip | translate"
    >
      <tn-input formControlName="access_key_id"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Secret Access Key' | translate"
      [required]="true"
      [tooltip]="helptext.s3.secretAccessKey.tooltip | translate"
    >
      <tn-input formControlName="secret_access_key" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <tn-form-section [heading]="'Advanced Options' | translate">
    <ix-details-table class="advanced-details">
      <ix-details-item
        [label]="'Maximum Upload Parts' | translate"
        [tooltip]="helptext.s3.maxUploadParts.tooltip | translate">
        <ix-editable>
          <div view>{{ form.value.max_upload_parts }}</div>

          <div edit>
            <tn-input
              formControlName="max_upload_parts"
              [inputType]="InputType.Number"
              [ariaLabel]="'Maximum Upload Parts' | translate"
            ></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>

      <ix-details-item
        [label]="'Endpoint URL' | translate"
        [tooltip]="helptext.s3.endpoint.tooltip | translate">
        <ix-editable>
          <div view>{{ form.value.endpoint }}</div>

          <div edit>
            <tn-input
              formControlName="endpoint"
              [ariaLabel]="'Endpoint URL' | translate"
            ></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>

      <ix-details-item
        [label]="'Region' | translate"
        [tooltip]="helptext.s3.region.tooltip | translate">
        <ix-editable>
          <div view>{{ form.value.region }}</div>

          <div edit>
            <tn-input
              formControlName="region"
              [ariaLabel]="'Region' | translate"
            ></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>
    </ix-details-table>

    <tn-form-field [tooltip]="helptext.s3.skipRegion.tooltip | translate">
      <tn-checkbox
        formControlName="skip_region"
        [label]="'Disable Endpoint Region' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.s3.signaturesV2.tooltip | translate">
      <tn-checkbox
        formControlName="signatures_v2"
        [label]="'Use Signature Version 2' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.s3.signAcceptEncoding.tooltip | translate">
      <tn-checkbox
        formControlName="sign_accept_encoding"
        [label]="'Sign Accept-Encoding' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>
</ng-container>
