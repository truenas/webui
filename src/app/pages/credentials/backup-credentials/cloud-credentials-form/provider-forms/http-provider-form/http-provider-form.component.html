<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <p>
      {{ helptext.http.explanation | translate }}
    </p>

    <tn-form-field
      [label]="'URL' | translate"
      [required]="true"
      [tooltip]="helptext.http.url.tooltip | translate"
    >
      <tn-input formControlName="url" testId="url"></tn-input>
    </tn-form-field>
  </tn-form-section>
</ng-container>
