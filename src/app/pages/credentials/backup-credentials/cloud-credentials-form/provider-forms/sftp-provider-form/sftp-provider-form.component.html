<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'Host' | translate"
      [required]="true"
      [tooltip]="helptext.sftp.host.tooltip | translate"
    >
      <tn-input formControlName="host"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Port' | translate"
      [tooltip]="helptext.sftp.port.tooltip | translate"
    >
      <tn-input formControlName="port" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Username' | translate"
      [required]="true"
    >
      <tn-input formControlName="user"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Password' | translate"
    >
      <tn-input formControlName="pass" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Private Key' | translate"
      [tooltip]="helptext.sftp.privateKey.tooltip | translate"
    >
      <tn-select formControlName="private_key" [options]="(privateKeys$ | async) ?? []"></tn-select>
    </tn-form-field>
  </tn-form-section>
</ng-container>
