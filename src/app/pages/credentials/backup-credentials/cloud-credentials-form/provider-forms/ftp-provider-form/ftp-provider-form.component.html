<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <tn-form-field
      [label]="'Host' | translate"
      [required]="true"
      [tooltip]="helptext.ftp.host.tooltip | translate"
    >
      <tn-input formControlName="host"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Port' | translate"
      [tooltip]="helptext.ftp.port.tooltip | translate"
    >
      <tn-input formControlName="port" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Username' | translate"
      [required]="true"
      [tooltip]="helptext.ftp.user.tooltip | translate"
    >
      <tn-input formControlName="user"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Password' | translate"
      [tooltip]="helptext.ftp.pass.tooltip | translate"
    >
      <tn-input formControlName="pass" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>
</ng-container>
