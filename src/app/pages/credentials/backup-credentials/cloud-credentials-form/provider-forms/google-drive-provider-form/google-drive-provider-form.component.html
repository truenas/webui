<ix-oauth-provider-authentication
  [oauthUrl]="provider.credentials_oauth"
  (authenticated)="onOauthAuthenticated($event)"
></ix-oauth-provider-authentication>

<ng-container [formGroup]="form">
  <tn-form-section [heading]="'Authentication' | translate">
    <ix-details-table>
      <ix-details-item
        [label]="'Access Token' | translate"
        [tooltip]="helptext.googleDrive.token.tooltip | translate">
        <ix-editable>
          <div view>
            @if (form.value.token) {
              {{ 'Token set' | translate }}
            }
          </div>

          <div edit>
            <tn-input
              formControlName="token"
              [inputType]="InputType.Password"
              [ariaLabel]="'Access Token' | translate"
            ></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>

      <ix-details-item
        [label]="'Team Drive ID' | translate"
        [tooltip]="helptext.googleDrive.teamDrive.tooltip | translate">
        <ix-editable>
          <div view>{{ form.value.team_drive }}</div>

          <div edit>
            <tn-input
              formControlName="team_drive"
              [ariaLabel]="'Team Drive ID' | translate"
            ></tn-input>
          </div>
        </ix-editable>
      </ix-details-item>
    </ix-details-table>
  </tn-form-section>
</ng-container>
