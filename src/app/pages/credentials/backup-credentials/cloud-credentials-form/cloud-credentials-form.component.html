<form class="ix-form-container" [formGroup]="commonForm" (submit)="onSubmit()">
  <tn-form-section [heading]="'Name and Provider' | translate">
    <tn-form-field
      [label]="'Provider' | translate"
      [required]="true"
      [tooltip]="helptext.provider.tooltip | translate"
    >
      <tn-select
        formControlName="type"
        testId="type"
        [options]="(providerOptions | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (showProviderDescription) {
      <ix-cloudsync-provider-description
        [provider]="commonForm.controls.type.value"
      ></ix-cloudsync-provider-description>
    }

    <tn-form-field
      [label]="'Name' | translate"
      [required]="true"
    >
      <tn-input formControlName="name" testId="name"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ng-container #providerFormContainer></ng-container>

  <div class="verify-action">
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="button"
      [testId]="'verify-credential'"
      [label]="'Verify Credential' | translate"
      [disabled]="areActionsDisabled"
      (onClick)="onVerify()"
    ></tn-button>
  </div>
</form>
