<tn-card
  padding="small"
  [title]="'Cloud Credentials' | translate"
  [ixUiSearch]="searchableElements.elements.cloudCredentials"
>
  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      icon="cloud-outline"
      iconLibrary="mdi"
      iconSize="56px"
      [title]="'Cloud credentials are used by Cloud Sync tasks to connect to cloud storage providers.' | translate"
    ></tn-empty>
  } @else {
    <tn-table
      [dataSource]="(dataProvider.currentPage$ | async) ?? []"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackById"
      [loading]="!!(dataProvider.isLoading$ | async)"
    >
      <ng-container [tnColumnDef]="'name'">
        <ng-template tnHeaderCellDef>{{ 'Name' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <span
            tnTestIdType="text"
            [tnTestId]="[('Name' | translate), uniqueRowTag(row), 'row-text']"
            [tnTooltip]="row.name || ''"
          >{{ row.name }}</span>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'provider'">
        <ng-template tnHeaderCellDef>{{ 'Provider' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <span
            tnTestIdType="text"
            [tnTestId]="[('Provider' | translate), uniqueRowTag(row), 'row-text']"
          >{{ getProviderName(row) }}</span>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            mode="inline"
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>

    <ix-table-pager-show-more
      [pageSize]="5"
      [dataProvider]="dataProvider"
      [ixTestOverride]="['cloud-credentials']"
    ></ix-table-pager-show-more>
  }

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      variant="filled"
      [testId]="['add-cloud-credential']"
      [ixUiSearch]="searchableElements.elements.add"
      [label]="'Add' | translate"
      (onClick)="doAdd()"
    ></tn-button>
  </ng-template>
</tn-card>
