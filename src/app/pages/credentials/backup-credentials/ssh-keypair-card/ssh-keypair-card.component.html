<tn-card
  padding="small"
  [title]="'SSH Keypairs' | translate"
  [ixUiSearch]="searchableElements.elements.sshKeypairs"
>
  @if (isEmpty()) {
    <tn-empty
      iconSize="56px"
      [icon]="emptyIcon()"
      [title]="emptyConfig().title | translate"
      [description]="emptyConfig().message ? (emptyConfig().message | translate) : undefined"
    ></tn-empty>
  } @else {
    <tn-table
      [dataSource]="currentPage()"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackById"
      [loading]="isLoading()"
    >
      <ng-container [tnColumnDef]="'name'">
        <ng-template tnHeaderCellDef>{{ 'Name' | translate }}</ng-template>
        <ng-template let-row tnCellDef>
          <span
            tnTestIdType="text"
            [tnTestId]="[('Name' | translate), uniqueRowTag(row), 'row-text']"
            [tnTooltip]="row.name || ''"
          >{{ row.name }}</span>
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>

    <ix-table-pager-show-more
      [pageSize]="5"
      [dataProvider]="dataProvider"
      [ixTestOverride]="['ssh-keypairs']"
    ></ix-table-pager-show-more>
  }

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      variant="filled"
      [testId]="['add-ssh-keypair']"
      [ixUiSearch]="searchableElements.elements.add"
      [label]="'Add' | translate"
      (onClick)="doAdd()"
    ></tn-button>
  </ng-template>
</tn-card>
