<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="'SSH Keypairs' | translate"
  [loading]="isFormLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset [title]="'SSH Keypair' | translate">
    <div class="help-text" [innerHTML]="keyInstructions"></div>

    <ix-input
      formControlName="name"
      [label]="'Name' | translate"
      [required]="true"
      [tooltip]="tooltips.name | translate"
    ></ix-input>

    <ng-container *ixRequiresRoles="requiredRoles">
      <tn-button
        class="generate-button"
        type="button"
        [testId]="'generate-keypair'"
        [label]="'Generate Keypair' | translate"
        (onClick)="onGenerateButtonPressed()"
      ></tn-button>
    </ng-container>

    <ix-textarea
      class="key-text-area"
      formControlName="private_key"
      [label]="'Private Key' | translate"
      [tooltip]="tooltips.privateKey | translate"
      [rows]="5"
    ></ix-textarea>

    <ix-textarea
      class="key-text-area"
      formControlName="public_key"
      [label]="'Public Key' | translate"
      [tooltip]="tooltips.publicKey | translate"
      [rows]="5"
    ></ix-textarea>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading()"
    ></tn-button>

    <tn-icon-button
      name="dots-vertical"
      library="mdi"
      [testId]="'download-actions'"
      [ariaLabel]="'Download Actions' | translate"
      [tooltip]="'Download Actions' | translate"
      [tnMenuTriggerFor]="keymenu"
    ></tn-icon-button>
    <tn-menu #keymenu>
      <tn-menu-item
        [testId]="'download-private-key'"
        [disabled]="!(canDownloadPrivateKey$ | async)"
        (itemClick)="onDownloadKey('private_key')"
      >{{ 'Download Private Key' | translate }}</tn-menu-item>
      <tn-menu-item
        [testId]="'download-public-key'"
        [disabled]="!(canDownloadPublicKey$ | async)"
        (itemClick)="onDownloadKey('public_key')"
      >{{ 'Download Public Key' | translate }}</tn-menu-item>
    </tn-menu>
  </ix-form-actions>
</form>
