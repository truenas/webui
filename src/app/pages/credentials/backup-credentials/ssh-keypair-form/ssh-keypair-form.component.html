<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'SSH Keypair' | translate">
    <div class="help-text" [innerHTML]="keyInstructions"></div>

    <tn-form-field
      [label]="'Name' | translate"
      [required]="true"
      [tooltip]="tooltips.name | translate"
    >
      <tn-input formControlName="name"></tn-input>
    </tn-form-field>

    <ng-container *ixRequiresRoles="requiredRoles">
      <tn-button
        class="generate-button"
        type="button"
        [testId]="'generate-keypair'"
        [label]="'Generate Keypair' | translate"
        (onClick)="onGenerateButtonPressed()"
      ></tn-button>
    </ng-container>

    <tn-form-field
      [label]="'Private Key' | translate"
      [tooltip]="tooltips.privateKey | translate"
    >
      <tn-input
        class="key-text-area"
        formControlName="private_key"
        [multiline]="true"
        [rows]="5"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Public Key' | translate"
      [tooltip]="tooltips.publicKey | translate"
    >
      <tn-input
        class="key-text-area"
        formControlName="public_key"
        [multiline]="true"
        [rows]="5"
      ></tn-input>
    </tn-form-field>
  </tn-form-section>
</form>
