<tn-card
  padding="small"
  [title]="'ACME DNS-Authenticators' | translate"
  [ixUiSearch]="searchableElements.elements.acmeDnsAuthenticatorList"
>
  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    @let emptyType = dataProvider.emptyType$ | async;
    <tn-empty
      iconSize="56px"
      [icon]="emptyService.iconForType(emptyType)"
      [title]="emptyService.defaultEmptyConfig(emptyType).title | translate"
    ></tn-empty>
  } @else {
    <tn-table
      class="table"
      [dataSource]="(dataProvider.currentPage$ | async) ?? []"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackBy"
      [loading]="!!(dataProvider.isLoading$ | async)"
    >
      <ng-container [tnColumnDef]="'name'" [width]="'40%'">
        <ng-template tnHeaderCellDef>{{ 'Name' | translate }}</ng-template>
        <ng-template let-row tnCellDef>{{ row.name }}</ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'authenticator'">
        <ng-template tnHeaderCellDef>{{ 'Authenticator' | translate }}</ng-template>
        <ng-template let-row tnCellDef>{{ row.attributes?.authenticator }}</ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            mode="inline"
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>
  }

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['acme-dns']"
  ></ix-table-pager-show-more>

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['add-acme-dns-authenticator']"
      [ixUiSearch]="searchableElements.elements.add"
      [label]="'Add' | translate"
      (onClick)="doAdd()"
    ></tn-button>
  </ng-template>
</tn-card>
