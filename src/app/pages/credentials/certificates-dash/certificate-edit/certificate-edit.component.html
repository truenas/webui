@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="isCsr ? ('Edit CSR' | translate) : ('Edit Certificate' | translate)"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <div class="columns">
      <tn-form-field
        class="column"
        [label]="'Identifier' | translate"
        [tooltip]="helptext.edit.name.tooltip | translate"
        [required]="true"
      >
        <tn-input formControlName="name"></tn-input>
      </tn-form-field>

      @if (form.controls.renew_days) {
        <tn-form-field
          class="column"
          [label]="'Renew Certificate Days Before Expiry' | translate"
          [tooltip]="helptext.edit.renewDays.tooltip | translate"
        >
          <tn-input formControlName="renew_days" [inputType]="InputType.Number"></tn-input>
        </tn-form-field>
      }
      <div class="column"></div>
    </div>
  </tn-form-section>

  @if (!isCsr) {
    <tn-form-section>
      <tn-form-field>
        <tn-checkbox
          formControlName="add_to_trusted_store"
          [label]="'Add to trusted store' | translate"
        ></tn-checkbox>
      </tn-form-field>
    </tn-form-section>
  }

  @if (certificate) {
    <tn-form-section [heading]="'Subject' | translate">
      <ix-certificate-details
        [certificate]="certificate"
      ></ix-certificate-details>
      <!-- Legacy SlideIn host shows these inline; the tn-side-panel host renders them
        in the footer menu (see footerMenu). -->
      @if (slideInRef) {
        <div class="view-actions">
          <tn-button
            variant="outline"
            type="button"
            [testId]="'view-certificate-or-csr'"
            [label]="isCsr ? ('View/Download CSR' | translate) : ('View/Download Certificate' | translate)"
            (onClick)="onViewCertificatePressed()"
          ></tn-button>
          <tn-button
            variant="outline"
            type="button"
            [testId]="'view-key'"
            [label]="'View/Download Key' | translate"
            (onClick)="onViewKeyPressed()"
          ></tn-button>
        </div>
      }
    </tn-form-section>
  }

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="!form.valid || isLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
    <ng-container *ixRequiresRoles="requiredRoles">
      @if (slideInRef && isCsr) {
        <tn-button
          type="button"
          [testId]="'create-acme-certificate'"
          [label]="'Create ACME Certificate' | translate"
          (onClick)="onCreateAcmePressed()"
        ></tn-button>
      }
    </ng-container>
  </ix-form-actions>
</form>
