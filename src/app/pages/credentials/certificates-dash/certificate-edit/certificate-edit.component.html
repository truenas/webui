<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <div class="columns">
      <tn-form-field
        class="column"
        [label]="'Identifier' | translate"
        [tooltip]="helptext.edit.name.tooltip | translate"
        [required]="true"
      >
        <tn-input formControlName="name" testId="name"></tn-input>
      </tn-form-field>

      @if (form.controls.renew_days) {
        <tn-form-field
          class="column"
          [label]="'Renew Certificate Days Before Expiry' | translate"
          [tooltip]="helptext.edit.renewDays.tooltip | translate"
        >
          <tn-input formControlName="renew_days" testId="renew_days" [inputType]="InputType.Number"></tn-input>
        </tn-form-field>
      }
      <div class="column"></div>
    </div>
  </tn-form-section>

  @if (!isCsr) {
    <tn-form-section>
      <tn-form-field>
        <tn-checkbox
          formControlName="add_to_trusted_store"
          testId="add_to_trusted_store"
          [label]="'Add to trusted store' | translate"
        ></tn-checkbox>
      </tn-form-field>
    </tn-form-section>
  }

  @if (certificate) {
    <tn-form-section [heading]="'Subject' | translate">
      <ix-certificate-details
        [certificate]="certificate"
      ></ix-certificate-details>
      <!-- View/Download and Create ACME actions are rendered by the tn-side-panel host
        in the footer menu (see footerMenu). -->
    </tn-form-section>
  }
</form>
