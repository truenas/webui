<form [formGroup]="form">
  <ix-input
    formControlName="name"
    [label]="'Name' | translate"
    [required]="true"
    [tooltip]="helptext.add.name.tooltip | translate"
  ></ix-input>

  <ix-select
    formControlName="create_type"
    [label]="'Type' | translate"
    [required]="true"
    [options]="createTypes$"
    [tooltip]="helptext.add.csrCreateType.tooltip | translate"
  ></ix-select>

  @if (!isImport) {
    <ix-select
      formControlName="profile"
      [label]="'Profile' | translate"
      [options]="profileOptions$"
      [tooltip]="helptext.add.profiles.tooltip | translate"
    ></ix-select>
  }

  <ix-form-actions>
    <tn-button
      tnStepperNext
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
