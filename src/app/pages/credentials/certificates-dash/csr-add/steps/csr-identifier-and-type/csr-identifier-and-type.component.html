<form [formGroup]="form">
  <tn-form-field
    [label]="'Name' | translate"
    [required]="true"
    [tooltip]="helptext.add.name.tooltip | translate"
  >
    <tn-input formControlName="name" testId="name"></tn-input>
  </tn-form-field>

  <tn-form-field
    [label]="'Type' | translate"
    [tooltip]="helptext.add.csrCreateType.tooltip | translate"
    [required]="true"
  >
    <tn-select
      formControlName="create_type"
      testId="create_type"
      [options]="(createTypes$ | async) ?? []"
    ></tn-select>
  </tn-form-field>

  @if (!isImport) {
    <tn-form-field
      [label]="'Profile' | translate"
      [tooltip]="helptext.add.profiles.tooltip | translate"
    >
      <tn-select
        formControlName="profile"
        testId="profile"
        [options]="(profileOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>
  }

  <ix-form-actions>
    <tn-button
      tnStepperNext
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
