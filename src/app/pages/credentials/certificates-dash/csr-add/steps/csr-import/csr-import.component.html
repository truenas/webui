<form [formGroup]="form">
  <tn-form-field
    [label]="'Signing Request' | translate"
    [required]="true"
    [tooltip]="helptext.add.certCsr.tooltip | translate"
  >
    <tn-input
      formControlName="CSR"
      testId="CSR"
      [multiline]="true"
    ></tn-input>
  </tn-form-field>

  <tn-form-field
    [label]="'Private Key' | translate"
    [required]="true"
    [tooltip]="helptext.add.privatekey.tooltip | translate"
  >
    <tn-input
      formControlName="privatekey"
      testId="privatekey"
      [multiline]="true"
    ></tn-input>
  </tn-form-field>

  <tn-form-field
    [label]="'Passphrase' | translate"
    [tooltip]="helptext.add.passphrase.tooltip | translate"
  >
    <tn-input
      formControlName="passphrase"
      testId="passphrase"
      [inputType]="InputType.Password"
    ></tn-input>
  </tn-form-field>

  <tn-form-field [label]="'Confirm Passphrase' | translate">
    <tn-input
      formControlName="passphrase2"
      testId="passphrase2"
      [inputType]="InputType.Password"
    ></tn-input>
  </tn-form-field>

  <ix-form-actions>
    <tn-button
      [testId]="'back'"
      [label]="'Back' | translate"
      (onClick)="goBack()"
    ></tn-button>
    <tn-button
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
      (onClick)="goNext()"
    ></tn-button>
  </ix-form-actions>
</form>
