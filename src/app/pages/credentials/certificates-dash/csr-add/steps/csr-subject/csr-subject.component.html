<form [formGroup]="form">
  <tn-form-section>
    <tn-form-field
      [label]="'Country' | translate"
      [tooltip]="helptext.add.country.tooltip | translate"
      [required]="true"
    >
      <tn-select
        formControlName="country"
        testId="country"
        [options]="(countries$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field
      [label]="'State' | translate"
      [required]="true"
      [tooltip]="helptext.add.state.tooltip | translate"
    >
      <tn-input formControlName="state" testId="state"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Locality' | translate"
      [required]="true"
      [tooltip]="helptext.add.city.tooltip | translate"
    >
      <tn-input formControlName="city" testId="city"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Organization' | translate"
      [required]="true"
      [tooltip]="helptext.add.organization.tooltip | translate"
    >
      <tn-input formControlName="organization" testId="organization"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Organizational Unit' | translate"
      [tooltip]="helptext.add.organizationalUnit.tooltip | translate"
    >
      <tn-input formControlName="organizational_unit" testId="organizational_unit"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Email' | translate"
      [required]="true"
      [tooltip]="helptext.add.email.tooltip | translate"
    >
      <tn-input formControlName="email" testId="email"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Common Name' | translate"
      [tooltip]="helptext.add.common.tooltip | translate"
    >
      <tn-input formControlName="common" testId="common"></tn-input>
    </tn-form-field>

    <ix-chips
      formControlName="san"
      [label]="'Subject Alternative Name' | translate"
      [required]="true"
      [tooltip]="helptext.add.san.tooltip | translate"
    ></ix-chips>
  </tn-form-section>

  <ix-form-actions>
    <tn-button
      tnStepperPrevious
      [testId]="'back'"
      [label]="'Back' | translate"
    ></tn-button>
    <tn-button
      tnStepperNext
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
