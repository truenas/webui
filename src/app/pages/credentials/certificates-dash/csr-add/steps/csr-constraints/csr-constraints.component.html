<form [formGroup]="form">
  <ng-container formGroupName="BasicConstraints">
    <tn-form-field [tooltip]="helptext.add.basicConstraints.enabled.tooltip | translate">
      <tn-checkbox
        formControlName="enabled"
        testId="basic-constraints-enabled"
        [label]="'Basic Constraints' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (hasExtension('BasicConstraints')) {
      <tn-form-field
        [label]="'Path Length' | translate"
        [tooltip]="helptext.add.basicConstraints.pathLength.tooltip | translate"
      >
        <tn-input
          formControlName="path_length"
          testId="path_length"
          [inputType]="InputType.Number"
        ></tn-input>
      </tn-form-field>
      <tn-form-field
        [label]="'Basic Constraints Config' | translate"
        [tooltip]="helptext.add.basicConstraints.config.tooltip | translate"
      >
        <tn-select
          formControlName="BasicConstraints"
          testId="BasicConstraints"
          [options]="(basicConstraintsOptions$ | translateOptions | async) ?? []"
          [multiple]="true"
        ></tn-select>
      </tn-form-field>
    }
  </ng-container>

  <ng-container formGroupName="ExtendedKeyUsage">
    <tn-form-field [tooltip]="helptext.add.extendedKeyUsage.enabled.tooltip | translate">
      <tn-checkbox
        formControlName="enabled"
        testId="extended-key-usage-enabled"
        [label]="'Extended Key Usage' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (hasExtension('ExtendedKeyUsage')) {
      <tn-form-field
        [label]="'Usages' | translate"
        [tooltip]="helptext.add.extendedKeyUsage.usages.tooltip | translate"
        [required]="true"
      >
        <tn-select
          formControlName="usages"
          testId="usages"
          [options]="(extendedKeyUsageOptions$ | async) ?? []"
          [multiple]="true"
        ></tn-select>
      </tn-form-field>
      <tn-form-field [tooltip]="helptext.add.extendedKeyUsage.extensionCritical.tooltip | translate">
        <tn-checkbox
          formControlName="extension_critical"
          testId="extension_critical"
          [label]="'Critical Extension' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }
  </ng-container>

  <ng-container formGroupName="KeyUsage">
    <tn-form-field [tooltip]="helptext.add.keyUsage.enabled.tooltip | translate">
      <tn-checkbox
        formControlName="enabled"
        testId="key-usage-enabled"
        [label]="'Key Usage' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (hasExtension('KeyUsage')) {
      <tn-form-field
        [label]="'Key Usage Config' | translate"
        [tooltip]="helptext.add.keyUsage.config.tooltip | translate"
      >
        <tn-select
          formControlName="KeyUsage"
          testId="KeyUsage"
          [options]="(keyUsageOptions$ | translateOptions | async) ?? []"
          [multiple]="true"
        ></tn-select>
      </tn-form-field>
    }
  </ng-container>

  <ix-form-actions>
    <tn-button
      tnStepperPrevious
      [testId]="'back'"
      [label]="'Back' | translate"
    ></tn-button>
    <tn-button
      tnStepperNext
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
