<form [formGroup]="form">
  <tn-form-section>
    <tn-form-field
      [label]="'Key Type' | translate"
      [tooltip]="helptext.add.keyType.tooltip | translate"
      [required]="true"
    >
      <tn-select
        formControlName="key_type"
        testId="key_type"
        [options]="(keyTypes$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (isRsa) {
      <tn-form-field
        [label]="'Key Length' | translate"
        [tooltip]="helptext.add.keyLength.tooltip | translate"
        [required]="true"
      >
        <tn-select
          formControlName="key_length"
          testId="key_length"
          [options]="(keyLengths$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    } @else {
      <tn-form-field
        [label]="'EC Curve' | translate"
        [tooltip]="helptext.add.ecCurve.tooltip | translate"
        [required]="true"
      >
        <tn-select
          formControlName="ec_curve"
          testId="ec_curve"
          [options]="(ecCurves$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    }

    <tn-form-field
      [label]="'Digest Algorithm' | translate"
      [tooltip]="helptext.add.digestAlgorithm.tooltip | translate"
      [required]="true"
    >
      <tn-select
        formControlName="digest_algorithm"
        testId="digest_algorithm"
        [options]="(digestAlgorithms$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (hasLifetime()) {
      <tn-form-field
        [label]="'Lifetime' | translate"
        [required]="true"
        [tooltip]="helptext.add.lifetime.tooltip | translate"
      >
        <tn-input
          formControlName="lifetime"
          testId="lifetime"
          [inputType]="InputType.Number"
        ></tn-input>
      </tn-form-field>
    }
  </tn-form-section>

  <ix-form-actions>
    <tn-button
      tnStepperPrevious
      [testId]="'back'"
      [label]="'Back' | translate"
    ></tn-button>
    <tn-button
      tnStepperNext
      color="primary"
      [testId]="'next'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </ix-form-actions>
</form>
