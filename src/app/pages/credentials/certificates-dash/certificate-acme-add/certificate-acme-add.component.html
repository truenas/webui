@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Create ACME Certificate' | translate"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Identifier' | translate"
      [tooltip]="helptext.edit.name.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="name"></tn-input>
    </tn-form-field>

    <tn-form-field
      [tooltip]="helptext.acme.tos.tooltip | translate"
      [required]="true"
    >
      <tn-checkbox
        formControlName="tos"
        [label]="'Terms of Service' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [label]="'Renew Certificate Days' | translate"
      [tooltip]="helptext.acme.renewDay.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="renew_days" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.acme.dirUri.customCheckboxTooltip | translate">
      <tn-checkbox
        formControlName="custom_acme_directory_uri"
        [label]="'Custom ACME Server Directory URI' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (!!form.controls.custom_acme_directory_uri.value) {
      <tn-form-field
        [label]="'ACME Server Directory URI' | translate"
        [tooltip]="helptext.acme.dirUri.customInputTooltip | translate"
        [required]="true"
      >
        <tn-input formControlName="acme_directory_uri"></tn-input>
      </tn-form-field>
    }

    @if (!form.controls.custom_acme_directory_uri.value) {
      <tn-form-field
        [label]="'ACME Server Directory URI' | translate"
        [tooltip]="helptext.acme.dirUri.tooltip | translate"
        [required]="true"
      >
        <tn-select
          formControlName="acme_directory_uri"
          [options]="(acmeDirectoryUris$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    }
  </tn-form-section>

  <tn-form-section [heading]="'Domains' | translate">
    <ix-list
      formArrayName="domains"
      [canAdd]="false"
      [formArray]="form.controls.domains"
    >
      @for (domain of domains; track domain; let i = $index) {
        <ix-list-item
          [canDelete]="false"
        >
          <tn-form-field
            class="list-item"
            [label]="domain"
            [tooltip]="helptext.acme.authenticator.tooltip | translate"
            [required]="true"
          >
            <tn-select
              [formControlName]="i"
              [options]="(authenticators$ | async) ?? []"
            ></tn-select>
          </tn-form-field>
        </ix-list-item>
      }
    </ix-list>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="isLoading() || form.invalid"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
