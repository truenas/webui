<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Name' | translate"
      [tooltip]="helptext.add.name.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="name" testId="name"></tn-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="add_to_trusted_store"
        testId="add_to_trusted_store"
        [label]="'Add To Trusted Store' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [label]="'Certificate' | translate"
      [tooltip]="helptext.add.certificate.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="certificate" testId="certificate" [multiline]="true"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Private Key' | translate"
      [tooltip]="helptext.add.privatekey.tooltip | translate"
    >
      <tn-input formControlName="privatekey" testId="privatekey" [multiline]="true"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Passphrase' | translate"
      [tooltip]="helptext.add.passphrase.tooltip | translate"
    >
      <tn-input formControlName="passphrase" testId="passphrase" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Confirm Passphrase' | translate">
      <tn-input formControlName="passphrase2" testId="passphrase2" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>
</form>
