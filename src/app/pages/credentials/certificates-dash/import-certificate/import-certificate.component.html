@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Import Certificate' | translate"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Name' | translate"
      [tooltip]="helptext.add.name.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="name"></tn-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="add_to_trusted_store"
        [label]="'Add To Trusted Store' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [label]="'Certificate' | translate"
      [tooltip]="helptext.add.certificate.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="certificate" [multiline]="true"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Private Key' | translate"
      [tooltip]="helptext.add.privatekey.tooltip | translate"
    >
      <tn-input formControlName="privatekey" [multiline]="true"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Passphrase' | translate"
      [tooltip]="helptext.add.passphrase.tooltip | translate"
    >
      <tn-input formControlName="passphrase" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Confirm Passphrase' | translate">
      <tn-input formControlName="passphrase2" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [label]="'Import' | translate"
        [disabled]="form.invalid || isLoading()"
        (onClick)="onSubmit()"
      ></tn-button>
    }
  </ix-form-actions>
</form>
