<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [label]="'Name' | translate" [required]="true">
      <tn-input formControlName="name" [required]="true" [testId]="'name'"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Local Groups' | translate">
      <tn-chip-input
        formControlName="local_groups"
        [suggestions]="localGroupsSuggestions()"
        [allowCustomValue]="false"
        [testId]="'local-groups'"
        (searchChange)="onLocalGroupsSearch($event)"
      ></tn-chip-input>
    </tn-form-field>

    @if (isEnterprise()) {
      <ix-group-chips
        formControlName="ds_groups"
        [label]="'Directory Services Groups' | translate"
      ></ix-group-chips>

      @if (showDsAuthButton()) {
        <div class="ds-auth-prompt">
          <p>{{ 'Directory Service users cannot login to TrueNAS WebUI. Enable DS authentication to allow access.' | translate }}</p>
          <tn-button
            color="primary"
            [testId]="'enable-ds-auth'"
            [disabled]="isEnablingDsAuth()"
            [label]="isEnablingDsAuth() ? ('Enabling...' | translate) : ('Enable DS Authentication' | translate)"
            (onClick)="enableDsAuth()"
          ></tn-button>
        </div>
      }
    }

    <tn-form-field
      [label]="'Roles' | translate"
      [tooltip]="helptext.minimalRolesTooltip | translate"
    >
      <tn-select
        formControlName="roles"
        [options]="(rolesOptions$ | async) ?? []"
        [multiple]="true"
        [showSelectAll]="true"
        [testId]="'roles'"
      ></tn-select>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="web_shell"
        [label]="'Web Shell Access' | translate"
        [testId]="'web-shell'"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>
</form>
