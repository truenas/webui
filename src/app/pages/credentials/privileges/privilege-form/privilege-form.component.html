<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title"
  [loading]="isLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <ix-input
      formControlName="name"
      [label]="'Name' | translate"
      [required]="true"
    ></ix-input>

    <ix-chips
      formControlName="local_groups"
      [label]="'Local Groups' | translate"
      [autocompleteProvider]="localGroupsProvider"
      [allowNewEntries]="false"
    ></ix-chips>

    @if (isEnterprise()) {
      <ix-group-chips
        formControlName="ds_groups"
        [label]="'Directory Services Groups' | translate"
      ></ix-group-chips>

      @if (showDsAuthButton()) {
        <div class="ds-auth-prompt">
          <p>{{ 'Directory Service users cannot login to TrueNAS WebUI. Enable DS authentication to allow access.' | translate }}</p>
          <tn-button
            color="primary"
            [testId]="'enable-ds-auth'"
            [disabled]="isEnablingDsAuth()"
            [label]="isEnablingDsAuth() ? ('Enabling...' | translate) : ('Enable DS Authentication' | translate)"
            (onClick)="enableDsAuth()"
          ></tn-button>
        </div>
      }
    }

    <ix-select
      formControlName="roles"
      [label]="'Roles' | translate"
      [options]="rolesOptions$"
      [multiple]="true"
      [showSelectAll]="true"
      [hint]="helptext.minimalRolesTooltip | translate"
    ></ix-select>

    <ix-checkbox
      formControlName="web_shell"
      [label]="'Web Shell Access' | translate"
    ></ix-checkbox>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      type="submit"
      [testId]="'save'"
      [disabled]="!form.valid || isLoading()"
      [label]="'Save' | translate"
    ></tn-button>
  </ix-form-actions>
</form>
