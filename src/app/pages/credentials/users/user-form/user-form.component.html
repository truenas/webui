<form
  class="ix-form-container"
  [formGroup]="form"
  (submit)="onSubmit()"
>
  <tn-form-section>
    <div>
      <tn-form-field [label]="'Username' | translate" [required]="true">
        <tn-input
          class="username"
          name="username"
          formControlName="username"
          [required]="true"
          [testId]="'username'"
        ></tn-input>
      </tn-form-field>
    </div>
  </tn-form-section>

  <ix-allowed-access-section
    [editingUser]="editingUser()"
    [password]="password()"
    [passwordDisabled]="passwordDisabled()"
  ></ix-allowed-access-section>

  <ix-auth-section
    [editingUser]="editingUser()"
    [homeDirectory]="homeDirectory()"
    [shell]="shell()"
  ></ix-auth-section>

  <ix-additional-details-section [editingUser]="editingUser()"></ix-additional-details-section>
</form>
