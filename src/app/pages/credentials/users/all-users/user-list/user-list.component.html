<ix-users-search
  [dataProvider]="dataProvider()"
></ix-users-search>

@let emptyType = dataProvider().emptyType$ | async;
<tn-table
  class="users-table"
  [dataSource]="(dataProvider().currentPage$ | async) ?? []"
  [displayedColumns]="displayedColumns"
  [trackBy]="trackByUid"
  [clickable]="true"
  [activeRow]="dataProvider().expandedRow"
  [loading]="!!(dataProvider().isLoading$ | async)"
  [loadingMessage]="'Loading…' | translate"
  [emptyMessage]="emptyService.defaultEmptyConfig(emptyType).title | translate"
  [emptyIcon]="emptyService.iconForType(emptyType)"
  (sortChange)="onSortChange($event)"
  (rowClick)="expanded($event)"
>
  <ng-container [tnColumnDef]="'username'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'Username' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ row.username }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'full_name'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'Full Name' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ row.full_name }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'builtin'" [sortable]="true">
    <ng-template tnHeaderCellDef>{{ 'Type' | translate }}</ng-template>
    <ng-template let-row tnCellDef>{{ userType(row) }}</ng-template>
  </ng-container>

  <ng-container [tnColumnDef]="'roles'">
    <ng-template tnHeaderCellDef>{{ 'Access' | translate }}</ng-template>
    <ng-template let-row tnCellDef>
      <ix-user-access-cell [user]="row"></ix-user-access-cell>
    </ng-template>
  </ng-container>
</tn-table>

<tn-table-pager [dataProvider]="dataProvider()"></tn-table-pager>
