<tn-dialog-shell [title]="'Delete User' | translate">
<div>
  <p class="message" [innerHtml]="deleteMessage | translate: { user: user.username }"></p>

  @if (isLastGroupMember) {
    <ix-checkbox
      class="delete-checkbox"
      ixTestOverride="delete-primary-group"
      [formControl]="deleteGroupCheckbox"
      [label]="'Delete user primary group `{name}`' | translate: { name: user.group.bsdgrp_group }"
    ></ix-checkbox>
  }
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close(false)"></tn-button>
  <tn-button *ixRequiresRoles="requiredRoles" color="warn" testId="delete" [label]="'Delete' | translate" (onClick)="onDelete()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
