<span>
  {{ 'Details for' | translate }}
  {{ user().username }}
</span>

<div class="user-actions">
  <tn-button
    [disabled]="!user().local"
    [tnTooltip]="directoryServiceTooltip()"
    [testId]="['edit-user', user().full_name]"
    [label]="'Edit' | translate"
    (onClick)="doEdit()"
  ></tn-button>

  @if (!user().immutable && loggedInUser().pw_name !== user().username) {
    <tn-button
      *ixRequiresRoles="[Role.AccountWrite]"
      [disabled]="!user().local"
      [tnTooltip]="directoryServiceTooltip()"
      [testId]="['delete', user().username]"
      [label]="'Delete' | translate"
      (onClick)="doDelete()"
    ></tn-button>
  }
</div>
