<div class="header-card item-search">
  <ix-fake-progress-bar
    class="loader-bar"
    [loading]="dataProvider()?.isLoading$ | async"
  ></ix-fake-progress-bar>

  <div class="actions-bar">
    <div class="search-container">
      <ix-search-input
        #searchInput
        class="search-input"
        [properties]="searchProperties()"
        [filterPresets]="userPresets()"
        [advancedSearchPlaceholder]="advancedSearchPlaceholder"
        [query]="searchQuery()"
        (runSearch)="onSearch(searchInput.query()); searchInput.advancedSearch()?.hideDatePicker()"
        (queryChange)="onQueryChange($event)"
      ></ix-search-input>
      <div class="search-button-wrapper">
        <tn-button
          color="primary"
          testId="search"
          [label]="'Search' | translate"
          (onClick)="onSearch(searchInput.query()); searchInput.advancedSearch()?.hideDatePicker()"
        ></tn-button>
      </div>
    </div>
    @if (searchQuery()?.isBasicQuery) {
      <div class="user-type-filter">
        <span class="user-type-label">{{ 'Filter by Type' | translate }}</span>
        <tn-select
          class="user-type-select"
          testId="filter-by-type"
          [multiple]="true"
          [options]="userTypeOptions()"
          [ariaLabel]="'Filter by Type' | translate"
          [ngModel]="selectedUserTypes()"
          (ngModelChange)="onUserTypeChange($event)"
        ></tn-select>
        <tn-slide-toggle
          class="builtin-toggle"
          color="primary"
          testId="show-built-in-users"
          [label]="'Show Built-in Users' | translate"
          [disabled]="!isBuiltinCheckboxEnabled()"
          [ngModel]="showBuiltinUsers()"
          [tnTooltip]="builtinToggleTooltip()"
          [ariaLabel]="isBuiltinCheckboxEnabled() ? ('Toggle to show or hide built-in system users' | translate) : ('Available only when Local users are selected' | translate)"
          (ngModelChange)="onShowBuiltinChange($event)"
        ></tn-slide-toggle>
      </div>
    }
  </div>
</div>
