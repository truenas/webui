<tn-card
  class="form-card"
  [primaryAction]="primaryAction()"
  [secondaryAction]="secondaryAction()"
>
  @if (isLoading()) {
    <tn-progress-bar mode="indeterminate"></tn-progress-bar>
  }

  @if (group()?.group) {
    <h3 tnCardHeader class="tn-card__title members-card-title">
      {{ 'Manage members of {name} group' | translate: { name: group()?.group || '' } }}
      @if (requiredRoles.length && !hasAccountWrite()) {
        <ix-readonly-badge></ix-readonly-badge>
      }
    </h3>
  }

  @if (users().length) {
    <ix-dual-listbox
      class="padding-16"
      display="username"
      key="id"
      height="55vh"
      [listItemIcon]="tnIconMarker('account', 'mdi')"
      [sourceName]="'All Users' | translate"
      [targetName]="'Group Members' | translate"
      [source]="users()"
      [(destination)]="selectedMembers"
    ></ix-dual-listbox>
  }
</tn-card>
