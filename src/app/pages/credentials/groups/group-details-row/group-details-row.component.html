<div class="group-details-row-actions">
  @if (group().local) {
    <tn-button
      [label]="'Members' | translate"
      [disabled]="group().immutable"
      [tnTooltip]="group().immutable ? ('This group is immutable and its members cannot be changed.' | translate) : ''"
      [testId]="[group().group, 'members']"
      (onClick)="openGroupMembersForm()"
    ></tn-button>
  }

  @if (!group().builtin && group().local && !group().immutable) {
    <tn-button
      [label]="'Edit' | translate"
      [testId]="[group().group, 'edit']"
      (onClick)="doEdit(group())"
    ></tn-button>
  }

  <ng-container *ixRequiresRoles="[Role.AccountWrite]">
    @if (!group().builtin) {
      <tn-button
        [label]="'Delete' | translate"
        [disabled]="isDeleteDisabled()"
        [tnTooltip]="deleteTooltip()"
        [testId]="[group().group, 'delete']"
        (onClick)="doDelete(group())"
      ></tn-button>
    }
  </ng-container>
</div>
