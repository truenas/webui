<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title"
  [loading]="isFormLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'Group Configuration' | translate">
    <tn-form-field
      [label]="ignoreTranslation('GID')"
      [required]="true"
      [tooltip]="tooltips.gid | translate"
    >
      <tn-input
        formControlName="gid"
        testId="gid"
        [inputType]="InputType.Number"
        [allowDecimals]="false"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Name' | translate"
      [required]="true"
      [tooltip]="tooltips.name | translate"
    >
      <tn-input formControlName="name" testId="name"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Privileges' | translate"
      [tooltip]="tooltips.privileges | translate"
    >
      <tn-chip-input
        formControlName="privileges"
        testId="privileges"
        [options]="(privilegeOptions$ | async) ?? []"
        [allowCustomValue]="false"
      ></tn-chip-input>
    </tn-form-field>

    <tn-form-field [label]="'Allowed Sudo Commands' | translate">
      <tn-chip-input formControlName="sudo_commands" testId="sudo-commands"></tn-chip-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="sudo_commands_all"
        testId="sudo-commands-all"
        [label]="'Allow All Sudo Commands' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [label]="'Allowed Sudo Commands with No Password' | translate">
      <tn-chip-input
        formControlName="sudo_commands_nopasswd"
        testId="sudo-commands-nopasswd"
      ></tn-chip-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="sudo_commands_nopasswd_all"
        testId="sudo-commands-nopasswd-all"
        [label]="'Allow All Sudo Commands with No Password' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.smb">
      <tn-checkbox
        formControlName="smb"
        testId="smb"
        [label]="'SMB Group' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading()"
    ></tn-button>
  </ix-form-actions>
</form>
