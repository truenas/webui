@if (definition(); as def) {
  <ix-form-renderer
    [definition]="def"
    [editData]="editData()"
    (closed)="closed.emit($event)"
    (canSubmitChange)="canSubmitSig.set($event)"
  ></ix-form-renderer>
} @else {
  <!-- The fields/validators need async setup (privileges, names, next GID) before
       the form can render; show a loading bar instead of an empty panel meanwhile. -->
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}
