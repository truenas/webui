<h1 mat-dialog-title>{{ 'Delete Static Route' | translate }}</h1>
<div mat-dialog-content>
  <p class="message" [innerHTML]="deleteMessage | translate: { name: route.destination }"></p>
</div>
<ix-form-actions mat-dialog-actions class="form-actions">
  <tn-button
    [testId]="'cancel'"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="warn"
    [testId]="'delete'"
    [label]="'Delete' | translate"
    (onClick)="onDelete()"
  ></tn-button>
</ix-form-actions>
