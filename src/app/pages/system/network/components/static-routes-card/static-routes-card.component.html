<tn-card padding="small" [ixUiSearch]="searchableElements.staticRoutes">
  <div tnCardHeader class="title-group">
    <h3 class="tn-card__title">{{ 'Static Routes' | translate }}</h3>

    <ix-tooltip
      [header]="'Static Routes' | translate"
      [message]="'Used for advanced routing, e.g., sending traffic to a specific network via a non-default gateway.' | translate"
    ></ix-tooltip>
  </div>

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      variant="outline"
      color="default"
      [label]="'Add' | translate"
      [testId]="['add-static-route']"
      [ixUiSearch]="searchableElements.add"
      (onClick)="doAdd()"
    ></tn-button>
  </ng-template>

  <tn-table
    class="table"
    [dataSource]="rows()"
    [displayedColumns]="displayedColumns"
    [loading]="isLoading()"
    [emptyMessage]="emptyMessage()"
    [emptyIcon]="emptyIcon()"
    (sortChange)="onSortChange($event)"
  >
    <ng-container [tnColumnDef]="'destination'" [sortable]="true">
      <ng-template tnHeaderCellDef>{{ 'Destination' | translate }}</ng-template>
      <ng-template let-row tnCellDef>{{ row.destination }}</ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'gateway'" [sortable]="true">
      <ng-template tnHeaderCellDef>{{ 'Gateway' | translate }}</ng-template>
      <ng-template let-row tnCellDef>{{ row.gateway }}</ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
      <ng-template tnHeaderCellDef></ng-template>
      <ng-template let-row tnCellDef>
        <ix-table-actions-cell
          mode="inline"
          [actions]="actions"
          [row]="row"
          [uniqueRowTag]="uniqueRowTag(row)"
          [ariaLabel]="ariaLabel(row)"
        ></ix-table-actions-cell>
      </ng-template>
    </ng-container>
  </tn-table>

  <ix-table-pager-show-more
    [pageSize]="4"
    [dataProvider]="dataProvider"
    [ixTestOverride]="['static-routes']"
  ></ix-table-pager-show-more>
</tn-card>
