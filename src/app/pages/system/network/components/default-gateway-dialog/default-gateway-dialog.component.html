<tn-dialog-shell [title]="'Set Gateway and DNS' | translate">
<div>
  <p class="message">{{ 'Editing interface will result in default gateway being removed, which may result in TrueNAS being inaccessible. You can provide new default gateway and DNS information now:' | translate }}</p>
  <p class="message">{{ 'Current values are pre-filled in the form below.' | translate }}</p>
</div>
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <div>
    <ix-fieldset>
      <ix-input
        formControlName="defaultGateway"
        [label]="'New IPv4 Default Gateway' | translate"
        [required]="true"
        [tooltip]="helptext.ipv4gatewayTooltip | translate"
      ></ix-input>
      
      <ix-input
        formControlName="dns1"
        [label]="'Primary DNS Server' | translate"
        [tooltip]="'Primary DNS server address (optional)' | translate"
      ></ix-input>
      
      <ix-input
        formControlName="dns2"
        [label]="'Secondary DNS Server' | translate"
        [tooltip]="'Secondary DNS server address (optional)' | translate"
      ></ix-input>
      
      <ix-input
        formControlName="dns3"
        [label]="'Tertiary DNS Server' | translate"
        [tooltip]="'Tertiary DNS server address (optional)' | translate"
      ></ix-input>
    </ix-fieldset>
  </div>
</form>

<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Skip' | translate" (onClick)="dialogRef.close(false)"></tn-button>

  <tn-button *ixRequiresRoles="requiredRoles" color="primary" testId="register" [label]="'Register' | translate" [disabled]="form.invalid" (onClick)="onSubmit()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
