<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title"
  [loading]="isFormLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset [title]="'General Options' | translate">
    <ix-input
      formControlName="destination"
      [label]="'Destination' | translate"
      [required]="true"
      [tooltip]="tooltips.destination | translate"
    ></ix-input>

    <ix-input
      formControlName="gateway"
      [label]="'Gateway' | translate"
      [required]="true"
      [tooltip]="tooltips.gateway | translate"
    ></ix-input>

    <ix-input
      formControlName="description"
      [label]="'Description' | translate"
    ></ix-input>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading()"
      (onClick)="onSubmit()"
    ></tn-button>
  </ix-form-actions>
</form>
