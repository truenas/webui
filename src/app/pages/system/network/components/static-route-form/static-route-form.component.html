<ix-form
  [formGroup]="form"
  [editData]="editingRoute"
  [title]="title"
  [requiredRoles]="requiredRoles"
  [submitHandler]="handleSubmit"
>
  <ix-fieldset [title]="'General Options' | translate">
    <ix-input
      formControlName="destination"
      [label]="'Destination' | translate"
      [required]="true"
      [tooltip]="tooltips.destination | translate"
    ></ix-input>

    <ix-input
      formControlName="gateway"
      [label]="'Gateway' | translate"
      [required]="true"
      [tooltip]="tooltips.gateway | translate"
    ></ix-input>

    <ix-input
      formControlName="description"
      [label]="'Description' | translate"
    ></ix-input>
  </ix-fieldset>
</ix-form>
