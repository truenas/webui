<tn-card padding="small">
  <div tnCardHeader class="card-header">
    <h3 class="tn-card__title">{{ 'Interfaces' | translate }}</h3>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      variant="outline"
      color="default"
      [label]="'Add' | translate"
      [testId]="['add', 'interface']"
      [disabled]="isHaEnabled()"
      [tnTooltip]="'Editing interfaces is not allowed while HA is enabled' | translate"
      [tnTooltipDisabled]="!isHaEnabled()"
      [ixUiSearch]="searchableElements.addInterface"
      (onClick)="onAddNew()"
    ></tn-button>
  </div>

  <tn-table
    class="interfaces-table"
    [ixUiSearch]="searchableElements.interfaces"
    [dataSource]="rows()"
    [displayedColumns]="displayedColumns"
    [loading]="isLoading()"
  >
    <ng-container [tnColumnDef]="'state'" [width]="'40px'">
      <ng-template tnHeaderCellDef></ng-template>
      <ng-template let-row tnCellDef>
        <ix-interface-status-icon [update]="inOutUpdates()[row.name]"></ix-interface-status-icon>
      </ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'name'">
      <ng-template tnHeaderCellDef>{{ 'Name' | translate }}</ng-template>
      <ng-template let-row tnCellDef>{{ nameWithDescription(row) }}</ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'ip_addresses'">
      <ng-template tnHeaderCellDef>{{ 'IP Addresses' | translate }}</ng-template>
      <ng-template let-row tnCellDef>
        <ix-ip-addresses-cell [row]="row"></ix-ip-addresses-cell>
      </ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'mac'">
      <ng-template tnHeaderCellDef>{{ 'MAC Address' | translate }}</ng-template>
      <ng-template let-row tnCellDef>{{ row.state.permanent_link_address }}</ng-template>
    </ng-container>

    <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
      <ng-template tnHeaderCellDef></ng-template>
      <ng-template let-row tnCellDef>
        <ix-share-actions-cell
          [actions]="actions"
          [row]="row"
          [uniqueRowTag]="uniqueRowTag(row)"
          [ariaLabel]="ariaLabel(row)"
        ></ix-share-actions-cell>
      </ng-template>
    </ng-container>
  </tn-table>
</tn-card>
