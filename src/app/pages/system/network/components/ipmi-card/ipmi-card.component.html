@if (hasIpmi()) {
  <tn-card padding="small" [ixUiSearch]="searchableElements.ipmi">
    <h3 tnCardHeader class="tn-card__title">IPMI</h3>

    <ng-template tnCardFooterActions>
      <tn-button
        variant="outline"
        color="default"
        [label]="'Show Events' | translate"
        [testId]="'show-events'"
        [ixUiSearch]="searchableElements.showEvents"
        (onClick)="onOpenEvents()"
      ></tn-button>
    </ng-template>

    <tn-table
      class="table"
      [dataSource]="rows()"
      [displayedColumns]="displayedColumns"
      [loading]="isLoading()"
      [emptyMessage]="emptyMessage()"
      [emptyIcon]="emptyIcon()"
    >
      <ng-container [tnColumnDef]="'channel'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          {{ 'Channel {n}' | translate: { n: row.channel } }}
        </ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            mode="inline"
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>
  </tn-card>
}
