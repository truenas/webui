<tn-dialog-shell testId="ipmi-events" [title]="'IPMI Events' | translate">
<ix-fake-progress-bar [loading]="isLoading()"></ix-fake-progress-bar>

<div class="events-container">
  @if ((events.length || isLoading())) {
    @for (event of events; track event.id) {
      <div class="event">
        <div class="event-header">
          <div>{{ getEventDate(event) | formatDateTime }}</div>
          <div>
            {{ event.name }}
            &mdash;
            {{ event.event_direction }}
          </div>
        </div>
        <div class="event-description">
          {{ event.event }}
        </div>
      </div>
    }
  } @else {
    <ix-empty [conf]="emptyConfig"></ix-empty>
  }
</div>
<ix-form-actions tnDialogAction class="form-actions">
  @if (canClear) {
    <tn-button color="warn" testId="clear" [label]="'Clear' | translate" (onClick)="onClear()"></tn-button>
  }
  <tn-button color="primary" testId="close" [label]="'Close' | translate" (onClick)="dialogRef.close()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
