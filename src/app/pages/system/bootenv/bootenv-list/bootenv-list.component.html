<ix-page-header [loading]="!!(dataProvider.isLoading$ | async)">
  <ix-basic-search
    [query]="searchQuery()"
    (queryChange)="onListFiltered($event)"
  ></ix-basic-search>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    [testId]="'bootenv-stats'"
    [label]="'Stats/Settings' | translate"
    [ixUiSearch]="searchableElements.elements.stats"
    (onClick)="openBootenvStats()"
  ></tn-button>

  <tn-button
    [testId]="'bootenv-status'"
    [label]="'Boot Pool Status' | translate"
    [routerLink]="['/', 'system', 'boot', 'status']"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    [testId]="'bootenv-scrub'"
    [label]="'Scrub Boot Pool' | translate"
    [ixUiSearch]="searchableElements.elements.scrubBootPool"
    (onClick)="doScrub()"
  ></tn-button>
</ix-page-header>

@if (selectedBootenvs.length) {
  <div class="batch-actions-toolbar">
    <div class="title">
      <strong>{{ 'Batch Operations' | translate }}</strong>
    </div>
    <div class="actions">
      <tn-button
        *ixRequiresRoles="requiredRoles"
        icon="mdi-delete"
        [testId]="'delete'"
        [label]="'Delete' | translate"
        [disabled]="!selectionHasItems"
        (onClick)="doDelete(selectedBootenvs)"
      ></tn-button>
    </div>
  </div>
}

<ix-table
  class="table"
  [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
  [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
  [ixUiSearch]="searchableElements.elements.boot"
>
  <thead
    ix-table-head
    [columns]="columns"
    [dataProvider]="dataProvider"
  ></thead>
  <tbody
    ix-table-body
    [columns]="columns"
    [dataProvider]="dataProvider"
    [isLoading]="!!(dataProvider.isLoading$ | async)"
  >
  </tbody>
</ix-table>
<tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
