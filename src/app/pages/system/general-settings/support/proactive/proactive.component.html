<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title | translate"
  [loading]="isLoading()"
></ix-modal-header>

@if (isSupportUnavailable()) {
  <ix-warning [message]="helptext.proactive.unavailableMessage"></ix-warning>
}
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <div class="two-columns">
    <ix-fieldset
      [class.form-disable]="isSupportUnavailable()"
      [title]="helptext.proactive.primaryContact | translate"
      [tooltip]="helptext.proactive.instructions | translate"
    >
      <ix-input
        formControlName="name"
        [label]="'Name' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="title"
        [label]="'Title' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="email"
        [label]="'Email' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="phone"
        [label]="'Phone Number' | translate"
        [required]="true"
      ></ix-input>

      <ix-checkbox
        formControlName="enabled"
        [label]="'Enable TrueNAS Proactive Support' | translate"
      ></ix-checkbox>
    </ix-fieldset>

    <ix-fieldset
      [class.form-disable]="isSupportUnavailable()"
      [title]="helptext.proactive.secondaryContact | translate"
    >
      <ix-input
        formControlName="secondary_name"
        [label]="'Secondary Name' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="secondary_title"
        [label]="'Secondary Title' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="secondary_email"
        [label]="'Secondary Email' | translate"
        [required]="true"
      ></ix-input>

      <ix-input
        formControlName="secondary_phone"
        [label]="'Secondary Phone Number' | translate"
        [required]="true"
      ></ix-input>
    </ix-fieldset>
  </div>
  <div class="form-actions">
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isLoading() || isSupportUnavailable()"
      (onClick)="onSubmit()"
    ></tn-button>
  </div>
</form>
