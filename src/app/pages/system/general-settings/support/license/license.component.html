<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title"
  [loading]="isFormLoading"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <ix-textarea
      [formControlName]="license.fcName"
      [label]="license.label | translate"
      [required]="true"
    ></ix-textarea>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      type="submit"
      color="primary"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isFormLoading"
      (onClick)="onSubmit()"
    ></tn-button>
  </ix-form-actions>
</form>
