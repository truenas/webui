<ix-form
  [formGroup]="form"
  [title]="title"
  [requiredRoles]="requiredRoles"
  [suppressSuccessSnackbar]="true"
  [submitHandler]="handleSubmit"
>
  <tn-form-section>
    <tn-form-field
      [label]="license.label | translate"
      [required]="true"
    >
      <tn-input
        [formControlName]="license.fcName"
        [multiline]="true"
      ></tn-input>
    </tn-form-field>
  </tn-form-section>
</ix-form>
