<tn-dialog-shell [title]="'Update Production Status' | translate">
<div>
  <p>{{ 'Set production status as active' | translate }}</p>

  <ix-checkbox
    [formControl]="sendInitialDebugCheckbox"
    [label]="'Send initial debug' | translate"
  ></ix-checkbox>
</div>

<ix-form-actions tnDialogAction class="form-actions">
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close()"></tn-button>

  <tn-button *ixRequiresRoles="requiredRoles" color="primary" testId="proceed" [label]="'Proceed' | translate" (onClick)="onSubmit()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
