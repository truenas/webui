<tn-dialog-shell [title]="'Update Production Status' | translate">
<div>
  <p>{{ 'Set production status as active' | translate }}</p>

  <ix-checkbox
    [formControl]="sendInitialDebugCheckbox"
    [label]="'Send initial debug' | translate"
  ></ix-checkbox>
</div>

<ix-form-actions tnDialogAction class="form-actions">
  <button mat-button type="button" ixTest="cancel">
    {{ 'Cancel' | translate }}
  </button>

  <button
    *ixRequiresRoles="requiredRoles"
    mat-button
    type="submit"
    color="primary"
    ixTest="proceed"
    (click)="onSubmit()"
  >
    {{ 'Proceed' | translate }}
  </button>
</ix-form-actions>
</tn-dialog-shell>
