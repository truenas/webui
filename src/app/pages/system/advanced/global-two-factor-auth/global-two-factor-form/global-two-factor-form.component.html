@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Global Two Factor Authentication' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [hint]="twoFactorConfig?.enabled ? '' : enableWarning">
      <tn-checkbox
        formControlName="enabled"
        [label]="'Enable Two Factor Authentication Globally' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [label]="'Window' | translate" [required]="true">
      <tn-input
        formControlName="window"
        [inputType]="InputType.Number"
        [allowDecimals]="false"
      ></tn-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox
        formControlName="ssh"
        [label]="'Enable Two Factor Authentication for SSH' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
