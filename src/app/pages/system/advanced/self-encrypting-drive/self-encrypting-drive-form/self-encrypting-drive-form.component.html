@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="labels.sed_passwd | translate"
      [tooltip]="tooltips.sed_passwd | translate"
    >
      <tn-input formControlName="sed_passwd" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="labels.sed_passwd2 | translate">
      <tn-input formControlName="sed_passwd2" [inputType]="InputType.Password"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
