<tn-card
  id="nvidia-drivers"
  padding="small"
  [title]="'NVIDIA Drivers' | translate"
  [ixUiSearch]="searchableElements.elements.nvidiaDrivers"
>
  <div class="details">
    <div class="details-item" [ixUiSearch]="searchableElements.elements.enableNvidiaGpuSupport">
      <span class="label">{{ 'Enable NVIDIA GPU Support' | translate }}:</span>
      <span *ixWithLoadingState="nvidiaEnabled$ as nvidiaEnabled" class="value">
        {{ nvidiaEnabled ? ('Enabled' | translate) : ('Disabled' | translate) }}
      </span>
    </div>
  </div>

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['nvidia-drivers', 'configure']"
      [ixUiSearch]="searchableElements.elements.configure"
      [label]="'Configure' | translate"
      (onClick)="onConfigurePressed()"
    ></tn-button>
  </ng-template>
</tn-card>

<tn-side-panel
  [title]="'NVIDIA Drivers' | translate"
  [closeGuard]="closeGuard"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-nvidia-drivers-form (closed)="onConfigClosed($event)"></ix-nvidia-drivers-form>
  }
  @if (configForm(); as form) {
    <div tnSidePanelAction>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="!form.canSubmit()"
        (onClick)="form.submit()"
      ></tn-button>
    </div>
  }
</tn-side-panel>
