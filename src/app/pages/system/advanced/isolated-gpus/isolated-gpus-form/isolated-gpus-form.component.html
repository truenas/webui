@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Isolated GPU PCI Ids' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [label]="'GPUs' | translate">
      <tn-select
        formControlName="isolated_gpu_pci_ids"
        [multiple]="true"
        [options]="(options$ | async) ?? []"
      ></tn-select>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
