<tn-card
  padding="small"
  id="configure-isolated-gpus"
  [title]="'Isolated GPU Device(s)' | translate"
  [ixUiSearch]="searchableElements.elements.isolatedGpus"
>
  @if (isolatedGpus.length === 0) {
    <tn-empty
      [title]="'No Isolated GPU Device(s) configured' | translate"
      [description]="'To configure Isolated GPU Device(s), click the &quot;Configure&quot; button.' | translate"
    ></tn-empty>
  } @else {
    <div class="details">
      <div class="details-item" [ixUiSearch]="searchableElements.elements.isolatedGpuPciIds">
        <span class="label">{{ 'Isolated GPU Device(s)' | translate }}:</span>
        <span class="value">{{ isolatedGpuNames }}</span>
      </div>
    </div>
  }

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['isolated-gpus-devices', 'configure']"
      [ixUiSearch]="searchableElements.elements.configure"
      [label]="'Configure' | translate"
      (onClick)="onConfigurePressed()"
    ></tn-button>
  </ng-template>
</tn-card>

<tn-side-panel
  [title]="'Isolated GPU Device(s)' | translate"
  [closeGuard]="closeGuard"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-isolated-gpus-form (closed)="onConfigClosed($event)"></ix-isolated-gpus-form>
  }
  @if (configForm(); as form) {
    <div tnSidePanelAction>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="!form.canSubmit()"
        (onClick)="form.submit()"
      ></tn-button>
    </div>
  }
</tn-side-panel>
