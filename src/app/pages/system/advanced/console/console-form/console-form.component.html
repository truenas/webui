@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Console' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [tooltip]="tooltips.consolemenu | translate">
      <tn-checkbox
        formControlName="consolemenu"
        [label]="'Show Text Console without Password Prompt' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="tooltips.serialconsole | translate">
      <tn-checkbox
        formControlName="serialconsole"
        [label]="'Enable Serial Console' | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [label]="'Serial Port' | translate" [tooltip]="tooltips.serialport | translate">
      <tn-select
        formControlName="serialport"
        [options]="(serialPortOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field [label]="'Serial Speed' | translate" [tooltip]="tooltips.serialspeed | translate">
      <tn-select
        formControlName="serialspeed"
        [options]="(serialSpeedOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field [label]="'MOTD Banner' | translate" [tooltip]="tooltips.motd | translate">
      <tn-input formControlName="motd" [multiline]="true"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
