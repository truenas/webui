@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form
  class="ix-form-container"
  [formGroup]="form"
  (submit)="onSubmit()"
>
  <tn-form-section [heading]="helptext.fieldset | translate">
    <tn-form-field
      [label]="helptext.address.label | translate"
      [tooltip]="helptext.address.tooltip | translate"
      [required]="true"
    >
      <tn-input formControlName="address"></tn-input>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.burst.tooltip | translate">
      <tn-checkbox
        formControlName="burst"
        [label]="helptext.burst.label | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.iburst.tooltip | translate">
      <tn-checkbox
        formControlName="iburst"
        [label]="helptext.iburst.label | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.prefer.tooltip | translate">
      <tn-checkbox
        formControlName="prefer"
        [label]="helptext.prefer.label | translate"
      ></tn-checkbox>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.minpoll.label | translate"
      [tooltip]="helptext.minpoll.tooltip | translate"
      [required]="true"
    >
      <tn-input
        formControlName="minpoll"
        [inputType]="InputType.Number"
        [allowDecimals]="false"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.maxpoll.label | translate"
      [tooltip]="helptext.maxpoll.tooltip | translate"
      [required]="true"
    >
      <tn-input
        formControlName="maxpoll"
        [inputType]="InputType.Number"
        [allowDecimals]="false"
      ></tn-input>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.force.tooltip | translate">
      <tn-checkbox
        formControlName="force"
        [label]="helptext.force.label | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
