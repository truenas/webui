<tn-card
  padding="small"
  [title]="'Storage' | translate"
  [ixUiSearch]="searchableElements.elements.storage"
>
  <div class="details">
    <div class="details-item" [ixUiSearch]="searchableElements.elements.systemPool">
      <span class="label">{{ 'System Dataset Pool' | translate }}:</span>
      <span class="value">
        @if (isLoading()) {
          <ngx-skeleton-loader></ngx-skeleton-loader>
        } @else {
          {{ systemDatasetPool() }}
        }
      </span>
    </div>

    <div class="details-item" [ixUiSearch]="searchableElements.elements.priorityResilver">
      <span class="label">{{ 'Resilvering At Higher Priority' | translate }}:</span>
      <span class="value">
        @if (isLoading()) {
          <ngx-skeleton-loader></ngx-skeleton-loader>
        } @else {
          {{ priorityResilverSummary() }}
        }
      </span>
    </div>
  </div>

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['storage', 'configure']"
      [ixUiSearch]="searchableElements.elements.configure"
      [label]="'Configure' | translate"
      (onClick)="onConfigurePressed()"
    ></tn-button>
  </ng-template>
</tn-card>
