<ix-form
  [formGroup]="form"
  [initialFormSnapshot]="initialSnapshot()"
  [isEditMode]="true"
  [requireDirty]="true"
  [title]="'Storage Settings' | translate"
  [requiredRoles]="anyRoles"
  [preSubmit]="preSubmit"
  [submitHandler]="handleSubmit"
>
  <tn-form-section>
    <tn-form-field [label]="'System Dataset Pool' | translate">
      <tn-select
        formControlName="systemDatasetPool"
        [options]="(poolOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (isSmbRunning$ | async) {
      <ix-warning
        [message]="helptext.smbRebootWarning | translate"
      ></ix-warning>
    }
  </tn-form-section>

  <tn-form-section
    [heading]="'Priority Resilvering' | translate"
    [formGroup]="form.controls.priorityResilver"
  >
    <tn-form-field [tooltip]="helptext.priorityResilverEnabled | translate">
      <tn-checkbox
        formControlName="enabled"
        [label]="'Run Resilvering At Higher Priority At Certain Times' | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (this.form.value.priorityResilver.enabled) {
      <tn-form-field [label]="'Days of the Week' | translate">
        <tn-select
          formControlName="weekday"
          [multiple]="true"
          [options]="(daysOfWeek$ | async) ?? []"
        ></tn-select>
      </tn-form-field>

      <div class="priority-times">
        <tn-form-field [label]="'From' | translate">
          <tn-select
            formControlName="begin"
            [options]="(timeOptions$ | async) ?? []"
          ></tn-select>
        </tn-form-field>

        <tn-form-field [label]="'To' | translate">
          <tn-select
            formControlName="end"
            [options]="(timeOptions$ | async) ?? []"
          ></tn-select>
        </tn-form-field>
      </div>
    }
  </tn-form-section>
</ix-form>
