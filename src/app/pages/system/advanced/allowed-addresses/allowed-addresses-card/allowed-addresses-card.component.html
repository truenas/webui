<tn-card
  padding="small"
  [ixUiSearch]="searchableElements.elements.allowedIpAddresses"
  [title]="'Allowed IP Addresses' | translate"
  [titleTooltip]="'IP addresses and networks that are allowed to use API and UI. If this list is empty, then all IP addresses are allowed to use API and UI.' | translate"
>

  @if (!(dataProvider.currentPageCount$ | async) && !(dataProvider.isLoading$ | async)) {
    <tn-empty
      [title]="(emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async).title) | translate"
    ></tn-empty>
  } @else {
    <tn-table
      class="table"
      [dataSource]="(dataProvider.currentPage$ | async) ?? []"
      [displayedColumns]="displayedColumns"
      [trackBy]="trackByAddress"
      [loading]="!!((dataProvider.isLoading$ | async) || isDeleting())"
    >
      <ng-container [tnColumnDef]="'address'">
        <ng-template tnHeaderCellDef>{{ 'Address' | translate }}</ng-template>
        <ng-template let-row tnCellDef>{{ row.address }}</ng-template>
      </ng-container>

      <ng-container [tnColumnDef]="'actions'" [width]="'80px'">
        <ng-template tnHeaderCellDef></ng-template>
        <ng-template let-row tnCellDef>
          <ix-table-actions-cell
            [actions]="actions"
            [row]="row"
            [uniqueRowTag]="uniqueRowTag(row)"
            [ariaLabel]="ariaLabel(row)"
          ></ix-table-actions-cell>
        </ng-template>
      </ng-container>
    </tn-table>
  }

  <ng-template tnCardFooterActions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['configure', 'ip-address']"
      [disabled]="!!((dataProvider.isLoading$ | async) || isDeleting())"
      [ixUiSearch]="searchableElements.elements.configure"
      [label]="'Configure' | translate"
      (onClick)="onConfigure()"
    ></tn-button>
  </ng-template>
</tn-card>

<tn-side-panel
  [title]="'Allowed IP Addresses' | translate"
  [closeGuard]="closeGuard"
  [(open)]="configOpen"
>
  @if (configOpen()) {
    <ix-allowed-addresses-form (closed)="onConfigClosed($event)"></ix-allowed-addresses-form>
  }
  @if (configForm(); as form) {
    <div tnSidePanelAction>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        [testId]="'save'"
        [label]="'Save' | translate"
        [disabled]="!form.canSubmit()"
        (onClick)="form.submit()"
      ></tn-button>
    </div>
  }
</tn-side-panel>
