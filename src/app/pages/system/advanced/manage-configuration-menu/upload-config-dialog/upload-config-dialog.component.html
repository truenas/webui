<tn-dialog-shell [title]="'Upload Config' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <div [innerHtml]="helptext.uploadConfigForm.message | translate"></div>

  <ix-file-input
    formControlName="config"
    [label]="'Select Configuration File' | translate"
  ></ix-file-input>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="warn"
    ixTest="upload"
    [label]="'Upload' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
