<tn-dialog-shell [title]="helptext.title | translate">
<form class="ix-form-container" (submit)="$event.preventDefault(); onSubmit()">
  <div [innerHtml]="helptext.message | translate"></div>

  <ix-checkbox
    [formControl]="exportSeedCheckbox"
    [label]="'Export Password Secret Seed' | translate"
  ></ix-checkbox>

  <div [innerHtml]="helptext.warning | translate"></div>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="helptext.cancelButton | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    ixTest="save"
    [label]="helptext.saveButton | translate"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
