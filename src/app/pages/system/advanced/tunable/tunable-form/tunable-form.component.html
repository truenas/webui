@if (slideInRef) {
  <ix-modal-header [requiredRoles]="requiredRoles" [title]="title" [loading]="isFormLoading()"></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field
      [label]="'Type' | translate"
      [required]="true"
    >
      <tn-select formControlName="type" [options]="(types$ | async) ?? []"></tn-select>
    </tn-form-field>

    <tn-form-field
      [label]="'Variable' | translate"
      [tooltip]="tooltips.var | translate"
      [required]="true"
    >
      <tn-input formControlName="var"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Value' | translate"
      [tooltip]="tooltips.value | translate"
      [required]="true"
    >
      <tn-input formControlName="value" [multiline]="true"></tn-input>
    </tn-form-field>

    <tn-form-field [label]="'Description' | translate">
      <tn-input formControlName="comment"></tn-input>
    </tn-form-field>

    <tn-form-field>
      <tn-checkbox formControlName="enabled" [label]="'Enabled' | translate"></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
