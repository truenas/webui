@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Access Settings' | translate"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    @if (isEnterprise()) {
      <tn-form-field>
        <tn-checkbox
          formControlName="ds_auth"
          [label]="'Allow Directory Service users to access WebUI' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }

    <tn-form-field
      [label]="'Login Banner' | translate"
      [tooltip]="'When set, the following text will be shown prior to showing login page to the user' | translate"
    >
      <tn-input formControlName="login_banner" [multiline]="true"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
