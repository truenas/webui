<tn-card
  [ixUiSearch]="searchableElements.elements.alertServiceList"
  [title]="'Alert Services' | translate"
>
  <ng-template tnCardHeaderActions>
    <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>

    <ix-table-columns-selector
      [columnPreferencesKey]="'alertServiceList'"
      [columns]="columns"
      (columnsChange)="columnsChange($event)"
    ></ix-table-columns-selector>

    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      [testId]="['alert-service', 'add']"
      [label]="'Add' | translate"
      [ixUiSearch]="searchableElements.elements.add"
      (onClick)="addAlertService()"
    ></tn-button>
  </ng-template>

  <ix-table
    class="table"
    [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
    [emptyConfig]="emptyService.defaultEmptyConfig(dataProvider.emptyType$ | async)"
  >
    <thead
      ix-table-head
      [columns]="columns"
      [dataProvider]="dataProvider"
    ></thead>
    <tbody
      ix-table-body
      [columns]="columns"
      [dataProvider]="dataProvider"
      [isLoading]="!!(dataProvider.isLoading$ | async)"
    ></tbody>
  </ix-table>

  <tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
</tn-card>
