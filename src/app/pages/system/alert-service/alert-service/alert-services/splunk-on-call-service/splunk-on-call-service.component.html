<ng-container [formGroup]="form">
  <tn-form-field
    [label]="'API Key' | translate"
    [tooltip]="helptext.splunkOnCall.apiKeyTooltip | translate"
    [required]="true"
  >
    <tn-input formControlName="api_key"></tn-input>
  </tn-form-field>

  <tn-form-field
    [label]="'Routing Key' | translate"
    [tooltip]="helptext.splunkOnCall.routingKeyTooltip | translate"
    [required]="true"
  >
    <tn-input formControlName="routing_key"></tn-input>
  </tn-form-field>
</ng-container>
