<ix-modal-header
  [requiredRoles]="requiredRoles"
  [title]="title"
  [loading]="isLoading()"
></ix-modal-header>

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-fieldset>
    <ix-input
      formControlName="name"
      [label]="helptext.name | translate"
      [placeholder]="helptext.name | translate"
      [required]="true"
    ></ix-input>

    <ix-file-input
      formControlName="file"
      [label]="helptext.keytab | translate"
      [tooltip]="helptext.keytabTooltip | translate"
      [multiple]="false"
      [required]="true"
      [acceptedFiles]="'binary'"
    ></ix-file-input>
  </ix-fieldset>

  <ix-form-actions>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      type="submit"
      [testId]="'save'"
      [label]="'Save' | translate"
      [disabled]="form.invalid || isLoading()"
    ></tn-button>
  </ix-form-actions>
</form>
