<form class="ix-form-container" [formGroup]="form">
  <tn-form-section [heading]="'Active Directory Configuration' | translate">
    <tn-form-field
      [label]="'TrueNAS Hostname' | translate"
      [tooltip]="helptext.hostnameTooltip | translate"
      [required]="true"
    >
      <tn-input
        name="hostname"
        testId="hostname"
        formControlName="hostname"
        [required]="true"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Domain Name' | translate"
      [tooltip]="helptext.domainNameTooltip | translate"
      [required]="true"
    >
      <tn-input
        name="domain"
        testId="domain"
        formControlName="domain"
        [required]="true"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Site Name' | translate"
      [tooltip]="helptext.siteTooltip | translate"
    >
      <tn-input
        name="site"
        testId="site"
        formControlName="site"
      ></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="'Computer Account OU' | translate"
      [tooltip]="helptext.computerAccountOuTooltip | translate"
    >
      <tn-input
        name="computer_account_ou"
        testId="computer_account_ou"
        formControlName="computer_account_ou"
      ></tn-input>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.defaultDomainsTooltip | translate">
      <tn-checkbox
        formControlName="use_default_domain"
        testId="use_default_domain"
        [label]="'Use Default Domain' | translate"
      ></tn-checkbox>
    </tn-form-field>
  </tn-form-section>

  <ix-trusted-domains-config
    [enableTrustedDomains]="form.controls.enable_trusted_domains.value"
    [trustedDomains]="form.controls.trusted_domains.value"
    (trustedDomainsChanged)="onTrustedDomainsChanged($event)"
    (isValid)="isTrustedDomainsValid.set($event)"
  ></ix-trusted-domains-config>

  <ix-idmap-config
    [idmap]="activeDirectoryConfig()?.idmap"
    (idmapUpdated)="primaryDomainIdmapUpdated($event)"
    (isValid)="isIdmapValid.set($event)"
  ></ix-idmap-config>
</form>
