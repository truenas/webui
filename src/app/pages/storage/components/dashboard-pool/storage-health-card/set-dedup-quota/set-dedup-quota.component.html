<tn-dialog-shell [title]="'Deduplication Quota for {pool}' | translate: { pool: pool.name }">
<form class="ix-form-container" [formGroup]="form" (submit)="submit()">
  <ix-select
    formControlName="quotaType"
    [label]="'Quota' | translate"
    [options]="quotaTypeOptions$"
    [required]="true"
  ></ix-select>

  @if (hasCustomQuota) {
    <ix-input
      formControlName="quotaValue"
      [label]="'Custom Quota' | translate"
      [format]="formatter.memorySizeFormatting"
      [parse]="formatter.memorySizeParsing"
      [required]="true"
    ></ix-input>
  }

</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    color="primary"
    ixTest="save"
    [label]="'Save' | translate"
    (onClick)="submit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
