<tn-dialog-shell testId="prune-dedup-table" [title]="'Prune Deduplication Table' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="submit()">
  <ix-radio-group
    formControlName="pruneBy"
    [label]="'Prune By' | translate"
    [options]="pruneByOptions$"
    [required]="true"
  ></ix-radio-group>

  @if (isPruningByPercentage) {
    <ix-label [label]="'Percentage' | translate" [required]="true"></ix-label>
    <tn-slider
      class="percentage-slider"
      testId="percentage"
      labelSuffix="%"
      labelType="handle"
      [min]="1"
      [max]="100"
      [step]="1"
    >
      <input
        tnSliderThumb
        tnTestIdType="input"
        formControlName="percentage"
        [tnTestId]="'slider-thumb'"
      >
    </tn-slider>
  } @else {
    <tn-form-field [label]="'Age (in days)' | translate">
      <tn-input
        testId="days"
        formControlName="days"
        [inputType]="InputType.Number"
        [required]="true"
      ></tn-input>
    </tn-form-field>
  }

</form>
<ix-form-actions tnDialogAction class="actions">
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    color="primary"
    testId="prune"
    [label]="'Prune' | translate"
    (onClick)="submit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
