<tn-dialog-shell [title]="'Prune Deduplication Table' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="submit()">
  <ix-radio-group
    formControlName="pruneBy"
    [label]="'Prune By' | translate"
    [options]="pruneByOptions$"
    [required]="true"
  ></ix-radio-group>

  @if (isPruningByPercentage) {
    <ix-label [label]="'Percentage' | translate" [required]="true"></ix-label>
    <mat-slider
      class="percentage-slider"
      ixTest="percentage"
      showTickMarks
      discrete
      [displayWith]="formatSliderAsPercentage"
      [min]="1"
      [max]="100"
      [step]="1"
    >
      <input
        matSliderThumb
        ixTest="slider-thumb"
        formControlName="percentage"
      >
    </mat-slider>
  } @else {
    <ix-input
      formControlName="days"
      type="number"
      [label]="'Age (in days)' | translate"
      [required]="true"
    ></ix-input>
  }

</form>
<ix-form-actions tnDialogAction class="actions">
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    color="primary"
    testId="prune"
    [label]="'Prune' | translate"
    (onClick)="submit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
