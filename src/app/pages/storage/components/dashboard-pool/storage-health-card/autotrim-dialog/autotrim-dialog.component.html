<tn-dialog-shell testId="autotrim" [title]="'Pool Options for {pool}' | translate: { pool: pool.name }">
<form class="ix-form-container" (submit)="onSubmit($event)">
  <tn-form-field [tooltip]="helptext.autotrimTooltip | translate">
    <tn-checkbox
      testId="autotrim"
      [formControl]="autotrimControl"
      [label]="'Auto TRIM' | translate"
    ></tn-checkbox>
  </tn-form-field>

</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="save"
    [label]="'Save' | translate"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
