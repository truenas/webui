<tn-dialog-shell testId="unlock-sed" [title]="'Unlock SED for {diskName}' | translate: { diskName: data.diskName }">
<div>
  <p>{{ 'Successfully unlocking the disk will automatically update the database.' | translate }}</p>

  <form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
    <ix-input
      formControlName="password"
      type="password"
      [label]="'Password' | translate"
      [required]="true"
    ></ix-input>
  </form>
</div>

<ix-form-actions tnDialogAction>
  <tn-button variant="outline" testId="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close()"></tn-button>

  <tn-button *ixRequiresRoles="[Role.DiskWrite]" color="primary" testId="unlock" [label]="'Unlock' | translate" [disabled]="form.invalid" (onClick)="onSubmit()"></tn-button>
</ix-form-actions>
</tn-dialog-shell>
