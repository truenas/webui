<tn-dialog-shell testId="replace-disk" [title]="'Replacing disk {name}' | translate: { name: data.diskName }">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-unused-disk-select
    formControlName="replacement"
    valueField="identifier"
    [label]="'Member Disk' | translate"
    [required]="true"
    [tooltip]="helptext.dialogFormFields.disk.tooltip | translate"
  ></ix-unused-disk-select>

  <tn-form-field>
    <tn-checkbox
      testId="preserve-settings"
      formControlName="preserve_settings"
      [label]="'Preserve Power Management settings' | translate"
    ></tn-checkbox>
  </tn-form-field>

  <tn-form-field>
    <tn-checkbox
      testId="preserve-description"
      formControlName="preserve_description"
      [label]="'Preserve disk description' | translate"
    ></tn-checkbox>
  </tn-form-field>

  <tn-form-field [tooltip]="helptext.dialogFormFields.force.tooltip | translate">
    <tn-checkbox
      testId="force"
      formControlName="force"
      [label]="'Force' | translate"
    ></tn-checkbox>
  </tn-form-field>

</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="[Role.PoolWrite]"
    color="primary"
    testId="replace"
    [label]="'Replace Disk' | translate"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
