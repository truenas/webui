
@let selectedNode = selectedNode$ | async;
<div class="container">
  <div class="table-container">
    <ix-fake-progress-bar
      class="loader-bar"
      [loading]="!!(isLoading$ | async)"
    ></ix-fake-progress-bar>

    <div class="item-search">
      <ix-basic-search
        [query]="searchQuery()"
        (queryChange)="onListFiltered($event)"
      ></ix-basic-search>
    </div>

    <div class="sticky-header">
      <div class="tree-header">
        <div>
          <span class="name-header">
            {{ 'VDEV Name' | translate }}
          </span>
        </div>
        <div class="disk-status-header">{{ 'Status' | translate }}</div>
        <div>{{ 'Capacity' | translate }}</div>
        <div>{{ 'ZFS Errors' | translate }}</div>
      </div>
    </div>

    <div class="tree-wrapper">
      <div class="tree-inner">
        <tn-tree
          class="disk-tree"
          [dataSource]="dataSource"
          [treeControl]="treeControl"
        >
          <tn-nested-tree-node
            *cdkTreeNodeDef="let topologyItem"
            routerLinkActive="selected"
            [class.selected]="topologyItem.guid === selectedNode?.guid"
            [routerLink]="['/storage', poolId(), 'vdevs', topologyItem.guid]"
            (click)="viewDetails(poolId(), topologyItem.guid)"
            (keydown.enter)="onRowEnter($event, topologyItem.guid)"
          >
            <ix-topology-item-node
              [topologyItem]="topologyItem | cast"
              [disk]="vDevsStore.getDisk(topologyItem)"
            ></ix-topology-item-node>
            <tn-icon
              name="chevron-right"
              library="mdi"
              class="mobile-actions"
            ></tn-icon>
          </tn-nested-tree-node>

          <tn-nested-tree-node
            *cdkTreeNodeDef="let group; when: isVdevGroup"
            hideToggle
            class="vdev-group-row"
            (click)="onRowGroupSelected(group, $event)"
          >
            <ix-vdev-group-node [vdevGroup]="group | cast">
              <tn-icon-button
                class="vdev-group-toggle"
                library="mdi"
                [name]="treeControl.isExpanded(group) ? 'chevron-down' : 'chevron-right'"
                [testId]="['toggle-vdev-group', group.guid]"
                [ariaLabel]="'Toggle {row}' | translate: { row: group.guid }"
                (click)="$event.preventDefault()"
              ></tn-icon-button>
            </ix-vdev-group-node>

            <ng-container slot="children" tnTreeNodeOutlet></ng-container>
          </tn-nested-tree-node>

          <tn-nested-tree-node
            *cdkTreeNodeDef="let vdev; when: hasNestedChild"
            routerLinkActive="selected"
            [toggleAriaLabel]="'Toggle {row}' | translate: { row: vdev.guid }"
            [toggleTestId]="['toggle', vdev.guid]"
            [class.selected]="vdev.guid === selectedNode?.guid"
            [routerLink]="['/storage', poolId(), 'vdevs', vdev.guid]"
            (click)="viewDetails(poolId(), vdev.guid)"
            (keydown.enter)="onRowEnter($event, vdev.guid)"
          >
            <ix-topology-item-node
              [topologyItem]="vdev | cast"
              [disk]="vDevsStore.getDisk(vdev.children[0])"
            ></ix-topology-item-node>

            <tn-icon
              name="chevron-right"
              library="mdi"
              class="mobile-actions"
            ></tn-icon>

            <ng-container slot="children" tnTreeNodeOutlet></ng-container>
          </tn-nested-tree-node>
        </tn-tree>
      </div>
    </div>
  </div>

</div>
