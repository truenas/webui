<ng-container [formGroup]="form">
  <ix-radio-group
    formControlName="dispersalStrategy"
    [options]="dispersalOptions$"
  ></ix-radio-group>

  @if (isLimitingToSingle) {
    <div class="limiting">
      <ix-select
        formControlName="limitToEnclosure"
        [required]="true"
        [options]="enclosureOptions$"
        [label]="'Enclosure' | translate"
      ></ix-select>

      <div class="description">
        {{ helptext.enclosureOptionsDescription | translate }}
      </div>
    </div>
  }
</ng-container>

@if (stepWarning()) {
  <p class="error-warning">
    {{ stepWarning() }}
  </p>
}

<ix-form-actions>
  <tn-button
    tnStepperPrevious
    color="secondary"
    type="button"
    [testId]="'back-enclosure'"
    [label]="'Back' | translate"
    [disabled]="form.invalid"
  ></tn-button>
  <div class="step-buttons">
    <tn-button
      tnStepperNext
      color="primary"
      type="button"
      [testId]="'next-enclosure'"
      [label]="'Next' | translate"
      [disabled]="form.invalid"
    ></tn-button>
  </div>
</ix-form-actions>
