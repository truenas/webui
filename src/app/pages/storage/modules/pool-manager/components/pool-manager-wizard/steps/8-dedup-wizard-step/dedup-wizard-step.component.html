<ix-layout-step
  [description]="helptext.dedupVdevDescription | translate"
  [type]="vDevType.Dedup"
  [inventory]="(inventory$ | async) || []"
  [canChangeLayout]="true"
  [limitLayouts]="allowedLayouts"
  [minMirrorWidth]="minMirrorWidth"
  [isStepActive]="isStepActive()"
></ix-layout-step>

@if (stepWarning()) {
  <p class="error-warning">
    {{ stepWarning() }}
  </p>
}

<ix-form-actions>
  <tn-button
    tnStepperPrevious
    color="secondary"
    type="button"
    [testId]="'back-dedup'"
    [label]="'Back' | translate"
  ></tn-button>
  <tn-button
    tnStepperNext
    color="primary"
    type="button"
    [testId]="'next-dedup'"
    [label]="'Next' | translate"
  ></tn-button>

  <tn-button
    color="warn"
    type="button"
    [testId]="'reset-fields-in-dedup-step'"
    [label]="'Reset Step' | translate"
    (onClick)="resetStep()"
  ></tn-button>

  <tn-button
    color="secondary"
    type="button"
    [testId]="'save-and-go-to-review-dedup'"
    [label]="'Save And Go To Review' | translate"
    (onClick)="goToReviewStep()"
  ></tn-button>
</ix-form-actions>
