<tn-dialog-shell [title]="''">
<h1>{{ helptext.dialogTitle | translate }}!</h1>
<div>
  {{ helptext.dialogMessage | translate }}
</div>

<ix-form-actions>
  <button
    mat-button
    color="warn"
    ixTest="download-key"
    (click)="downloadKey()"
  >
    {{ 'Download Encryption Key' | translate }}
  </button>
  <button
    mat-button
    color="primary"
    ixTest="done"
    [disabled]="!wasDownloaded()"
   
  >
    {{ 'Done' | translate }}
  </button>
</ix-form-actions>
</tn-dialog-shell>
