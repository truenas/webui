<tn-dialog-shell [title]="'Clone' | translate">
<div>
  <ix-input
    [label]="'Enter a Name (optional)' | translate"
    [formControl]="nameControl"
  ></ix-input>
</div>
<div tnDialogAction>
  <ix-form-actions>
    <button
      mat-button
      ixTest="cancel"
     
    >
      {{ 'Cancel' | translate }}
    </button>
    <button
      *ixRequiresRoles="requiredRoles"
      mat-button
      color="primary"
      ixTest="clone"
      (click)="onClone()"
    >
      {{ 'Clone' | translate }}
    </button>
  </ix-form-actions>
</div>
</tn-dialog-shell>
