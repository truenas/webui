<tn-dialog-shell testId="stop-vm" [title]="'Stop {vmName}?' | translate: { vmName: vm.name }">
<div>
  <tn-form-field [tooltip]="helptext.stop_dialog.forceTooltip | translate">
    <tn-checkbox
      testId="force-after-timeout"
      [formControl]="forceAfterTimeoutCheckbox"
      [label]="'Force Stop After Timeout' | translate"
    ></tn-checkbox>
  </tn-form-field>
</div>

<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="stop-vm"
    [label]="'Stop' | translate"
    (onClick)="onStop()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
