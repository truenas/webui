<tn-dialog-shell testId="upload-iso" [title]="'Upload Image File' | translate">
<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-explorer
    formControlName="path"
    [required]="true"
    [label]="'ISO save location' | translate"
    [nodeProvider]="directoryNodeProvider"
    [tooltip]="helptext.upload_iso_path_tooltip | translate"
  >
    <ix-explorer-create-dataset></ix-explorer-create-dataset>
  </ix-explorer>

  <tn-form-field
    [label]="'Installer image file' | translate"
    [tooltip]="helptext.upload_iso_tooltip | translate"
  >
    <tn-file-input
      formControlName="files"
      accept=".img,.iso"
      testId="files"
      [showFileName]="true"
      [buttonLabel]="'Choose File' | translate"
      [noFileText]="'No file chosen' | translate"
      [ariaLabel]="'Installer image file' | translate"
    ></tn-file-input>
  </tn-form-field>

  </form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    testId="save"
    [label]="'Upload' | translate"
    [disabled]="form.invalid"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
