<tn-dialog-shell [title]="title | translate">
<div class="attributes">
  @for (attribute of attributes; track attribute) {
    <div>
      {{ attribute[0] }}: {{ attribute[1] }}
    </div>
  }
</div>
<div tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="dialog-close"
    [label]="'Close' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>
</div>
</tn-dialog-shell>
