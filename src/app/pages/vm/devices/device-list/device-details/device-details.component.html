<tn-dialog-shell [title]="title | translate">
<div class="attributes">
  @for (attribute of attributes; track attribute) {
    <div>
      {{ attribute[0] }}: {{ attribute[1] }}
    </div>
  }
</div>
<div tnDialogAction>
  &nbsp;
  <button
    mat-button
    ixTest="dialog-close"
   
  >
    {{ 'Close' | translate }}
  </button>
</div>
</tn-dialog-shell>
