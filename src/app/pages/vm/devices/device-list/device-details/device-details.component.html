<tn-dialog-shell [title]="''">
<h1>
  <tn-icon class="information-icon" name="information" library="mdi"></tn-icon>
  <span class="information-title">
    {{ title | translate }}
  </span>
</h1>
<div class="attributes">
  @for (attribute of attributes; track attribute) {
    <div>
      {{ attribute[0] }}: {{ attribute[1] }}
    </div>
  }
</div>
<div tnDialogAction>
  &nbsp;
  <button
    mat-button
    ixTest="dialog-close"
   
  >
    {{ 'Close' | translate }}
  </button>
</div>
</tn-dialog-shell>
