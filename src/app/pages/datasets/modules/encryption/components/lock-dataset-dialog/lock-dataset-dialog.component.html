<tn-dialog-shell [title]="'Lock Dataset' | translate">
<form class="ix-form-container" (submit)="onSubmit($event)">
  <p>
    {{ 'Lock Dataset {datasetName}?' | translate: { datasetName: dataset.name } }}
  </p>

  <ix-checkbox
    [formControl]="forceCheckbox"
    [label]="'Force unmount' | translate"
  ></ix-checkbox>
</form>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    ixTest="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    ixTest="lock"
    [label]="'Lock' | translate"
    (onClick)="onSubmit()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
