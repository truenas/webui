<tn-dialog-shell [title]="'Key for {id}' | translate: { id: '\''+dataset.id+'\'' }">
<p class="key">{{ key }}</p>
  <p>
    {{ 'WARNING: Only the key for the dataset in question will be downloaded.' | translate }}
  </p>


<ix-form-actions matDialogActions>
  <button mat-button type="button" ixTest="close">
    {{ 'Close' | translate }}
  </button>

  <button
    mat-button
    type="submit"
    color="primary"
    ixTest="download-key"
    (click)="onDownload()"
  >
    {{ 'Download Key' | translate }}
  </button>
</ix-form-actions>
</tn-dialog-shell>
