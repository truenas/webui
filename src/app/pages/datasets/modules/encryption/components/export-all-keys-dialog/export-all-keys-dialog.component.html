<tn-dialog-shell [title]="'Keys for {id} datasets' | translate: { id: '\'' + dataset.id + '\'' }">
<p>
    {{ 'WARNING: Keys for all nested datasets with encryption applied will be downloaded.' | translate }}
  </p>


<ix-form-actions matDialogActions>
  <button mat-button type="button" ixTest="close">
    {{ 'Close' | translate }}
  </button>

  <button
    mat-button
    type="submit"
    color="primary"
    ixTest="download-keys"
    (click)="onDownload()"
  >
    {{ 'Download Keys' | translate }}
  </button>
</ix-form-actions>
</tn-dialog-shell>
