<tn-dialog-shell [title]="helptext.stripAclDialog.title | translate">
<div class="modal-body">
  <p>{{ helptext.stripAclDialog.message | translate }}</p>

  <ix-checkbox
    class="traverse-checkbox"
    [formControl]="traverseCheckbox"
    [label]="helptext.stripAclDialog.traverseCheckbox | translate"
  ></ix-checkbox>
</div>
<ix-form-actions tnDialogAction class="form-actions">
  <button mat-button ixTest="cancel">{{ 'Cancel' | translate }}</button>
  <button
    mat-button
    color="warn"
    ixTest="strip-acl"
    (click)="onStrip()"
  >
    {{ 'Strip ACLs' | translate }}
  </button>
</ix-form-actions>
</tn-dialog-shell>
