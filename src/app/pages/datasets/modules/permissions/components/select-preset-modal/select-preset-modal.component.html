<tn-dialog-shell testId="select-preset" [title]="helptext.selectPreset | translate">
<div>
  <p>{{ helptext.selectPresetTooltip | translate }}</p>

  @if (!data.allowCustom) {
    <p [innerHTML]="helptext.message | translate"></p>
  }

  <form [formGroup]="form">
    @if (data.allowCustom) {
      <ix-radio-group
        formControlName="usePreset"
        [options]="usePresetOptions$"
      ></ix-radio-group>
    }
    <!-- TODO: Add [required]="true" once FormsModule is removed -->
    @if (form.value.usePreset) {
      <tn-form-field [label]="'Preset' | translate">
        <tn-select
          testId="preset-name"
          formControlName="presetName"
          [options]="(presetOptions$ | async) ?? []"
        ></tn-select>
      </tn-form-field>
    }
  </form>
</div>
<ix-form-actions tnDialogAction>
  <tn-button
    variant="outline"
    testId="cancel"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close()"
  ></tn-button>
  <tn-button
    color="primary"
    testId="continue"
    [label]="'Continue' | translate"
    [disabled]="form.invalid"
    (onClick)="onContinuePressed()"
  ></tn-button>
</ix-form-actions>
</tn-dialog-shell>
