<ix-form
  [formGroup]="form"
  [addTitle]="'Add Snapshot' | translate"
  [requiredRoles]="requiredRoles"
  [externalLoading]="isFormLoading()"
  [submitHandler]="handleSubmit"
  (closed)="closed.emit($event)"
>
  <tn-form-section>
    <tn-form-field
      [label]="helptext.datasetLabel | translate"
      [required]="true"
    >
      <tn-select
        formControlName="dataset"
        [options]="(datasetOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.nameLabel | translate"
      [tooltip]="helptext.nameTooltip | translate"
    >
      <tn-input formControlName="name"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.namingSchemaLabel | translate"
      [tooltip]="helptext.namingSchemaTooltip | translate"
    >
      <tn-select
        formControlName="naming_schema"
        [options]="(namingSchemaOptions$ | async) ?? []"
        [allowEmpty]="true"
      ></tn-select>
    </tn-form-field>

    <tn-form-field
      [tooltip]="helptext.recursiveTooltip | translate"
    >
      <tn-checkbox
        formControlName="recursive"
        [label]="helptext.recursiveLabel | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (hasVmsInDataset) {
      <tn-form-field>
        <tn-checkbox
          formControlName="vmware_sync"
          [label]="'VMWare Sync' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }
  </tn-form-section>
</ix-form>
