@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="'Add Snapshot' | translate"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [label]="helptext.datasetLabel | translate" [required]="true">
      <tn-select
        formControlName="dataset"
        [options]="(datasetOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.nameLabel | translate"
      [tooltip]="helptext.nameTooltip | translate"
    >
      <tn-input formControlName="name"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="helptext.namingSchemaLabel | translate"
      [tooltip]="helptext.namingSchemaTooltip | translate"
    >
      <tn-select
        formControlName="naming_schema"
        [options]="(namingSchemaOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    <tn-form-field [tooltip]="helptext.recursiveTooltip | translate">
      <tn-checkbox
        formControlName="recursive"
        [label]="helptext.recursiveLabel | translate"
      ></tn-checkbox>
    </tn-form-field>

    @if (hasVmsInDataset) {
      <tn-form-field>
        <tn-checkbox
          formControlName="vmware_sync"
          [label]="'VMWare Sync' | translate"
        ></tn-checkbox>
      </tn-form-field>
    }
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
