<tn-dialog-shell [title]="'Clone to New Dataset' | translate">
@if (!wasDatasetCloned) {
  <form
    class="ix-form-container"
    [formGroup]="form"
    (submit)="onSubmit()"
  >
    <ix-input
      formControlName="dataset_dst"
      [label]="'Dataset' | translate"
      [required]="true"
      [tooltip]="tooltips.dataset_dst | translate"
    ></ix-input>
  </form>
} @else {
  <p>{{ 'Dataset {name} was created.' | translate: { name: datasetName } }}</p>
}
<ix-form-actions tnDialogAction>
  @if (!wasDatasetCloned) {
    <tn-button
      variant="outline"
      ixTest="cancel"
      [label]="'Cancel' | translate"
      (onClick)="dialogRef.close()"
    ></tn-button>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      ixTest="clone"
      [label]="'Clone' | translate"
      [disabled]="form.invalid"
      (onClick)="onSubmit()"
    ></tn-button>
  } @else {
    <tn-button
      variant="outline"
      ixTest="close"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close()"
    ></tn-button>
    <tn-button
      color="primary"
      ixTest="go-to-datasets"
      [label]="'Go to Datasets' | translate"
      [routerLink]="['/datasets']"
      (onClick)="dialogRef.close()"
    ></tn-button>
  }
</ix-form-actions>
</tn-dialog-shell>
