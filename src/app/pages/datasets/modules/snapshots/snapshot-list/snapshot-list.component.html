<ix-page-header [pageTitle]="pageTitle">
  @if (loadingExtraColumns$ | async) {
    <tn-spinner
      mode="indeterminate"
      [diameter]="30"
    ></tn-spinner>
  } @else {
    <ix-slide-toggle
      [formControl]="showExtraColumnsControl"
      [label]="'Show extra columns' | translate"
    ></ix-slide-toggle>
  }

  <ix-basic-search
    [query]="searchQuery()"
    (queryChange)="onListFiltered($event)"
  ></ix-basic-search>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    [testId]="'add-snapshot'"
    [label]="'Add' | translate"
    [ixUiSearch]="searchableElements.elements.add"
    (onClick)="doAdd()"
  ></tn-button>
</ix-page-header>

@if (selectedSnapshots.length) {
  <div class="batch-actions-toolbar">
    <div class="title">
      <strong>{{ 'Batch Operations' | translate }}</strong>
    </div>

    <div class="actions">
      <tn-button
        *ixRequiresRoles="requiredRoles"
        icon="mdi-delete"
        tnTooltipPosition="below"
        [testId]="'delete-selected'"
        [label]="'Delete' | translate"
        [tnTooltip]="'Delete selections' | translate"
        [disabled]="!selectionHasItems"
        (onClick)="doBatchDelete(selectedSnapshots)"
      ></tn-button>
    </div>
  </div>
}

<ix-table
  class="table"
  [ixUiSearch]="searchableElements.elements.list"
  [ix-table-empty]="!(dataProvider.currentPageCount$ | async)"
  [emptyConfig]="emptyService.defaultEmptyConfig(emptyType$ | async)"
>
  <thead
    ix-table-head
    [columns]="columns"
    [dataProvider]="dataProvider"
  ></thead>
  <tbody
    ix-table-body
    detailsRowIdentifier="name"
    [columns]="columns"
    [dataProvider]="dataProvider"
    [isLoading]="!!(isLoading$ | async)"
  >
    <ng-template let-snapshot ix-table-details-row [dataProvider]="dataProvider">
      <ix-snapshot-details-row [snapshot]="snapshot"></ix-snapshot-details-row>
    </ng-template>
  </tbody>
</ix-table>
<tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
