<tn-dialog-shell [title]="'Dataset Rollback From Snapshot' | translate">
@if (isLoading()) {
  <div class="loading">
    <mat-spinner [diameter]="40"></mat-spinner>
  </div>
} @else if (snapshot) {
  @if (!wasDatasetRolledBack()) {
    <form
      class="ix-form-container"
      [formGroup]="form"
      (submit)="onSubmit()"
    >
      <div>
        @if (creationMachineTime() !== undefined) {
          <!--
            Translators: {datetime} is a pre-formatted machine-time string (the
            snapshot's creation time, already converted to the configured
            machine timezone and formatted per the user's preferences). Do not
            re-format it; just interpolate it where you want the timestamp.
          -->
          <p
            [innerHTML]="
              'Use snapshot <i>{snapshot}</i> to roll <b>{dataset}</b> back to {datetime}?' | translate
                : {
                    snapshot: snapshot.snapshot_name,
                    dataset: snapshot.dataset,
                    datetime: creationMachineTime() | formatDateTime
                  }
              "
          ></p>
        } @else {
          <p
            [innerHTML]="
              'Use snapshot <i>{snapshot}</i> to roll <b>{dataset}</b> back?' | translate
                : {
                    snapshot: snapshot.snapshot_name,
                    dataset: snapshot.dataset
                  }
              "
          ></p>
        }

        <ix-fieldset>
          <ix-radio-group
            id="recursive"
            class="mt-field"
            [formControlName]="recursive.fcName"
            [label]="recursive.label | translate"
            [tooltip]="recursive.tooltip | translate"
            [options]="recursive.options"
          ></ix-radio-group>
        </ix-fieldset>

        <tn-banner
          type="warning"
          [heading]="'Rolling back destroys data' | translate"
          [message]="'Rolling the dataset back destroys data on the dataset and can destroy additional snapshots that are related to the dataset. This can result in permanent data loss. Do not roll back until all desired data and snapshots are backed up.' | translate"
        ></tn-banner>
      </div>

      <ix-checkbox
        [formControlName]="force.fcName"
        [label]="force.label"
        [required]="force.required"
      ></ix-checkbox>
    </form>

    <div tnDialogAction class="form-actions">
      <div class="form-buttons">
        <tn-button *ixRequiresRoles="requiredRoles" color="primary" ixTest="rollback" [label]="'Rollback' | translate" [disabled]="form.invalid" (onClick)="onSubmit()"></tn-button>
        <tn-button variant="outline" ixTest="cancel" [label]="'Cancel' | translate" (onClick)="dialogRef.close()"></tn-button>
      </div>
    </div>
  } @else {
    <p>
      {{ 'Dataset rolled back to snapshot {name}.' | translate: { name: snapshot.snapshot_name } }}
    </p>

    <ix-form-actions tnDialogAction class="form-actions">
      <div class="form-buttons">
        <a
          mat-button
          type="submit"
          color="primary"
          ixTest="go-to-storage"
          [routerLink]="['/storage']"
          (click)="dialogRef.close()"
        >
          {{ 'Go to Storage' | translate }}
        </a>

        <tn-button variant="outline" ixTest="close" [label]="'Close' | translate" (onClick)="dialogRef.close()"></tn-button>
      </div>
    </ix-form-actions>
  }
}
</tn-dialog-shell>
