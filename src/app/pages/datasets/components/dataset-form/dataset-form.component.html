@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="isNew ? ('Add Dataset' | translate) : ('Edit Dataset' | translate)"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <ix-name-and-options
    [existing]="existingDataset()"
    [parent]="parentDataset()"
    (formValidityChange)="isNameAndOptionsValid.set($event)"
  ></ix-name-and-options>
  @if (isAdvancedMode() && isNew) {
    <ix-quotas-section
      (formValidityChange)="isQuotaValid.set($event)"
    ></ix-quotas-section>
  }
  @if (isNew) {
    <ix-encryption-section
      [parent]="parentDataset()"
      [advancedMode]="isAdvancedMode()"
      (formValidityChange)="isEncryptionValid.set($event)"
    ></ix-encryption-section>
  }
  <ix-other-options-section
    [existing]="existingDataset()"
    [parent]="parentDataset()"
    [datasetPreset]="datasetPreset()"
    [advancedMode]="isAdvancedMode()"
    (advancedModeChange)="onSwitchToAdvanced()"
    (formValidityChange)="isOtherOptionsValid.set($event)"
  ></ix-other-options-section>

  @if (slideInRef) {
    <ix-form-actions>
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isLoading() || !areSubFormsValid()"
        [label]="'Save' | translate"
      ></tn-button>
      <tn-button
        type="button"
        [testId]="'toggle-advanced'"
        [label]="isAdvancedMode() ? ('Basic Options' | translate) : ('Advanced Options' | translate)"
        (onClick)="toggleAdvancedMode()"
      ></tn-button>
    </ix-form-actions>
  }
</form>
