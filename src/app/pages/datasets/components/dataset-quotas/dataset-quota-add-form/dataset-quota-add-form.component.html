@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section [heading]="'Set Quotas' | translate">
    <tn-form-field
      [label]="dataQuotaLabel | translate"
      [tooltip]="dataQuotaTooltip | translate"
    >
      <tn-input formControlName="data_quota" [inputType]="InputType.Size"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="objectQuotaLabel | translate"
      [tooltip]="objectQuotaTooltip | translate"
    >
      <tn-input formControlName="obj_quota" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>
  </tn-form-section>

  @if (quotaType === DatasetQuotaType.User) {
    <tn-form-section [heading]="'Apply Quotas to Selected Users' | translate">
      <ix-user-chips
        formControlName="users"
        [label]="'Apply To Users' | translate"
        [tooltip]="tooltips.users | translate"
      ></ix-user-chips>
    </tn-form-section>
  }

  @if (quotaType === DatasetQuotaType.Group) {
    <tn-form-section [heading]="'Apply Quotas to Selected Groups' | translate">
      <ix-group-chips
        formControlName="groups"
        [label]="'Apply To Groups' | translate"
        [tooltip]="tooltips.groups | translate"
        [required]="true"
      ></ix-group-chips>
    </tn-form-section>
  }

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
