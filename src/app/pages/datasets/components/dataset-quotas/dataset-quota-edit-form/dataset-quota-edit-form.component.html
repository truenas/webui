@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles"
    [title]="title"
    [loading]="isFormLoading()"
  ></ix-modal-header>
}

<form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
  <tn-form-section>
    <tn-form-field [label]="nameLabel | translate">
      <tn-input formControlName="name" [readonly]="true"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="dataQuotaLabel | translate"
      [tooltip]="dataQuotaTooltip | translate"
    >
      <tn-input formControlName="data_quota" [inputType]="InputType.Size"></tn-input>
    </tn-form-field>

    <tn-form-field
      [label]="objectQuotaLabel | translate"
      [tooltip]="objectQuotaTooltip | translate"
    >
      <tn-input formControlName="obj_quota" [inputType]="InputType.Number"></tn-input>
    </tn-form-field>
  </tn-form-section>

  <ix-form-actions>
    @if (slideInRef) {
      <tn-button
        *ixRequiresRoles="requiredRoles"
        type="submit"
        color="primary"
        [testId]="'save'"
        [disabled]="form.invalid || isFormLoading()"
        [label]="'Save' | translate"
      ></tn-button>
    }
  </ix-form-actions>
</form>
