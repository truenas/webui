<ix-page-header>
  <ix-basic-search [query]="searchQuery()" (queryChange)="onListFiltered($event)"></ix-basic-search>
  <tn-slide-toggle
    color="primary"
    [testId]="'show-all-' + helpTextKey"
    [label]="helpText[helpTextKey].title | translate"
    [ariaLabel]="helpText[helpTextKey].title | translate"
    [checked]="showAllQuotas"
    [disabled]="isLoading"
    (change)="toggleDisplay()"
  ></tn-slide-toggle>
  <ng-container *ixRequiresRoles="requiredRoles">
    @if (invalidQuotas.length > 0) {
      <tn-button
        color="primary"
        [testId]="'remove-invalid-quotas'"
        [label]="'Remove Invalid Quotas' | translate"
        [disabled]="isLoading"
        (onClick)="removeInvalidQuotas()"
      ></tn-button>
    }
  </ng-container>
  <tn-button
    *ixRequiresRoles="requiredRoles"
    color="primary"
    class="add-button"
    [testId]="'add-quota'"
    [label]="'Add' | translate"
    [disabled]="isLoading"
    (onClick)="doAdd()"
  ></tn-button>
</ix-page-header>

<div class="table-container">
  <ix-table
    [ix-table-empty]="!isLoading && !(dataProvider.currentPageCount$ | async)"
    [emptyConfig]="emptyConfigService.defaultEmptyConfig(emptyType)"
  >
    <thead
      ix-table-head
      [columns]="columns"
      [dataProvider]="dataProvider"
    ></thead>
    <tbody
      ix-table-body
      [columns]="columns"
      [dataProvider]="dataProvider"
      [isLoading]="isLoading"
    ></tbody>
  </ix-table>
  <tn-table-pager [dataProvider]="dataProvider"></tn-table-pager>
</div>
