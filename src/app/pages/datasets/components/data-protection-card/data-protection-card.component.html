<tn-card
  padding="small"
  [title]="'Data Protection' | translate"
  [primaryAction]="addSnapshotAction()"
>
  <div class="details-item">
      <div class="label">{{ 'Snapshots' | translate }}:</div>
      <div class="total-snapshots value">{{ dataset().snapshot_count }}</div>
      <a
        class="action"
        tnTestIdType="link"
        [tnTestId]="'manage-snapshots'"
        [routerLink]="['/datasets/snapshots', dataset().id]"
        [ixUiSearch]="searchableElements.elements.manageSnapshots"
      >
        {{ 'View Snapshots' | translate }}
      </a>
    </div>
    <div class="details-item">
      <div class="label">{{ 'Snapshot Tasks' | translate }}:</div>
      <div class="snapshot-tasks value">{{ dataset().snapshot_tasks_count }}</div>
      <a
        class="action"
        tnTestIdType="link"
        [tnTestId]="'manage-snapshot-tasks'"
        [routerLink]="['/data-protection/snapshot', dataset().id]"
        [ixUiSearch]="searchableElements.elements.manageSnapshotTasks"
      >
        {{ 'View Snapshot Tasks' | translate }}
      </a>
    </div>
    <div class="details-item">
      <div class="label backup-tasks">{{ backupTasksLabel() }}</div>
      <a
        class="action"
        tnTestIdType="link"
        [tnTestId]="'manage-backups'"
        [routerLink]="['/data-protection']"
      >
        {{ 'Go to Backups' | translate }}
      </a>
    </div>
</tn-card>
