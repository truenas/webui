<form [formGroup]="form">
  <div class="columns">
    <div class="column">
      <ix-input
        formControlName="name"
        [label]="'Name' | translate"
        [tooltip]="tooltips.name | translate"
        [required]="true"
      ></ix-input>
    </div>
    <div class="column">
      <ix-input
        formControlName="phone"
        [label]="'Phone' | translate"
        [tooltip]="tooltips.phone | translate"
        [required]="true"
      ></ix-input>
    </div>
  </div>

  <div class="columns">
    <div class="column">
      <ix-input
        formControlName="email"
        [label]="'Email' | translate"
        [tooltip]="tooltips.email | translate"
        [required]="true"
      ></ix-input>
    </div>

    <div class="column">
      <ix-chips
        formControlName="cc"
        [label]="'CC' | translate"
        [tooltip]="tooltips.cc | translate"
      ></ix-chips>
    </div>
  </div>

  <div class="columns">
    <div class="column">
      <ix-select
        formControlName="category"
        [label]="'Type' | translate"
        [options]="categoryOptions$"
        [tooltip]="tooltips.category | translate"
        [required]="true"
      ></ix-select>
    </div>
    <div class="column"></div>
  </div>

  <div class="columns">
    <div class="column">
      <ix-select
        formControlName="environment"
        [label]="'Environment' | translate"
        [options]="environmentOptions$"
        [required]="true"
      ></ix-select>
    </div>

    <div class="column">
      <ix-select
        formControlName="criticality"
        [label]="'Criticality' | translate"
        [options]="criticalityOptions$"
        [required]="true"
      ></ix-select>
    </div>
  </div>

  <ix-input
    formControlName="title"
    [label]="'Subject' | translate"
    [placeholder]="tooltips.title | translate"
    [required]="true"
  ></ix-input>

  <ix-textarea
    formControlName="message"
    [label]="'Message' | translate"
    [rows]="8"
    [placeholder]="messagePlaceholder | translate"
    [required]="true"
  ></ix-textarea>

  <tn-form-field
    [tooltip]="tooltips.attach_debug | translate"
    [hint]="'Debugs may contain log files with personal information such as usernames or other identifying information about your system.' | translate"
  >
    <tn-checkbox
      formControlName="attach_debug"
      [label]="'Attach debug' | translate"
    ></tn-checkbox>
  </tn-form-field>

  <tn-form-field [tooltip]="'Capture and attach screenshot to the review' | translate">
    <tn-checkbox
      formControlName="take_screenshot"
      [label]="'Take screenshot of the current page' | translate"
    ></tn-checkbox>
  </tn-form-field>

  <tn-form-field>
    <tn-checkbox
      formControlName="attach_images"
      [label]="'Attach additional images' | translate"
    ></tn-checkbox>
  </tn-form-field>

  @if (form.controls.attach_images.value) {
    <ix-file-input
      formControlName="images"
      class="attach-images"
      [label]="'Attach images (optional)' | translate"
      [tooltip]="'Select images you want attach to review' | translate"
      [multiple]="true"
      [acceptedFiles]="acceptedFiles"
    ></ix-file-input>
  }
</form>

<ng-template #dialogActions>
  <tn-button
    testId="user-guide"
    [label]="'User Guide' | translate"
    (onClick)="onUserGuidePressed()"
  ></tn-button>

  <tn-button
    testId="eula"
    [label]="'EULA' | translate"
    (onClick)="onEulaPressed()"
  ></tn-button>

  <tn-button
    color="primary"
    testId="submit"
    [label]="'Submit' | translate"
    [disabled]="form.invalid || isLoading()"
    (onClick)="onSubmit()"
  ></tn-button>
</ng-template>
