<tn-dialog-shell [title]="'Send Feedback' | translate">
  <ix-fake-progress-bar [loading]="isLoading"></ix-fake-progress-bar>

  @if (isLoadingTypes) {
    <div class="placeholder">
      <ngx-skeleton-loader [count]="3"></ngx-skeleton-loader>
    </div>
  } @else {
    @if (allowedTypes.length > 1) {
      <ix-button-group
        [formControl]="typeControl"
        [label]="'I would like to' | translate"
        [options]="feedbackTypeOptions$"
        [inlineFields]="true"
        [attr.aria-label]="'Feedback Type' | translate"
      ></ix-button-group>
    }
    @if (isReview) {
      <ix-file-review
        [dialogRef]="dialogRef"
        [isLoading]="isLoading"
        (isLoadingChange)="onIsLoadingChange($event)"
      ></ix-file-review>
    } @else {
      @if (isEnterprise()) {
        <ix-file-ticket-licensed
          [dialogRef]="dialogRef"
          [isLoading]="isLoading"
          (isLoadingChange)="onIsLoadingChange($event)"
        ></ix-file-ticket-licensed>
      } @else {
        <ix-file-ticket
          [type]="typeControl.value | cast"
          [dialogRef]="dialogRef"
          [isLoading]="isLoading"
          (isLoadingChange)="onIsLoadingChange($event)"
        ></ix-file-ticket>
      }
    }
  }

  <div tnDialogAction class="feedback-actions">
    @if (actionsTemplate(); as actions) {
      <ng-container [ngTemplateOutlet]="actions"></ng-container>
    }
  </div>
</tn-dialog-shell>
