<div class="search-box" [class.hidden]="overlayRef?.hasAttached()">
  <tn-icon name="magnify" library="mdi" class="search-icon" (click)="showOverlay()"></tn-icon>

  <!-- Deliberately not tnInput: this is a bespoke compact topbar input; the
       library's stock input chrome (min-height, focus border) doesn't fit. -->
  <input
    #searchInput
    tnTestId="global-search"
    tnTestIdType="input"
    class="search-input"
    [placeholder]="'Search UI' | translate"
    (click)="showOverlay()"
    (focus)="overlayRef?.detach(); searchInput.blur(); showOverlay()"
    (blur)="overlayRef?.detach()"
  />

  <ix-keyboard-shortcut
    class="shortcut"
    key="/"
    (keyPress)="showOverlay()"
  ></ix-keyboard-shortcut>
</div>
