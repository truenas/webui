@if (label() || tooltip()) {
  <ix-label
    [label]="label()"
    [tooltip]="tooltip()"
    [required]="required()"
  ></ix-label>
}

<div
  class="container-items"
  cdkDropList
  [style.minHeight]="minHeight()"
  [style.maxHeight]="maxHeight()"
  (cdkDropListDropped)="drop($event)"
  >
  <tn-list [attr.aria-label]="label()">
    @for (item of items; track item) {
      <tn-list-item cdkDrag>
        <div class="toggle-label">
          <tn-icon name="drag-vertical" library="mdi"></tn-icon>
          {{ item.label | translate }}
        </div>
        <tn-slide-toggle
          tnListItemTrailing
          color="primary"
          [checked]="isChecked(item.value)"
          [disabled]="isDisabled"
          [testId]="[controlDirective.name, item.label]"
          [ariaLabel]="item.label"
          (change)="onCheckboxChanged(item.value)"
          (focusout)="onTouch()"
        ></tn-slide-toggle>
      </tn-list-item>
    }
  </tn-list>
</div>

<ix-errors [control]="controlDirective.control" [label]="label()"></ix-errors>
