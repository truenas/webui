<tn-dialog-shell [title]="'Multiple Errors' | translate">
  <div class="multi-error-dialog">
    @for (error of errors; track error) {
      <ix-error-template
        class="error-template"
        [title]="error.title"
        [message]="error.message"
        [stackTrace]="error.stackTrace"
        [logs]="error.logs"
      ></ix-error-template>
      <mat-divider></mat-divider>
    }
  </div>

  <div tnDialogAction>
    <tn-button
      ixTest="close-error-dialog"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close(true)"
    ></tn-button>
  </div>
</tn-dialog-shell>
