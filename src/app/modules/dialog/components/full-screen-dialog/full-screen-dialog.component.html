<div class="wrapper">
  <div class="container">
    @if (data.title) {
      <div class="title">{{ data.title }}</div>
    }
    @if (data.message) {
      <p class="message" [class.pre]="data.pre">{{ data.message }}</p>
    }
  </div>
  @if (data.showClose) {
    <tn-button
      color="primary"
      ixTest="close-full-screen"
      [label]="'Continue' | translate"
      (onClick)="close()"
    ></tn-button>
  }
</div>
