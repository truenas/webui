<tn-dialog-shell [title]="data.title | translate">
  <div class="information-header">
    <tn-icon class="information-icon" library="mdi" [name]="data.icon || 'information'"></tn-icon>
  </div>
  @if (data.isHtml) {
    <div class="info-panel ip-overflow-auto">
      <span [innerHtml]="data.info | translate"></span>
    </div>
  } @else {
    <div class="info-panel">
      <div class="textarea" readonly matInput>{{ data.info | translate }}</div>
    </div>
  }

  <div tnDialogAction>
    <tn-button
      ixTest="dialog-close"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close(true)"
    ></tn-button>
  </div>
</tn-dialog-shell>
