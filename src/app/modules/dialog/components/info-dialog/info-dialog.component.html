<tn-dialog-shell [title]="''">
  <h1 class="information-header">
    <tn-icon class="information-icon" library="mdi" [name]="data.icon || 'information'"></tn-icon>
    <span class="information-title">{{ data.title | translate }}</span>
  </h1>
  @if (data.isHtml) {
    <div class="info-panel ip-overflow-auto">
      <span [innerHtml]="data.info | translate"></span>
    </div>
  } @else {
    <div class="info-panel">
      <div class="textarea">{{ data.info | translate }}</div>
    </div>
  }

  <div tnDialogAction>
    <tn-button
      testId="dialog-close"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close(true)"
    ></tn-button>
  </div>
</tn-dialog-shell>
