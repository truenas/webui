<tn-dialog-shell [title]="options.title | translate">
  <div id="confirm-msg">
    <div class="message-content">
      <span [innerHTML]="options.message | translate"></span>

      <p>
        {{ 'Change Session Timeout in' | translate }}
        <button class="preferences-link" (click)="openPreferences()">
          {{ 'Preferences' | translate }}
        </button>
      </p>
    </div>
  </div>

  <div tnDialogAction>
    <tn-button
      color="primary"
      class="submit-button"
      ixTest="session-expiring-extend-confirm"
      [label]="options.buttonText | translate"
      (onClick)="extendSession()"
    ></tn-button>
  </div>
</tn-dialog-shell>
