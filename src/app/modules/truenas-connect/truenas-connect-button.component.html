<button
  ixTest="tnc-show-status"
  mat-icon-button
  matTooltipClass="tooltip-multiline"
  [matTooltip]="tooltip()"
  [attr.aria-label]="tooltip()"
  (click)="showStatus()"
>
  <span class="icon-wrapper">
    <tn-icon size="lg" name="tn-truenas-connect-logo"></tn-icon>
    @let currentBadge = badge();
    @if (currentBadge) {
      <ix-status-badge [badge]="currentBadge"></ix-status-badge>
    }
  </span>
</button>
