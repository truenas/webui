<tn-icon-button
  id="task-manager"
  class="topbar-button-right"
  name="clipboard-text"
  library="mdi"
  size="lg"
  testId="jobs-manager"
  [dense]="true"
  [tooltip]="tooltips.taskManager | translate"
  [ixUiSearch]="searchableElements.elements.jobs"
  (onClick)="onIndicatorPressed()"
>
  @if (jobBadge(); as badge) {
    <ix-status-badge [badge]="badge"></ix-status-badge>
  }
</tn-icon-button>
