<nav [attr.aria-label]="'Top bar' | translate">
  <!-- HOLD (NAS-141021): @truenas/ui-components has no <tn-toolbar> equivalent for a
       page-level bar yet, so the mat-toolbar/mat-toolbar-row wrapper is intentionally
       retained until the library ships a replacement. -->
  <mat-toolbar class="topbar">
    <mat-toolbar-row>
      <!-- Sidenav toggle button -->
      <tn-icon-button
        id="sidenavToggle"
        name="menu"
        library="mdi"
        size="lg"
        testId="toggle-sidenav"
        tooltipPosition="right"
        [dense]="true"
        [tooltip]="tooltips.toggleCollapse | translate"
        [ariaLabel]="'Toggle Sidenav' | translate"
        (onClick)="onSidenavIndicatorPressed()"
      ></tn-icon-button>

      <ix-global-search-trigger></ix-global-search-trigger>

      <ix-truenas-logo></ix-truenas-logo>

      <div class="topbar-mobile-footer" [class.has-console-footer]="hasConsoleFooter()">
        <tn-icon-button
          class="topbar-button-right"
          name="emoticon"
          library="mdi"
          size="lg"
          testId="leave-feedback"
          [dense]="true"
          [tooltip]="'Send Feedback' | translate"
          [ariaLabel]="'Send Feedback' | translate"
          [ixUiSearch]="searchableElements.elements.sendFeedback"
          (onClick)="onFeedbackIndicatorPressed()"
        ></tn-icon-button>

        <ix-truecommand-button></ix-truecommand-button>
        @if (hasTncConfig()) {
          <ix-truenas-connect-button></ix-truenas-connect-button>
        }

        @if (hasRebootRequiredReasons()) {
          <tn-icon-button
            class="topbar-button-right"
            name="update"
            library="mdi"
            size="lg"
            iconClass="movement"
            testId="reboot-info"
            [dense]="true"
            [tooltip]="tooltips.rebootInfo | translate"
            (onClick)="showRebootInfoDialog()"
          ></tn-icon-button>
        }

        <!-- finish update -->
        @if (updateIsRunning) {
          <tn-icon-button
            id="update-running"
            class="topbar-button-right"
            name="download"
            library="mdi"
            size="lg"
            iconClass="movement"
            testId="update-is-running"
            [dense]="true"
            [tooltip]="tooltips.update | translate"
            (onClick)="showUpdateDialog()"
          ></tn-icon-button>
        }
        <ix-checkin-indicator></ix-checkin-indicator>
        <ix-resilvering-indicator></ix-resilvering-indicator>
        <ix-ha-status-icon></ix-ha-status-icon>
        <ix-jobs-indicator></ix-jobs-indicator>

        <!-- Alert toggle button.
             HOLD (NAS-141021): matBadge stays on the migrated tn-icon-button because
             @truenas/ui-components has no notification-count badge yet (tn-chip only
             covers static labels). Revisit once the library ships a badge. -->
        <tn-icon-button
          #alertIndicator
          matBadgeSize="small"
          class="topbar-button-right"
          name="bell"
          library="mdi"
          size="lg"
          testId="alerts-indicator"
          [dense]="true"
          [class.severity-critical]="alertSeverity() === 'critical'"
          [class.severity-warning]="alertSeverity() === 'warning'"
          [iconClass]="alertIconClass()"
          [matBadge]="alertBadgeCount()"
          [matBadgeHidden]="alertBadgeCount() === 0"
          [ariaExpanded]="isAlertPanelOpen()"
          [tooltip]="alertTooltip()"
          [ariaLabel]="alertTooltip()"
          [ixUiSearch]="searchableElements.elements.alerts"
          (onClick)="onAlertIndicatorPressed()"
        ></tn-icon-button>

        <ix-user-menu></ix-user-menu>
        <ix-power-menu></ix-power-menu>
      </div>
    </mat-toolbar-row>
  </mat-toolbar>
</nav>
