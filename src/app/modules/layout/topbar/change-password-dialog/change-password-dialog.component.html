<tn-dialog-shell [title]="'Change Password' | translate">
  <ix-change-password-form
    #passwordForm
    [showActions]="false"
    (passwordUpdated)="dialogRef.close(true)"
  ></ix-change-password-form>
  <ix-form-actions tnDialogAction>
    <tn-button
      color="primary"
      ixTest="save"
      [label]="'Change Password' | translate"
      [disabled]="passwordForm.form.invalid"
      (onClick)="passwordForm.onSubmit()"
    ></tn-button>
  </ix-form-actions>
</tn-dialog-shell>
