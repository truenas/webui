<tn-dialog-shell testId="resilver-progress" [title]="title | translate">
  <div class="resilver-progress-dialog">
    @if (state !== PoolScanState.Finished) {
      <div>
        <mat-progress-bar
          class="example-margin"
          color="primary"
          mode="indeterminate"
          [value]="progressTotalPercent"
        ></mat-progress-bar>
        <label> {{ progressTotalPercent | number: '1.2-2' }}% </label>
      </div>
    }
    <div>{{ description | translate }}{{ diskName }}</div>
    <div>{{ statusLabel | translate }}{{ state }}</div>
  </div>

  <div tnDialogAction>
    <tn-button
      variant="outline"
      testId="close"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close('close')"
    ></tn-button>
  </div>
</tn-dialog-shell>
