<tn-dialog-shell testId="reboot-or-shutdown" [title]="title">
  @if (isEnterprise()) {
    <tn-form-field [label]="'Reason' | translate" [required]="true">
      <tn-select
        testId="reason"
        [formControl]="form.controls.reason"
        [options]="(reasonOptions$ | async) ?? []"
      ></tn-select>
    </tn-form-field>

    @if (form.controls.customReason.enabled) {
      <tn-form-field [label]="'Custom Reason' | translate" [required]="true">
        <tn-input
          testId="custom-reason"
          [formControl]="form.controls.customReason"
        ></tn-input>
      </tn-form-field>
    }
  }

  <!-- No tn-form-field wrapper: a label-less field renders the control's required
       state as a stray inline asterisk, and the checkbox shows its own error. -->
  <tn-checkbox
    testId="confirm"
    class="confirm"
    [formControl]="form.controls.confirm"
    [label]="'Confirm' | translate"
    [required]="true"
    [error]="form.controls.confirm.touched && form.controls.confirm.invalid ? ('Confirm is required' | translate) : null"
  ></tn-checkbox>

  <ix-form-actions tnDialogAction>
    <tn-button
      variant="outline"
      testId="cancel"
      [label]="'Cancel' | translate"
      (onClick)="dialogRef.close()"
    ></tn-button>

    <tn-button
      color="primary"
      testId="submit"
      [label]="buttonText"
      [disabled]="!form.controls.confirm.value || (!!isEnterprise() && form.invalid)"
      (onClick)="onSubmit()"
    ></tn-button>
  </ix-form-actions>
</tn-dialog-shell>
