<tn-icon-button
  class="topbar-button-right"
  name="power"
  library="mdi"
  size="lg"
  testId="power-menu"
  [dense]="true"
  [tooltip]="tooltips.power | translate"
  [matMenuTriggerFor]="powerMenu"
  [ixUiSearch]="searchableElements.elements.powerMenu"
></tn-icon-button>
<mat-menu #powerMenu="matMenu">
  <button
    *ixRequiresRoles="requiredRoles"
    name="power-restart"
    mat-menu-item
    ixTest="restart"
    [ixUiSearch]="searchableElements.elements.restart"
    (click)="onReboot()"
  >
    <tn-icon size="lg" name="refresh" library="mdi"></tn-icon>
    {{ 'Restart' | translate }}
  </button>

  <button
    *ixRequiresRoles="requiredRoles"
    name="power-shut-down"
    mat-menu-item
    ixTest="shut-down"
    [ixUiSearch]="searchableElements.elements.shutDown"
    (click)="onShutdown()"
  >
    <tn-icon size="lg" name="power" library="mdi"></tn-icon>
    {{ 'Shut Down' | translate }}
  </button>
</mat-menu>
