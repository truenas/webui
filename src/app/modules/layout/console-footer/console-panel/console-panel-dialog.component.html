<tn-dialog-shell [title]="'Console' | translate">
  <div id="console-box">
    <pre #messageContainer class="messages">{{ lines$ | async }}</pre>
  </div>

  <div tnDialogAction>
    <tn-button
      variant="outline"
      class="close-button"
      testId="close"
      [label]="'Close' | translate"
      (onClick)="dialogRef.close(false)"
    ></tn-button>
  </div>
</tn-dialog-shell>
<div id="placeholder"></div>
