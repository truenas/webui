<div class="new-page-feedback">
  @if (customBadgeTitle(); as title) {
    <span>{{ title | translate }}</span>
  } @else {
    <span>{{ 'NEW' | translate }}</span>

    <tn-button
      *ixIfNightly
      testId="new-page-feedback"
      [label]="'Leave Feedback' | translate"
      (onClick)="leaveFeedbackPressed()"
    ></tn-button>
  }
</div>
