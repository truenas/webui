<ix-form
  [formGroup]="form"
  [editData]="editData()"
  [isEditMode]="resolvedEditMode()"
  [externalLoading]="externalLoading()"
  [initialFormSnapshot]="loadedSnapshot()"
  [title]="title"
  [addTitle]="addTitle"
  [editTitle]="editTitle"
  [requiredRoles]="requiredRoles"
  [submitHandler]="definition().submit"
>
  @for (section of sections; track $index) {
    @if (isSectionVisible($index, section)) {
      <tn-form-section [heading]="section.title" [tooltip]="section.tooltip">
        @for (field of section.fields; track field.name) {
          @if (isFieldVisible(field)) {
            @switch (field.type) {
              @case ('checkbox') {
                <tn-form-field [tooltip]="field.tooltip" [hint]="field.hint">
                  <tn-checkbox
                    [formControlName]="field.name"
                    [label]="field.label"
                    [required]="field.required"
                    [testId]="field.name"
                    [attr.id]="field.id || null"
                  ></tn-checkbox>
                </tn-form-field>
              }
              @case ('select') {
                <tn-form-field [label]="field.label" [tooltip]="field.tooltip" [hint]="field.hint">
                  <tn-select
                    [formControlName]="field.name"
                    [options]="(field.options | async) ?? []"
                    [multiple]="field.multiple"
                    [testId]="field.name"
                    [attr.id]="field.id || null"
                  ></tn-select>
                </tn-form-field>
              }
              @case ('combobox') {
                <tn-form-field [label]="field.label" [tooltip]="field.tooltip" [hint]="field.hint">
                  <tn-autocomplete
                    [formControlName]="field.name"
                    [options]="(field.options | async) ?? []"
                    [requireSelection]="field.requireSelection"
                    [allowCustomValue]="!field.requireSelection"
                    [placeholder]="field.placeholder"
                    [testId]="field.name"
                    [attr.id]="field.id || null"
                  ></tn-autocomplete>
                </tn-form-field>
              }
              @default {
                <tn-form-field [label]="field.label" [tooltip]="field.tooltip" [hint]="field.hint">
                  <tn-input
                    [formControlName]="field.name"
                    [name]="field.name"
                    [inputType]="field.inputType"
                    [multiline]="field.multiline"
                    [rows]="field.rows"
                    [required]="field.required"
                    [readonly]="field.readonly"
                    [placeholder]="field.placeholder"
                    [testId]="field.name"
                    [attr.id]="field.id || null"
                  ></tn-input>
                </tn-form-field>
              }
            }
          }
        }
      </tn-form-section>
    }
  }
</ix-form>
