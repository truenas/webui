<div class="container">
  <div class="label-container">
    @if (label() || tooltip()) {
      <ix-label
        [label]="label()"
        [tooltip]="tooltip()"
        [required]="required()"
      ></ix-label>
    }

    @if (canAdd()) {
      <tn-button
        type="button"
        class="add-btn"
        variant="filled"
        color="default"
        [testId]="['add-item', label()]"
        [ariaLabel]="'Add {item}' | translate: { item: label() }"
        [label]="'Add' | translate"
        (onClick)="addItem()"
      ></tn-button>
    }
  </div>
  @if (formArray()) {
    <ix-errors [control]="formArray()" [label]="label()"></ix-errors>
  }

  <div class="input-container" [class.disabled]="isDisabled" [attr.aria-label]="label()">
    <ng-content></ng-content>

    @if (empty()) {
      <span class="empty">
        {{ 'No items have been added yet.' | translate }}
      </span>
    }
  </div>
</div>
