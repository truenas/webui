<div class="list-item">
  @if (canDelete()) {
    <tn-icon-button
      name="close"
      library="mdi"
      class="delete-btn"
      testId="remove-from-list"
      [ariaLabel]="'Remove {label} item' | translate: { label: label() }"
      (onClick)="deleteItem()"
    ></tn-icon-button>
  }
  <ng-content></ng-content>
</div>
