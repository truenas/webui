<tn-dialog-shell testId="create-dataset" [title]="'Create Dataset' | translate">
  @if (isLoading$ | async) {
    <tn-progress-bar mode="indeterminate"></tn-progress-bar>
  }
  <form [formGroup]="form">
    <tn-form-field [label]="'Name' | translate">
      <tn-input
        class="dataset-name"
        testId="name"
        formControlName="name"
        [required]="true"
      ></tn-input>
    </tn-form-field>
  </form>
  <ix-form-actions tnDialogAction class="form-actions">
    <tn-button
      variant="outline"
      testId="cancel"
      [label]="'Cancel' | translate"
      (onClick)="dialogRef.close()"
    ></tn-button>
    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      testId="create-dataset"
      [label]="'Create' | translate"
      [disabled]="form.invalid || (isLoading$ | async) || false"
      (onClick)="createDataset()"
    ></tn-button>
  </ix-form-actions>
</tn-dialog-shell>
