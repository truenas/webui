@if (label() || tooltip()) {
  <ix-label
    [label]="label()"
    [tooltip]="tooltip()"
    [required]="required()"
    [ixTestOverride]="controlDirective.name || ''"
  ></ix-label>
}

<tn-file-picker
  [formControl]="pickerControl"
  [multiSelect]="multiple()"
  [openOnClick]="true"
  [rootPath]="pickerRootPath()"
  [startPath]="pickerRootPath()"
  [valueRoot]="pickerValueRoot()"
  [callbacks]="pickerCallbacks"
  [createActions]="pickerCreateActions()"
  [testId]="controlDirective.name || ''"
  (selectionChange)="onSelectionChange($event)"
  (pathChange)="onPathChange($event)"
  (createAction)="onCreateAction($event)"
  (error)="onPickerError($event)"
></tn-file-picker>

<ng-content></ng-content>

@if (loadingError(); as loadingError) {
  <div role="alert" class="loading-error">
    {{ loadingError }}
  </div>
}

@let control = controlDirective.control;
@if (control) {
  <ix-errors [control]="control" [label]="label()"></ix-errors>
}

@if (hint(); as hintText) {
  <mat-hint>{{ hintText }}</mat-hint>
}
