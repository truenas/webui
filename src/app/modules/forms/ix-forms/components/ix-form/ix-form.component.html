<!-- SlideIn host only: the <tn-side-panel> host renders its own header. -->
@if (slideInRef) {
  <ix-modal-header
    [requiredRoles]="requiredRoles()"
    [title]="resolvedTitle()"
    [loading]="isLoading()"
  ></ix-modal-header>
}

<form
  class="ix-form-container"
  [formGroup]="formGroup()"
  [attr.aria-busy]="isLoading() || null"
  (ngSubmit)="onFormSubmit()"
>
  <ng-content />

  <!--
    SlideIn host only: in the <tn-side-panel> host the footer owns the Save and any
    extra actions, so the whole actions row is empty there — don't render it (it would
    otherwise leave an empty submit-button-wrapper taking vertical space in the panel).
  -->
  @if (slideInRef) {
    <ix-form-actions>
      <ng-content select="[ixExtraActions]" />

      <button
        *ixRequiresRoles="requiredRoles()"
        mat-button
        type="submit"
        color="primary"
        ixTest="save"
        aria-live="polite"
        [disabled]="isSaveDisabled()"
        [attr.aria-busy]="isSubmitting() || null"
      >
        @if (isSubmitting()) {
          {{ 'Saving…' | translate }}
        } @else {
          {{ 'Save' | translate }}
        }
      </button>
    </ix-form-actions>
  }
</form>
