<ix-modal-header
  [requiredRoles]="requiredRoles()"
  [title]="resolvedTitle()"
  [loading]="isLoading()"
></ix-modal-header>

<mat-card>
  <mat-card-content>
    <form class="ix-form-container" [formGroup]="formGroup()" (ngSubmit)="onFormSubmit()">
      <ng-content />

      <ix-form-actions>
        <ng-content select="[ixExtraActions]" />

        <button
          *ixRequiresRoles="requiredRoles()"
          mat-button
          type="submit"
          color="primary"
          ixTest="save"
          [disabled]="formGroup().invalid || isLoading()"
        >
          {{ 'Save' | translate }}
        </button>
      </ix-form-actions>
    </form>
  </mat-card-content>
</mat-card>
