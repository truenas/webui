<div
  #trigger="cdkOverlayOrigin"
  cdkOverlayOrigin
  class="columns-trigger"
>
  <tn-button
    testId="columns"
    [label]="'Columns' | translate"
    [attr.aria-haspopup]="'menu'"
    [attr.aria-expanded]="menuOpen()"
    (onClick)="toggleMenu()"
    (keydown.arrowDown)="openMenu()"
  ></tn-button>
  <tn-icon class="columns-trigger__caret" name="menu-down" library="mdi" size="sm"></tn-icon>
</div>

<ng-template
  cdkConnectedOverlay
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="menuOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  (backdropClick)="closeMenu()"
  (detach)="closeMenu()"
>
  <div
    cdkTrapFocus
    role="menu"
    class="columns-menu"
    [cdkTrapFocusAutoCapture]="true"
    (keydown.escape)="closeMenu()"
    (keydown.arrowDown)="moveFocus($event, 1)"
    (keydown.arrowUp)="moveFocus($event, -1)"
    (keydown.home)="focusEdge($event, 'first')"
    (keydown.end)="focusEdge($event, 'last')"
  >
    <button
      type="button"
      role="menuitemcheckbox"
      class="columns-menu__item"
      tnTestIdType="button"
      [tnTestId]="['toggle-all-columns']"
      [attr.aria-checked]="isAllSelected"
      (click)="toggleAll(); saveColumnPreferences(); enableResetButton()"
    >
      <tn-icon library="mdi" [name]="!isAllSelected ? 'minus-circle' : 'check-circle'"></tn-icon>
      @if (isAllSelected) {
        <span>{{ 'Unselect All' | translate }}</span>
      } @else {
        <span>{{ 'Select All' | translate }}</span>
      }
    </button>

    @for (column of columns(); track column) {
      @if (column.title) {
        <button
          type="button"
          role="menuitemcheckbox"
          class="columns-menu__item"
          tnTestIdType="button"
          [tnTestId]="['toggle-column', column.title]"
          [attr.aria-checked]="!isSelected(column)"
          (click)="toggle(column); saveColumnPreferences(); enableResetButton()"
        >
          <tn-icon library="mdi" [name]="isSelected(column) ? 'minus-circle' : 'check-circle'"></tn-icon>
          <span>{{ column.title | translate }}</span>
        </button>
      }
    }

    <button
      type="button"
      role="menuitem"
      class="columns-menu__item"
      tnTestIdType="button"
      [tnTestId]="['reset-columns-to-defaults']"
      [disabled]="isResetToDefaultDisabled()"
      (click)="resetToDefaults(); saveColumnPreferences()"
    >
      <tn-icon name="undo" library="mdi"></tn-icon>
      <span>{{ 'Reset to Defaults' | translate }}</span>
    </button>
  </div>
</ng-template>
