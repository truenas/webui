@if (tcStatus && tcStatus.status === TrueCommandStatus.Connecting) {
  <button
    mat-icon-button
    id="tc-connecting"
    class="topbar-button-right"
    ixTest="truecommand-indicator"
    [matTooltip]="tooltips.connectingToTruecommand | translate"
    (click)="stopTrueCommandConnecting()"
  >
    <tn-icon
      size="lg"
      class="truecommand-button-connecting-animation"
      name="tn-truecommand-logo-mark"
    ></tn-icon>
  </button>
}

@if (tcStatus && tcStatus.status !== TrueCommandStatus.Connecting) {
  <button
    mat-icon-button
    class="topbar-button-right truecommand-button"
    ixTest="truecommand-indicator"
    [matTooltip]="tooltips.truecommandStatus | translate"
    [ngClass]="[tcStatus.status]"
    [ixUiSearch]="searchableElements.elements.trueCommand"
    (click)="handleClick()"
  >
    <span class="icon-wrapper">
      <tn-icon size="lg" name="tn-truecommand-logo-mark"></tn-icon>
      @let badge = statusBadge;
      @if (badge) {
        <ix-status-badge [icon]="badge.icon" [kind]="badge.kind"></ix-status-badge>
      }
    </span>
  </button>
}
