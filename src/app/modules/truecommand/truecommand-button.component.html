@let status = tcStatus();
@if (status) {
  @if (status.status === TrueCommandStatus.Connecting) {
    <button
      mat-icon-button
      id="tc-connecting"
      class="topbar-button-right truecommand-button"
      ixTest="truecommand-indicator"
      matTooltipClass="tooltip-multiline"
      [matTooltip]="tooltip()"
      [attr.aria-label]="tooltip()"
      (click)="stopTrueCommandConnecting()"
    >
      <ng-container *ngTemplateOutlet="logoWithBadge"></ng-container>
    </button>
  } @else {
    <button
      mat-icon-button
      class="topbar-button-right truecommand-button"
      ixTest="truecommand-indicator"
      matTooltipClass="tooltip-multiline"
      [matTooltip]="tooltip()"
      [attr.aria-label]="tooltip()"
      [ngClass]="[status.status]"
      [ixUiSearch]="searchableElements.elements.trueCommand"
      (click)="handleClick()"
    >
      <ng-container *ngTemplateOutlet="logoWithBadge"></ng-container>
    </button>
  }
}

<ng-template #logoWithBadge>
  <span class="icon-wrapper">
    <tn-icon size="lg" name="tn-truecommand-logo-mark"></tn-icon>
    @let badge = statusBadge();
    @if (badge) {
      <ix-status-badge [badge]="badge"></ix-status-badge>
    }
  </span>
</ng-template>
