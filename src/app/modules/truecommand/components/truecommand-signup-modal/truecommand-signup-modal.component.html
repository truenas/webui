<tn-dialog-shell [title]="'Connect to TrueCommand Cloud' | translate">
  <p [innerHtml]="helptext.signupDialog.content | translate"></p>

  <ix-form-actions tnDialogAction class="form-actions">
    <tn-button
      variant="outline"
      ixTest="truecommand-signup"
      [label]="'Signup' | translate"
      (onClick)="onSignup()"
    ></tn-button>

    <tn-button
      variant="outline"
      ixTest="cancel-truecommand"
      [label]="'Cancel' | translate"
      (onClick)="dialogRef.close(false)"
    ></tn-button>

    <tn-button
      *ixRequiresRoles="requiredRoles"
      color="primary"
      ixTest="truecommand-connect"
      [label]="'Connect' | translate"
      (onClick)="dialogRef.close(true)"
    ></tn-button>
  </ix-form-actions>
</tn-dialog-shell>
