<tn-dialog-shell testId="truecommand-signup" [title]="'Connect to TrueCommand Cloud' | translate">
  <p [innerHtml]="helptext.signupDialog.content | translate"></p>

  <tn-button
    tnDialogAction
    testId="truecommand-signup"
    [label]="'Signup' | translate"
    (onClick)="onSignup()"
  ></tn-button>

  <tn-button
    tnDialogAction
    testId="cancel-truecommand"
    [label]="'Cancel' | translate"
    (onClick)="dialogRef.close(false)"
  ></tn-button>

  <tn-button
    *ixRequiresRoles="requiredRoles"
    tnDialogAction
    color="primary"
    testId="truecommand-connect"
    [label]="'Connect' | translate"
    (onClick)="dialogRef.close(true)"
  ></tn-button>
</tn-dialog-shell>
