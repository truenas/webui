<tn-dialog-shell [title]="(title | translate) || ''">
  <form class="ix-form-container" [formGroup]="form" (submit)="onSubmit()">
    <div class="truecommand-connect-modal-form-content">
      <ix-input
        formControlName="api_key"
        [label]="helptext.updateDialog.apiKey | translate"
        [tooltip]="helptext.updateDialog.apiTooltip | translate"
      ></ix-input>

      <ix-checkbox
        formControlName="enabled"
        [label]="helptext.updateDialog.enabledLabel | translate"
        [tooltip]="helptext.updateDialog.enabledTooltip | translate"
      ></ix-checkbox>
    </div>

    <div tnDialogAction>
      <tn-button
        variant="outline"
        class="action-btn"
        ixTest="cancel"
        [label]="'Cancel' | translate"
        (onClick)="onCancel()"
      ></tn-button>

      @if (isConnected) {
        <tn-button
          *ixRequiresRoles="requiredRoles"
          variant="outline"
          class="action-btn"
          ixTest="deregister"
          [label]="helptext.tcDeregisterBtn | translate"
          (onClick)="onDeregister()"
        ></tn-button>
      }

      <tn-button
        *ixRequiresRoles="requiredRoles"
        color="primary"
        ixTest="save"
        [label]="saveButtonText | translate"
        [disabled]="form.invalid"
        (onClick)="onSubmit()"
      ></tn-button>
    </div>
  </form>
</tn-dialog-shell>
