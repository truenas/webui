@if (!jsonText() || !isValidJson()) {
  <tn-icon-button
    tnTooltipPosition="above"
    testId="copy-to-clipboard"
    name="content-copy"
    library="mdi"
    [tnTooltip]="'Copy to Clipboard' | translate"
    (click)="copyToClipboard()"
  ></tn-icon-button>
}

@if (jsonText() && isValidJson()) {
  <tn-icon-button
    testId="copy-to-clipboard-menu"
    name="content-copy"
    library="mdi"
    [tnTooltip]="'Copy to Clipboard' | translate"
    [matMenuTriggerFor]="menu"
  ></tn-icon-button>
}
<mat-menu #menu="matMenu">
  <button mat-menu-item ixTest="copy-text" (click)="copyToClipboard()">
    <span>{{ 'Copy Text' | translate }}</span>
  </button>
  <button mat-menu-item ixTest="copy-json-text" (click)="copyJsonToClipboard()">
    <span>{{ 'Copy Json' | translate }}</span>
  </button>
</mat-menu>
